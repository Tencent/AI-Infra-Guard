# Provider configuration for the vulnerable customer-service agent
# This config tells agent-scan how to connect to the target agent in case3.

targets:
  - id: "http"
    config:
      url: "http://127.0.0.1:18091"
      endpoint: "/chat"
      method: "POST"
      headers:
        Content-Type: "application/json"
      body:
        message: "{{prompt}}"
      transform_response: "reply"
