info:
  name: bentoml
  author: A.I.G bot
  severity: info
  desc: BentoML is a Python library for building online serving systems optimized for AI apps and model inference.
  metadata:
    product: bentoml
    vendor: bentoml
http:
  - method: GET
    path: '/'
    matchers:
      - body="BentoML Prediction Service"
  - method: GET
    path: '/docs.json'
    matchers:
      - body="BentoML Team" && body="contact@bentoml.com"
  - method: GET
    path: '/metrics'
    matchers:
      - body="bentoml_api_server"
