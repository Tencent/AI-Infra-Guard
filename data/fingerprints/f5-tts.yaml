info:
  name: f5-tts
  author: A.I.G bot
  severity: info
  desc: >-
    F5-TTS is a zero-shot text-to-speech system based on flow matching.
    It provides a Gradio web interface (default port 7860) with tabs for
    Basic-TTS, Multi-Speech, Voice-Chat, and Credits. The HTTP server
    runs on uvicorn (Gradio default).
  metadata:
    product: f5-tts
    vendor: swivid
http:
  - method: GET
    path: /
    matchers:
      - body="F5-TTS"
      - body="Basic-TTS"
version:
  - method: GET
    path: /
    extractor:
      part: body
      group: 1
      regex: 'window\.gradio_config = \{"version":"(\d+\.\d+\.?\d+?)"'
