info:
  name: fast-mcp-telegram
  author: 腾讯朱雀实验室
  severity: info
  desc: Telegram MCP Server — Model Context Protocol gateway for Telegram, supports HTTP and stdio transports, multi-tenant, MTProto bridge.
  metadata:
    product: fast-mcp-telegram
    vendor: leshchenko1979
http:
  - method: GET
    path: '/setup'
    matchers:
      - body="<title>Telegram MCP Setup</title>"
  - method: GET
    path: '/'
    matchers:
      - body="fast-mcp-telegram" && body="Telegram MCP"
# TODO: version extractor not available — the /setup page and root path do not expose
# version information without authentication. Version can be obtained from PyPI metadata
# or the package's __version__ attribute, but no unauthenticated HTTP endpoint exposes it.
