info:
  name: LiteLLM
  author: A.I.G bot
  severity: info
  desc: |
    LiteLLM is an open-source proxy and SDK for unified LLM API access, supporting 100+ providers
    including OpenAI, Anthropic, Gemini, and Azure. Used as AI gateway infrastructure in enterprise environments.
  metadata:
    product: litellm
    vendor: berriai

http:
  - method: GET
    path: '/ui'
    matchers:
      - body="<title>LiteLLM</title>" || body="litellm-dashboard"

version:
  - method: GET
    path: '/health/readiness'
    extractor:
      part: body
      group: 1
      regex: '"litellm_version"\s*:\s*"([0-9]+\.[0-9]+\.[0-9]+[^"]*)"'
