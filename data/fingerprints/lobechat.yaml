info:
  name: LobeChat
  author: 腾讯朱雀实验室
  severity: info
  metadata:
    product: LobeChat
    vendor: LobeChat
http:
  - method: GET
    path: '/'
    matchers:
      - body="<title>LobeChat</title>"
  - method: GET
    path: '/manifest.webmanifest'
    matchers:
      - body="\"id\":\"lobe-hub\"" && body="\"name\":\"LobeHub\""
