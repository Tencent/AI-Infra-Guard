info:
  name: nextchat
  author: 腾讯朱雀实验室
  severity: info
  metadata:
    product: nextchat
    vendor: nextchat
http:
  - method: GET
    path: '/'
    matchers:
      - body="<title>NextChat</title>"
  - method: GET
    path: '/site.webmanifest'
    matchers:
      - 'body="\"name\": \"NextChat\"" && body="\"short_name\": \"NextChat\""'
  - method: GET
    path: '/api/config'
    matchers:
      - 'body="\"needCode\"" && body="\"hideUserApiKey\"" && body="\"disableGPT4\""'
