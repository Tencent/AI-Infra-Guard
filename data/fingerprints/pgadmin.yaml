info:
  name: pgadmin
  author: 腾讯朱雀实验室
  severity: info
  desc: pgAdmin 4 是 PostgreSQL 最流行和功能最丰富的开源管理和开发平台，提供 Web 界面进行数据库管理，支持 AI Assistant 功能。
  metadata:
    product: pgadmin
    vendor: pgadmin
http:
  - method: GET
    path: '/'
    matchers:
      - body="pgAdmin 4" && body="pg-icon"
version:
  - method: GET
    path: '/browser/browser.css'
    extractor:
      part: body
      group: 1
      regex: 'pgadmin[/-](\d+\.\d+)'
