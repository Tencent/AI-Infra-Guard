info:
  name: wazuh
  author: A.I.G bot
  severity: info
  desc: Wazuh is a free and open source security monitoring platform used for threat prevention, detection, and response.
  metadata:
    product: wazuh
    vendor: wazuh
http:
  - method: GET
    path: "/"
    matchers:
      - body="<title>Wazuh</title>"
  - method: GET
    path: "/app/wazuh"
    matchers:
      - body="<title>Wazuh</title>"
      - body="wazuh"
version:
  - method: GET
    path: "/api/v1/info"
    extractor:
      part: body
      group: 1
      regex: '"version"\s*:\s*"([0-9][0-9.]*)"'
