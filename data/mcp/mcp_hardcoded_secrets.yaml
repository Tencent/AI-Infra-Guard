info:
  id: "mcp_hardcoded_secrets"
  name: "MCP Hardcoded Secrets Detection"
  description: "Detect hardcoded credentials, API keys, tokens, and private keys embedded in MCP server source code, which can be exposed if the repository or distribution package is accessible to unauthorized parties."
  author: "ATR (Agent Threat Rules)"
  categories:
    - code

prompt_template: |
  As a professional AI-agent security analyst, precisely detect hardcoded secrets
  in MCP server source code. Hardcoded credentials embedded directly in source
  files — API keys, access tokens, private keys, passwords — can be extracted by
  anyone who gains read access to the repository, package, or running container.
  Require concrete evidence of a genuine secret value; only report when the string
  matches a known credential pattern with sufficient entropy or format.

  ## Vulnerability Definition
  Hardcoded secrets occur when sensitive authentication material — cloud provider
  keys (`AKIA…`), API tokens (`sk-…`, `ghp_…`, `xoxb-…`), private keys
  (`-----BEGIN … PRIVATE KEY-----`), database passwords, JWT secrets — is
  committed directly in source code rather than loaded from environment variables,
  a secrets manager, or a properly git-ignored configuration file.

  ## Detection Criteria (require a concrete secret pattern)

  ### 1. Cloud provider credentials
  **Code Patterns:**
  - AWS access keys: `AKIA[0-9A-Z]{16}`, AWS secret keys assigned as string
    literals.
  - Azure / GCP keys, service account JSON embedded as a string or object.
  - Cloudflare / DigitalOcean / Linode API tokens in assignments.

  ### 2. SaaS API tokens
  **Code Patterns:**
  - OpenAI / Anthropic / other LLM API keys: `sk-[a-zA-Z0-9]{20,}`,
    `sk-ant-…`.
  - GitHub tokens: `ghp_[a-zA-Z0-9]{36}`, `gho_…`, `ghs_…`.
  - Slack tokens: `xox[baprs]-…`.
  - Stripe keys: `sk_live_…`, `rk_live_…`.
  - Generic `API_KEY = "…"`, `SECRET_KEY = "…"`, `TOKEN = "…"` assignments
    with high-entropy values (>20 chars, mixed case + digits).

  ### 3. Private keys and certificates
  **Code Patterns:**
  - PEM blocks: `-----BEGIN RSA PRIVATE KEY-----`, `-----BEGIN EC PRIVATE KEY-----`,
    `-----BEGIN PRIVATE KEY-----`, `-----BEGIN OPENSSH PRIVATE KEY-----`.
  - PGP private key blocks, certificate bundles with private key material.

  ### 4. Database / service passwords
  **Code Patterns:**
  - Connection strings with embedded passwords:
    `mongodb://user:password@host`, `postgres://user:pass@host`.
  - Password assignments: `password = "…"`, `DB_PASS = "…"` where the value is
    a non-placeholder string (not `<password>`, `your_password`, `changeme`,
    `example`, `xxx`).

  ## Strict Judgment Standards
  - **Environment variables**: Do not report `os.environ.get('API_KEY')` or
    `process.env.API_KEY` — these are correct practices.
  - **Placeholders**: Do not report obvious placeholder values (`your_key_here`,
    `xxx`, `changeme`, `example`, `<token>`, empty strings).
  - **Test fixtures**: Do not report secrets in files under test directories
    (`test/`, `__tests__/`, `*_test.*`, `*.spec.*`) that are clearly fake values.
  - **Documentation**: Do not report secrets inside comments that serve as
    usage examples with placeholder-style values.
  - **Low-entropy values**: Do not report short or dictionary-word strings that
    do not match any credential format.

  ## Output Requirements
  Only output when finding concrete hardcoded secrets:
  - Specific file path and line number
  - The type of secret (API key, token, private key, password, etc.)
  - The redacted value (show only enough to identify the type, e.g.
    `AKIA****XXXX`)
  - Technical analysis: how the secret could be extracted by an unauthorized party
  - Impact assessment: what resources or services the exposed credential grants
    access to
  - Remediation: move secrets to environment variables or a secrets manager,
    rotate the exposed credential, add `.env` to `.gitignore`, use
    pre-commit secret scanners.

  **Strict Requirement: provide the file, line number, and secret type with a redacted value. Remain silent when no concrete evidence exists.**
