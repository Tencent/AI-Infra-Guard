info:
  name: OpenClaw
  cve: GHSA-24vr-rprv-67rf
  summary: >-
    OpenClaw 工作区 .env 中的 npm_execpath 可能影响捆绑运行时依赖项的安装
  details: >-
    漏洞概述


    工作区 .env 中的 npm_execpath 可能影响捆绑运行时依赖项的安装。在受影响版本中，受信任操作员打开的代码仓库中的工作区
    .env 文件可能会覆盖安装辅助程序使用的包管理器可执行文件路径。


    本安全公告仅适用于上述特定功能和配置。它不改变 OpenClaw 的受信任操作员模型：已认证的 Gateway 操作员、已安装的插件以及有意的本地执行接口仍保持受信任状态，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，此漏洞可能导致在依赖项安装过程中执行非预期的本地包管理器可执行文件。实际影响取决于操作员的配置，以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.29。


    缓解措施


    在完成修补之前，仅从受信任的工作区安装捆绑运行时依赖项。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.29 或更高版本。在完成修补之前，仅从受信任的工作区安装捆绑运行时依赖项。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-24vr-rprv-67rf
rule: version < "2026.4.29"
