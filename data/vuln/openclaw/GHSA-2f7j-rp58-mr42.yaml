info:
  name: OpenClaw
  cve: GHSA-2f7j-rp58-mr42
  summary: OpenClaw Gateway hello 快照向非管理员客户端暴露宿主配置与状态路径
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，Gateway 连接成功快照（connect success snapshot）会向非管理员客户端暴露本地 configPath 和 stateDir 元数据。低权限认证客户端可获取其角色不需要的宿主文件系统布局及部署细节信息。


    安全影响


    非管理员客户端可获取宿主特定的文件系统路径及相关部署元数据，有助于攻击者进行宿主指纹识别并辅助链式攻击。这是一个信息泄露问题，而非直接的授权绕过漏洞。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: LOW
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：676b748056b5efca6f1255708e9dd9469edf5e2e —
    将连接快照元数据限制为管理员权限范围的客户端可见
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2f7j-rp58-mr42
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-2f7j-rp58-mr42
