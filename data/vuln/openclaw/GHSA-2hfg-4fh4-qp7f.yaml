info:
  name: OpenClaw
  cve: GHSA-2hfg-4fh4-qp7f
  summary: OpenClaw 浏览器 act 交互操作可能绕过私有网络导航检查
  details: >-
    漏洞概述


    OpenClaw 的浏览器控制 SSRF 检查会阻止直接导航至私有地址或回环地址，但某些 Playwright act 交互操作可能在初始检查完成后触发导航行为。随后的浏览器内容读取操作可能从该动作触发的导航所访问的页面中读取数据。


    本问题特定于浏览器控制操作和私有网络导航策略。当浏览器内容读取用于策略允许访问的页面时，仍属于受信任操作员的有意功能。


    受影响配置


    本漏洞影响启用了浏览器控制功能的部署环境，且已认证的浏览器控制调用方可与攻击者控制的页面进行交互——该页面通过 UI 动作将标签页重定向或导航至私有网络目标。


    影响


    若浏览器通过未经检查的动作触发导航访问了私有页面，具备浏览器内容读取能力的调用方可能读取到直接导航策略本应阻止的页面内容。


    本问题不授予未经认证的访问权限。它仅针对特定浏览器动作路径绕过了私有网络导航防护。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    升级至 openclaw@2026.5.18 或更高版本。升级前，将浏览器控制访问权限限制为受信任操作员，并避免在包含敏感私有 Web 服务的环境中对不可信页面使用浏览器控制功能。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.18 或更高版本。升级前，将浏览器控制访问权限限制为受信任操作员，并避免在包含敏感私有 Web
    服务的环境中对不可信页面使用浏览器控制功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2hfg-4fh4-qp7f
rule: version < "2026.5.18"
