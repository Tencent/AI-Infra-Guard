info:
  name: OpenClaw
  cve: GHSA-2j8v-hwgc-x698
  summary: OpenClaw Shell 包装器的 argv 可能在审批与执行之间发生变化
  details: >-
    漏洞概述


    Shell 包装器的 argv 可能在审批与执行之间发生变化。在受影响版本中，使用 Shell 包装器形式的命令请求可能在审批时解析出一种 argv 形态，而在执行时重建出另一种形态。


    本安全公告仅适用于上述特定功能和配置。它不改变 OpenClaw 的受信任操作员模型：已认证的 Gateway 操作员、已安装的插件以及有意的本地执行接口仍保持受信任状态，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，此漏洞可能导致执行未经白名单检查的命令形态。实际影响取决于操作员的配置，以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    在完成修补之前，对 Shell 包装器要求显式审批，并避免对包装器密集型命令使用持久白名单。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.18 或更高版本。在完成修补之前，对 Shell 包装器要求显式审批，并避免对包装器密集型命令使用持久白名单。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2j8v-hwgc-x698
rule: version <= "2026.5.16"
