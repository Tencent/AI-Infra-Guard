info:
  name: OpenClaw
  cve: GHSA-2qrv-rc5x-2g2h
  summary: OpenClaw 不受信任的工作区频道影子可在内置频道设置期间被执行
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，内置频道的设置与登录流程可能在插件被显式信任之前，解析来自不受信任工作区的频道影子（channel shadow）。恶意工作区插件若声明了某个内置频道 ID，即使处于禁用状态，也可能在频道设置阶段被执行。


    安全影响


    克隆的工作区可将内置频道的设置流程转变为来自不受信任工作区插件的非预期进程内代码执行，从而绕过设置与登录阶段本应存在的工作区插件信任边界。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：53c29df2a9eb242a70d0ff29f3d1e67c8d6801f0 —
    在设置解析阶段忽略不受信任工作区的频道影子
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2qrv-rc5x-2g2h
rule: 'version <= "2026.4.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-2qrv-rc5x-2g2h
