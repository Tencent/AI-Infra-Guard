info:
  name: openclaw
  cve: GHSA-36h3-7c54-j27r
  summary: OpenClaw 浏览器跟踪/下载路径在临时输出处理中的符号链接逃逸
  details: >-
    摘要

    浏览器跟踪/下载输出路径处理允许从受管临时根目录进行符号链接根和符号链接父级逃逸。


    受影响的包/版本

    - 包：openclaw（npm）

    - 最新发布的 npm 版本：2026.2.24

    - 受影响版本：<= 2026.2.24

    - 计划修复版本：2026.2.25


    影响

    具有相关本地立足点且能够影响输出路径的攻击者可以通过符号链接遍历将写入路由到预期临时根目录之外，导致任意文件覆盖。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。提交记录 - 496a76c03ba85e15ea715e5a583e498ae04d36e3
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-36h3-7c54-j27r
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-36h3-7c54-j27r
