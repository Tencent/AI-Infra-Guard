info:
  name: openclaw
  cve: GHSA-3c6h-g97w-fg78
  summary: OpenClaw tools.exec.safeBins sort 的 GNU 长选项缩写绕过可在白名单模式下跳过执行审批
  details: >-
    概述

    在 OpenClaw 中，tools.exec.safeBins 对 sort 的验证可以通过白名单模式下的 GNU 长选项缩写被绕过，从而允许应需要审批的免审批执行路径。


    受影响的软件包/版本

    - 生态系统：npm

    - 软件包：openclaw

    - 受影响范围：<= 2026.2.22-2

    - 已修复版本：2026.2.23


    影响

    当以下条件全部满足时：

    - tools.exec.security=allowlist

    - tools.exec.ask=on-miss

    - tools.exec.safeBins 包含 sort


    缩写的 GNU 长选项（例如 --compress-prog）可以绕过被拒绝标志检查并被视为满足白名单的安全二进制用法，从而跳过审批。


    根本原因

    长选项处理通过精确字符串匹配被拒绝标志，并接受带有内联值的未知长选项而非失败关闭。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: 升级 openclaw 至 >=2026.2.23 或更高版本。修复提交 - 3b8e33037ae2e12af7beb56fcf0346f1f8cbde6f
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3c6h-g97w-fg78
rule: version <= "2026.2.22-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3c6h-g97w-fg78
