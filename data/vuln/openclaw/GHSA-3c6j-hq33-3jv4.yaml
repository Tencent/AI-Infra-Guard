info:
  name: OpenClaw
  cve: GHSA-3c6j-hq33-3jv4
  summary: >-
    OpenClaw 已配对节点可能在缺乏 system.run 来源校验的情况下伪造 exec 生命周期事件
  details: >-
    漏洞概述


    OpenClaw 节点会向 Gateway 发送生命周期事件。在受影响版本中，已配对节点可能发送一个 exec 生命周期事件，而该事件在未经充分来源校验的情况下被接受，无法将其与授权的 system.run 请求关联。


    本问题影响节点事件边界。它不允许未经认证的调用方访问 Gateway；攻击者必须已控制一个已配对的节点连接。


    受影响配置


    本漏洞影响具有已配对节点的部署环境，且该节点能够向 Gateway 发送精心构造的 node.event 消息，并且目标 Agent/会话能够处理 exec 生命周期事件。


    影响


    恶意或已被攻陷的已配对节点可能使 Gateway 将攻击者提供的事件数据视为 exec 生命周期结果。在存在漏洞的执行流中，这可能引导目标会话进入 exec 事件路径，从而暴露节点精简接口本不应提供的能力。


    本问题的根本原因是对节点源生命周期事件缺乏来源校验。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    升级至 openclaw@2026.5.18 或更高版本。仅从受信任环境配对节点，并移除或重新配对可能已被攻陷的节点。
  cvss: CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.18 或更高版本。仅从受信任环境配对节点，并移除或重新配对可能已被攻陷的节点。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3c6j-hq33-3jv4
rule: version < "2026.5.18"
references:
