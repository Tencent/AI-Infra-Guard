info:
  name: OpenClaw
  cve: GHSA-3cw3-5vxw-g2h3
  summary: OpenClaw CLI 远程入驻流程在未经显式信任确认的情况下持久化未认证的发现端点，并导致网关凭据泄露
  details: >-
    漏洞概述


    远程入驻流程在持久化远程 URL 及连接配置前，未对已发现的网关端点进行显式信任确认。


    影响


    恶意或仿冒的发现端点可将入驻流程引导至攻击者控制的网关，进而捕获后续的网关凭据或通信流量。


    受影响组件


    src/commands/onboard-remote.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 d6affb17d8 修复（CLI：保存配置前确认已发现的远程网关）。
  cvss: ''
  severity: HIGH
  security_advise: '升级 openclaw 至 >= 2026.3.28 或更高版本。通过提交 d6affb17d8 修复（CLI：保存配置前确认已发现的远程网关）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3cw3-5vxw-g2h3
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3cw3-5vxw-g2h3
