info:
  name: OpenClaw
  cve: GHSA-3pm9-5j7m-59vc
  summary: OpenClaw Tlon 启动迁移过程将文件配置中的空数组撤销项重新加载
  details: >-
    漏洞概述

    Tlon 启动迁移过程将文件配置中的空数组撤销项重新加载


    维护者现状评估

    - 状态：未修复（open）

    - 标准化严重等级：低危

    - 评估说明：v2026.3.28 版本的启动迁移逻辑仍将空数组配置项视为缺失值，服务重启后可能从文件状态中重新加载已撤销的 Tlon 配置。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - a4d72a83f01fedd35964c352e3473c7712a3511b — 2026-03-31T14:57:03+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3pm9-5j7m-59vc
rule: version <= "2026.3.28"
