info:
  name: OpenClaw
  cve: GHSA-3q42-xmxv-9vfr
  summary: OpenClaw Gateway operator.write 可通过 chat.send 接口访问管理员级 Talk 语音配置并实现持久化
  details: >-
    漏洞概述

    Gateway operator.write 可通过 chat.send 接口访问管理员级 Talk 语音配置并实现持久化


    维护者评估

    - 状态：有限范围

    - 标准化严重等级：中危

    - 评估：已发布版本中存在 operator.write 写入管理员级 Talk 语音配置持久化的漏洞，
      但与前述问题属于同一类有限范围的经过身份验证的持久化漏洞，严重等级应低于高危。


    受影响的软件包及版本

    - 软件包：openclaw（npm）

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.24

    - 已修复版本：>= 2026.3.28

    - 包含修复的首个稳定标签：v2026.3.28
  cvss: ''
  severity: MEDIUM
