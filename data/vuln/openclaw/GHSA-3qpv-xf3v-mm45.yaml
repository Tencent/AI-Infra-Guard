info:
  name: OpenClaw
  cve: GHSA-3qpv-xf3v-mm45
  summary: OpenClaw 工作区 .env 文件可覆盖内置 Hooks 根目录并加载攻击者控制的 Hook 代码
  details: >-
    漏洞概述

    工作区 .env 文件可覆盖内置 Hooks 根目录并加载攻击者控制的 Hook 代码


    维护者现状评估

    - 状态：未修复（open）

    - 标准化严重等级：高危

    - 评估说明：v2026.3.28 版本仍允许工作区 .env 文件覆盖 OPENCLAW_BUNDLED_HOOKS_DIR 环境变量，攻击者可通过不可信工作区替换默认启用的内置受信 Hooks。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: HIGH
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 330a9f98cb29c79b1c16a2117e03d6276a0d6289 — 2026-03-31T19:25:12+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3qpv-xf3v-mm45
rule: version <= "2026.3.28"
