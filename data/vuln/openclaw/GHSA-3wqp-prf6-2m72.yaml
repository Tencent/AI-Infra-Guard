info:
  name: OpenClaw
  cve: GHSA-3wqp-prf6-2m72
  summary: OpenClaw 飞书动态 Agent 绑定可能绕过 configWrites 强制策略
  details: >-
    漏洞概述


    飞书动态 Agent 绑定可能绕过 configWrites 强制策略。在受影响版本中，使用动态 Agent 绑定行为的飞书发送方可能在未遵守已配置的配置写入控制策略的情况下创建或更新绑定关系。


    本安全公告仅适用于上述特定功能和配置。它不改变 OpenClaw 的受信任操作员模型：已认证的 Gateway 操作员、已安装的插件以及有意的本地执行接口仍保持受信任状态，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，此漏洞可能导致发送方与 Agent 的绑定状态超出预期策略范围。实际影响取决于操作员的配置，以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.6。


    缓解措施


    在不需要时，完成修补之前禁用发送方创建飞书动态 Agent 绑定的功能。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:N/I:L/A:N
  severity: LOW
  security_advise: >-
    将 openclaw 升级至 2026.5.6 或更高版本。在不需要时，完成修补之前禁用发送方创建飞书动态 Agent 绑定的功能。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3wqp-prf6-2m72
rule: version <= "2026.5.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3wqp-prf6-2m72
