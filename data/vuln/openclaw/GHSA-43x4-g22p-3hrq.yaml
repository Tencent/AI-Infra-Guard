info:
  name: OpenClaw
  cve: GHSA-43x4-g22p-3hrq
  summary: OpenClaw Chrome --no-sandbox 在沙箱浏览器容器中禁用了操作系统级浏览器沙箱
  details: >-
    摘要

    沙箱浏览器容器默认使用 --no-sandbox 启动 Chromium，禁用了 Chromium 的操作系统级沙箱保护。


    受影响的包/版本

    - 包：openclaw（npm 生态系统）

    - 分类时最新发布的 npm 版本（2026-02-21）：2026.2.19-2

    - 受影响范围：<= 2026.2.19-2

    - 下一版本计划修复版本：2026.2.21


    影响

    当默认启用 --no-sandbox 时，渲染器被攻陷后不再需要单独的沙箱逃逸。这削弱了容器浏览器隔离并增加了渲染器端缺陷的影响。


    解决方案

    - 从沙箱浏览器入口点移除默认 --no-sandbox。

    - 通过 OPENCLAW_BROWSER_NO_SANDBOX / CLAWDBOT_BROWSER_NO_SANDBOX 添加显式选择启用。

    - 添加浏览器容器哈希迁移 + 安全审计检查，以便发现过期容器并可安全重建。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >=2026.2.21 或更高版本。提交记录 - e7eba01efc4c3c400e9cfd3ce3d661cbc788a631 -
    1835dec2004fe7a62c6a7ba46b8485f124ec6199
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-43x4-g22p-3hrq
rule: version <= "2026.2.19-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-43x4-g22p-3hrq
