info:
  name: OpenClaw
  cve: GHSA-4g5x-2jfc-xm98
  summary: OpenClaw Tlon 媒体下载可绕过核心安全限制并耗尽磁盘空间
  details: >-
    漏洞摘要

    Tlon 媒体下载可绕过核心安全限制并耗尽磁盘空间


    当前维护者研判

    - 状态：范围收窄

    - 标准化严重等级：低危

    - 研判说明：已发布的 v2026.3.28 版本中，Tlon 媒体下载绕过了核心的文件大小、数量及清理限制，但该问题仅影响内置插件路径的可用性，属于资源耗尽类问题，因此评定为低危。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
