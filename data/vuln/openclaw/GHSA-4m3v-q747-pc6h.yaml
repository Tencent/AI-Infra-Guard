info:
  name: OpenClaw
  cve: GHSA-4m3v-q747-pc6h
  summary: OpenClaw Mattermost Slash 令牌撤销可能延迟至监控器刷新后才生效
  details: >-
    漏洞概述


    Mattermost Slash 令牌撤销可能延迟至监控器刷新后才生效。在受影响版本中，在监控器刷新窗口期内持有旧 Mattermost Slash 令牌的调用方，可能在监控器完成刷新之前继续使用旧令牌。


    本安全公告仅适用于上述特定功能和配置。它不改变 OpenClaw 的受信任操作员模型：已认证的 Gateway 操作员、已安装的插件以及有意的本地执行接口仍保持受信任状态，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，此漏洞可能导致在令牌撤销后短暂地继续执行 Slash 命令行为。实际影响取决于操作员的配置，以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.24。


    缓解措施


    在完成修补之前，轮换令牌后重启或刷新 Mattermost 监控器。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.24 或更高版本。在完成修补之前，轮换令牌后重启或刷新 Mattermost 监控器。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4m3v-q747-pc6h
rule: version <= "2026.4.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4m3v-q747-pc6h
