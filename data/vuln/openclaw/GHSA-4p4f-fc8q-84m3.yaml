info:
  name: OpenClaw
  cve: GHSA-4p4f-fc8q-84m3
  summary: OpenClaw iOS A2UI 桥接层将通用本地网络页面视为可信来源，允许 agent.request 调度
  details: "摘要\r\n在 OpenClaw 2026.4.2 之前，iOS A2UI 桥接层将通用本地网络页面视为可信的桥接来源。从本地网络或\
    \ tailnet 主机加载的页面可在未经严格可信 canvas 来源校验的情况下触发 agent.request 调度。\r\n\r\n影响\r\n\
    攻击者控制的已加载页面可向活跃的 iOS 节点会话注入未经授权的非所有者 agent.request 运行，污染会话状态并消耗配额。\
    已验证的影响不涉及所有者专属操作或任意宿主机代码执行。\r\n\r\n受影响的软件包 / 版本\r\n- 软件包：openclaw (npm)\r\n\
    - 受影响版本：<= 2026.4.1\r\n- 已修复版本：>= 2026.4.2\r\n- npm 最新发布版本：2026.4.1"
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交 49d08382a90f71dabe2877b3f6729ad85f808d57 —
    将 A2UI 动作调度限制为可信 canvas URL
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4p4f-fc8q-84m3
rule: 'version <= "2026.4.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4p4f-fc8q-84m3
