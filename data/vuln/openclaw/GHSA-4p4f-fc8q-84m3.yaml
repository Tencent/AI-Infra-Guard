info:
  name: OpenClaw
  cve: GHSA-4p4f-fc8q-84m3
  summary: OpenClaw iOS A2UI 桥接层对通用本地网络页面信任过度，可触发 agent.request 调度
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，iOS A2UI 桥接层将来自通用本地网络页面的请求视为受信任桥接来源。从本地网络或 Tailnet 主机加载的页面无需通过更严格的受信任画布（trusted canvas）来源校验，即可触发 agent.request 调度。


    安全影响


    攻击者控制的已加载页面可向当前活跃的 iOS 节点会话注入未经授权的非所有者 agent.request 执行请求，造成会话状态污染及预算消耗。经验证的影响范围不包括所有者专属操作或任意宿主命令执行。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：49d08382a90f71dabe2877b3f6729ad85f808d57 —
    将 A2UI 动作调度限制为受信任画布 URL
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4p4f-fc8q-84m3
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4p4f-fc8q-84m3
