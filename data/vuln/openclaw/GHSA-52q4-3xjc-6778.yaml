info:
  name: OpenClaw
  cve: GHSA-52q4-3xjc-6778
  summary: OpenClaw Google Chat 通过可变 Space displayName 进行群组策略重绑定实现授权绕过
  details: >-
    漏洞概述


    Google Chat 通过可变 Space displayName 进行群组策略重绑定实现授权绕过


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    Google Chat 群组授权此前依赖可变的 Space 显示名称进行访问决策，
    当名称变更或发生冲突时会导致策略重绑定攻击。
    提交 11ea1f67863d88b6cbcb229dd368a45e07094bff 要求使用稳定的群组 ID 进行访问决策。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 11ea1f67863d88b6cbcb229dd368a45e07094bff 在 main 分支修复。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：11ea1f67863d88b6cbcb229dd368a45e07094bff
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-52q4-3xjc-6778
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-52q4-3xjc-6778
