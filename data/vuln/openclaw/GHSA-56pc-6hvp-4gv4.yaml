info:
  name: openclaw
  cve: GHSA-56pc-6hvp-4gv4
  summary: OpenClaw OC-06：通过 $include 指令读取任意文件
  details: >-
    漏洞


    配置 $include 解析中的路径遍历允许读取配置目录边界之外的任意本地文件（CWE-22）。


    攻击向量


    1. 如果攻击者可以修改 OpenClaw 配置，他们可以将 $include 设置为绝对路径（例如 /etc/passwd）并读取 OpenClaw 进程可访问的文件。

    2. 如果攻击者可以修改 OpenClaw 配置，他们可以使用遍历路径（例如 ../../...）来逃逸配置目录。

    3. 如果攻击者可以在配置目录内创建符号链接，除非强制执行实际路径检查，否则他们可以将 include 指向外部文件。

    4. 影响范围受 OpenClaw 运行时用户的文件权限限制；此漏洞本身不是未认证的仅远程向量。


    影响


    成功利用可暴露 OpenClaw 进程用户可读的本地密钥和凭据，包括 API 密钥和私有配置材料。


    受影响的包/版本


    - 包：openclaw（npm）

    - 受影响版本：<=2026.2.15

    - 已修复版本：>=2026.2.17
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >=2026.2.17 或更高版本。提交记录 - d1c00dbb7c64a39e205464dae7f2a068420e91c1
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-56pc-6hvp-4gv4
rule: version <= "2026.2.15"
