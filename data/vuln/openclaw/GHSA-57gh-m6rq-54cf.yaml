info:
  name: OpenClaw
  cve: GHSA-57gh-m6rq-54cf
  summary: OpenClaw <code>appendLocalMediaParentRoots</code> 媒体本地根目录自动加白机制允许模型发起任意宿主机文件读取及凭证窃取
  details: >-
    摘要

    <code>appendLocalMediaParentRoots</code> 媒体本地根目录自动加白机制允许模型发起任意宿主机文件读取及凭证窃取


    维护者风险评估

    - 状态：范围受限

    - 标准化严重等级：中危

    - 评估：v2026.3.28 版本的 src/media/local-roots.ts 中仍存在媒体父目录自动加入白名单的问题，但该行为仅在配置已允许 tool-fs 根目录扩展的前提下才会触发，因此实际影响范围比默认"严重"定级更为有限。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 1ca4261d7e055d0be141ed79ebb1365d0fbc7364 — 2026-03-30T17:15:03+01:00
