info:
  name: OpenClaw
  cve: GHSA-58q2-7r52-jq62
  summary: OpenClaw ACP 调度中通过入站信道附件路径进行路径遍历，导致任意文件读取
  details: >-
    漏洞概述

    ACP 调度中通过入站信道附件路径进行路径遍历（Path Traversal），导致任意文件读取


    维护者评估

    - 状态：待修复

    - 标准化严重等级：中危

    - 评估说明：v2026.3.28 的 ACP 调度仍可读取附件缓存或根路径校验之外的附件路径，根路径强制限制的修复方案尚未发布。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：566fb73d9da2d73c0be0d9b8e5b762e4dcd8e81d — 2026-03-30T14:04:02+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-58q2-7r52-jq62
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-58q2-7r52-jq62
