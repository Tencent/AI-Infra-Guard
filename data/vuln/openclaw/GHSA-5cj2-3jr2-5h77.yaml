info:
  name: OpenClaw
  cve: GHSA-5cj2-3jr2-5h77
  summary: OpenClaw Shell 位置参数可能削弱严格内联求值检查
  details: >-
    漏洞概述


    Shell 位置参数可能削弱严格内联求值检查。在受影响版本中，将白名单工具与 Shell 位置参数组合使用的命令请求，可能将内联求值内容放置于不受严格检查覆盖的 Shell 载体中执行。


    本安全公告仅适用于上述特定功能和配置。它不改变 OpenClaw 的受信任操作员模型：已认证的 Gateway 操作员、已安装的插件以及有意的本地执行接口仍保持受信任状态，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，此漏洞可能导致 Shell 提供的内容在预期白名单规则之外被执行。实际影响取决于操作员的配置，以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.2。


    缓解措施


    在完成修补之前，避免将 Shell 载体模式加入白名单，并对 Shell 包装器要求显式审批。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.2 或更高版本。在完成修补之前，避免将 Shell 载体模式加入白名单，并对 Shell 包装器要求显式审批。作为通用加固措施，保持渠道和工具白名单的精简，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5cj2-3jr2-5h77
rule: version < "2026.4.2"
references:
