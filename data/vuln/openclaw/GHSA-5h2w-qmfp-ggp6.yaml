info:
  name: OpenClaw
  cve: GHSA-5h2w-qmfp-ggp6
  summary: OpenClaw Gateway `operator.write` 权限可通过 `chat.send` `/verbose` 指令绕过限制，访问仅限管理员的持久化 `verboseLevel` 配置
  details: >-
    摘要


    chat.send 调用路径允许持有 write 作用域的授权调用方持久化 /verbose 会话覆盖配置，而相同的存储会话变更操作在 sessions.patch 接口中本应仅限管理员使用。


    影响


    持有 write 作用域的 Gateway 调用方可持久化详细输出设置，影响后续运行行为，暴露超出运营商预期的推理过程或工具调用输出信息。


    受影响组件


    src/auto-reply/reply/directive-handling.impl.ts, src/gateway/sessions-patch.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 c603123528 修复（fix(gateway)：持久化 verbose 默认值需要管理员权限）。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 c603123528 修复（fix(gateway)：持久化 verbose 默认值需要管理员权限）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5h2w-qmfp-ggp6
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5h2w-qmfp-ggp6
