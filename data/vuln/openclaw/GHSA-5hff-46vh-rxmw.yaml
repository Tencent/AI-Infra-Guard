info:
  name: OpenClaw
  cve: GHSA-5hff-46vh-rxmw
  summary: OpenClaw 具有只读权限范围的身份认证 HTTP 客户端可通过 /sessions/:sessionKey/kill 终止会话
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，POST /sessions/:sessionKey/kill 接口在身份认证 HTTP 模式下未强制校验写权限范围（write scope）。被限制为只读操作权限的调用方仍可终止正在运行的子代理会话。


    安全影响


    具有只读权限的调用方可执行写权限级别的控制平面变更操作，从而中断已委派的工作任务。这是一个 HTTP 权限范围边界上的授权漏洞，而非共享密钥兼容性异常问题。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：54a0878517167c6e49900498cf77420dadb74beb —
    强制执行会话终止接口的 HTTP 权限范围校验
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5hff-46vh-rxmw
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5hff-46vh-rxmw
