info:
  name: OpenClaw
  cve: GHSA-5jvj-hxmh-6h6j
  summary: OpenClaw Gateway HTTP 会话历史路由绕过 Operator Read 权限范围校验
  details: >-
    漏洞概述


    Gateway HTTP 会话历史路由绕过 Operator Read 权限范围校验


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    HTTP /sessions/:sessionKey/history 路由此前虽对 Bearer Token 进行认证，但跳过了 WebSocket
    chat.history 所使用的 operator.read 校验。提交 1c45123231516fa50f8cf8522ba5ff2fb2ca7aea
    要求 HTTP 调用方声明 Operator 权限范围，并拒绝不包含 operator.read 的历史记录读取请求。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 1c45123231516fa50f8cf8522ba5ff2fb2ca7aea 在 main 分支修复。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：1c45123231516fa50f8cf8522ba5ff2fb2ca7aea
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5jvj-hxmh-6h6j
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5jvj-hxmh-6h6j
