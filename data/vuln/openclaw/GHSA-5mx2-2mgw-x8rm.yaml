info:
  name: OpenClaw
  cve: GHSA-5mx2-2mgw-x8rm
  summary: OpenClaw BlueBubbles 测试版插件 Webhook 认证加固（移除免密回退路径）
  details: >-
    概述

    可选的测试版 iMessage 插件中的 BlueBubbles webhook 认证允许免密回退路径。在某些反向代理/本地路由配置中，这可能允许未经认证的 webhook 事件。


    受影响的组件和范围

    - 组件：extensions/bluebubbles webhook 处理器

    - 范围：仅影响使用可选 BlueBubbles 插件且未为传入 webhook 事件配置 webhook 密码认证的部署


    受影响的包/版本

    - 包名：openclaw/openclaw (npm)

    - 分类时最新发布的 npm 版本（2026-02-21）：2026.2.19-2

    - 受影响的结构化范围：<=2026.2.19-2

    - 已在主线修复；计划的修复版本：2026.2.21（>=2026.2.21）


    详细信息

    漏洞实现包含多个认证分支，其中包括一个带有环回/代理启发式的免密回退路径。


    修复措施现在使用单一认证代码路径：

    - 入站 webhook token/guid 必须匹配 channels.bluebubbles.password

    - webhook 目标匹配整合到共享的 plugin-sdk 逻辑中

    - BlueBubbles 配置验证现在在设置 serverUrl 时要求提供密码


    影响

    BlueBubbles 是一个可选的测试版 iMessage 插件，入门/频道添加流程已经需要密码。实际暴露主要是省略了 webhook 密码认证的自定义/手动配置。


    修复措施

    - 升级到包含此补丁的版本（>=2026.2.21，已计划）。

    - 确保 BlueBubbles webhook 传递包含匹配的密码（?password=<password> 或 x-password）。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >=2026.2.21 或更高版本。修复提交 - 6b2f2811dc623e5faaf2f76afaa9279637174590 - 283029bdea23164ab7482b320cb420d1b90df806
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5mx2-2mgw-x8rm
rule: version <= "2026.2.19-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5mx2-2mgw-x8rm
