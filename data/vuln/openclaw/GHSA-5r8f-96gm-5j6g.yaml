info:
  name: OpenClaw
  cve: GHSA-5r8f-96gm-5j6g
  summary: OpenClaw Gateway `operator.write` 权限可通过 `chat.send` `/reset` 指令绕过限制，触发仅限管理员的会话重置操作
  details: >-
    摘要


    chat.send 调用路径复用了命令授权机制来触发 /reset 会话轮换，而直接的会话重置本应是仅限管理员的控制平面操作。


    影响


    持有 write 作用域的 Gateway 调用方可在未获得管理员权限的情况下，轮换目标会话、归档先前的会话记录状态，并强制生成新的会话标识符。


    受影响组件


    src/gateway/server-methods/chat.ts, src/auto-reply/reply/session.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 be00fcfccb 修复（Gateway：对齐 chat.send reset 操作的权限作用域检查）。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 be00fcfccb 修复（Gateway：对齐 chat.send reset 操作的权限作用域检查）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5r8f-96gm-5j6g
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5r8f-96gm-5j6g
