info:
  name: openclaw
  cve: GHSA-62f6-mrcj-v8h5
  summary: OpenClaw 运行时 /debug 覆盖路径接受原型保留键
  details: >-
    概述

    OpenClaw 在运行时 /debug set 覆盖对象值中接受原型保留键（__proto__、constructor、prototype）。


    影响

    /debug 默认禁用，利用需要已授权的 /debug set 调用者。未发现未经认证的攻击向量。


    此问题仅影响运行时内存覆盖（非持久化，在重启/重置时清除）。鉴于所需的先前授权边界，这被视为命令标志评估的纵深防御加固。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 最新发布的已确认受影响版本：2026.2.19-2

    - 受影响范围：<= 2026.2.19-2

    - 在计划的下一个发布版本中修复：2026.2.21


    技术细节

    - 运行时覆盖合并现在在深度合并期间阻止保留原型键。

    - 运行时覆盖写入现在在存储覆盖之前净化嵌套对象值以移除保留原型键。

    - 受限命令门控（bash、config、debug）现在要求自有属性布尔标志，防止继承的原型值启用命令。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >=2026.2.21 或更高版本。修复提交 - fbb79d4013000552d6a2c23b9613d8b3cb92f6b6
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-62f6-mrcj-v8h5
rule: version <= "2026.2.19-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-62f6-mrcj-v8h5
