info:
  name: OpenClaw
  cve: GHSA-6336-qqw9-v6x6
  summary: OpenClaw Discord 组件交互将群组私信（Group DM）错误分类为直接消息（Direct Message）
  details: >-
    漏洞概述

    Discord 组件交互将群组私信（Group DM）错误分类为直接消息（Direct Message）


    维护者评估

    - 状态：范围已收窄

    - 标准化严重等级：低危

    - 评估说明：在已发布的 v2026.3.24 中，extensions/discord/src/monitor/agent-components-helpers.ts 的组件交互路由与认证逻辑确实存在此问题，但影响范围仅限于群组私信策略或会话分类错误。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：8c83128fc38d5a3642b8ccbea58550755fdbbbaf — 2026-03-30T11:17:53-06:00
  references:
