info:
  name: OpenClaw
  cve: GHSA-68f8-9mhj-h2mp
  summary: OpenClaw Gateway HTTP /v1/models 路由绕过运营商读取权限作用域校验
  details: "> 已在 OpenClaw 2026.3.24（当前正式发布版本）中修复。\r\n\r\n漏洞概述\r\n\r\nOpenAI 兼容 HTTP 端点 /v1/models 接受 Bearer 认证，但未强制执行运营商方法作用域校验。\r\
    \n\r\n相比之下，WebSocket RPC 路径对 models.list 操作强制要求 operator.read 权限。\r\n\r\n仅持有 operator.approvals 权限（无读取权限）的调用方在通过\
    \ WebSocket 调用 models.list 时会被拒绝（缺少权限：operator.read），但仍可通过 HTTP /v1/models 枚举模型元数据。\r\n\r\n已在提交 06de515b6c42816b62ec752e1c221cab67b38501\
    \ 的当前主分支上复现。\r\n\r\n漏洞详情\r\n\r\nWebSocket 控制平面路径在分发方法前集中执行角色/作用域校验。对于非管理员运营商，这包括必要的方法作用域校验，例如 models.list 需要 operator.read\
    \ 权限。\r\n\r\nHTTP 兼容路径 /v1/models 执行 Bearer 授权后直接返回模型元数据，未应用等效的作用域校验。\r\n\r\n经复现，仅持有 operator.approvals 权限的调用方可以：\r\
    \n\r\n1. 成功建立连接；\r\n2. 通过 WebSocket 调用 models.list 时因缺少 operator.read 权限而被拒绝；\r\n3. 通过 HTTP /v1/models 获取状态码 200 及模型数据。\r\
    \n\r\n这是一种跨接口授权不一致性问题，较严格的 WebSocket 策略可被 HTTP 接口绕过。\r\n\r\n安全影响\r\n\r\n- 缺少 operator.read 权限的调用方仍可通过 HTTP 兼容路由枚举 Gateway 模型元数据。\r\
    \n- 破坏了 WebSocket RPC 与 HTTP 接口之间的作用域模型一致性。\r\n- 削弱了仅授予非读取权限运营商的最小权限预期。\r\n\r\n修复建议\r\n\r\n1) 在 /v1/models 路由上强制执行读取作用域\r\
    \n\r\n在提供 /v1/models 或 /v1/models/:id 服务前，应用与 models.list 等效的作用域门控校验。\r\n\r\n2) 在 HTTP 兼容端点中复用集中式作用域授权辅助函数\r\n\r\n使用与\
    \ WebSocket 分发相同的运营商作用域逻辑（authorizeOperatorScopesForMethod(...)），防止策略漂移。\r\n\r\n3) 补充回归测试\r\n\r\n保留此概念验证（PoC）并添加明确的正/负向控制测试用例：\r\
    \n\r\n- 无读取权限的 operator.approvals 调用 HTTP /... 应被拒绝。"
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.24 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-68f8-9mhj-h2mp
rule: 'version <= "2026.3.23"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-68f8-9mhj-h2mp
