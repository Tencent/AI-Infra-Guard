info:
  name: OpenClaw
  cve: GHSA-68v4-hmwv-f43h
  summary: OpenClaw 媒体下载跨源重定向时携带 Authorization 头，导致凭证泄露
  details: >-
    摘要

    媒体下载跨源重定向时携带 Authorization 头，导致凭证泄露


    维护者风险评估

    - 状态：开放

    - 标准化严重等级：中危

    - 评估：已发布的 v2026.3.28 版本中，媒体下载在跨源重定向时转发 Authorization 头，属于真实存在的凭证泄露漏洞类型，符合中危等级。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
