info:
  name: OpenClaw
  cve: GHSA-6c4r-g249-wv3c
  summary: >-
    OpenClaw 沙箱会话派生可能向子提示词暴露真实工作区路径
  details: >-
    概述


    沙箱会话派生可能向子提示词暴露真实工作区路径。在受影响版本中，从沙箱父会话派生的子会话可能将宿主工作区路径转发至子会话的提示词中。


    本安全公告仅限于上述命名功能及其配置范围。它不改变 OpenClaw 的可信运营者模型：已认证的 Gateway 运营者、已安装的插件以及经过授权的本地执行面仍属于可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，可能向子模型泄露宿主工作区位置或相关内存上下文。实际影响取决于运营者的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.26。


    缓解措施


    在完成修复之前，避免从敏感沙箱工作区派生子会话。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.26 或更高版本。在完成修复之前，避免从敏感沙箱工作区派生子会话。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6c4r-g249-wv3c
rule: version <= "2026.4.25"
references:
