info:
  name: openclaw
  cve: GHSA-6c9j-x93c-rw6j
  summary: OpenClaw safeBins 文件存在性探测信息泄露漏洞
  details: >-
    OpenClaw 的 tools.exec.safeBins 审批流程中存在一个信息泄露漏洞，允许文件存在性探测。

    当 safe-bin 验证检查候选文件路径时，命令允许/拒绝行为可能因路径是否已存在于主机文件系统上而不同。攻击者可以通过比较已存在与不存在文件名的结果来探测文件是否存在。

    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.17

    - 分类时最新发布的受影响版本：2026.2.17

    - 计划的已修复版本：2026.2.18

    影响

    能够访问此执行面的攻击者可以推断特定文件是否存在（例如密钥/配置文件），从而实现文件系统枚举并改进后续攻击规划。

    修复

    safe-bin 策略已更改为确定性的仅 argv 验证，不进行主机文件存在性检查。面向文件的标志在 safe-bin 模式下被阻止（例如 sort -o、jq -f、grep -f），可信路径检查仍然强制执行。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.18 或更高版本。safe-bin 策略已更改为确定性的仅 argv 验证，不进行主机文件存在性检查。面向文件的标志在 safe-bin 模式下被阻止（例如 sort -o、jq -f、grep -f），可信路径检查仍然强制执行。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6c9j-x93c-rw6j
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6c9j-x93c-rw6j
