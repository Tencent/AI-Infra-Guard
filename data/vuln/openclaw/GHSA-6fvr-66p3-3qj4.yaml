info:
  name: OpenClaw
  cve: GHSA-6fvr-66p3-3qj4
  summary: OpenClaw Hook 触发的 CLI 运行可能获得所有者级别的 MCP 工具权限
  details: >-
    概述


    OpenClaw Hook 入口可使用已配置的 Hook 令牌启动自动化 Agent 运行。在受影响版本中，由 Hook 触发的运行可能选择某个内置 CLI 后端，该后端会获得所有者级别的 MCP 回环权限，而非 Hook 入口所对应的适当权限范围。


    此问题影响 Hook 令牌自动化与所有者专属 MCP 工具之间的权限边界。对于已禁用 Hook 的部署，本问题不受影响。


    受影响配置


    本问题影响以下场景：Hook 已启用、/hooks/agent 端点可使用有效 Hook 令牌访问，且 Hook 触发运行时可选择内置 CLI 后端。


    影响


    持有 Hook 令牌的调用者可能导致所派生的 CLI 运行时访问或调用本应仅限所有者使用的 MCP 工具。实际影响取决于可用的 MCP 工具；报告的验证示例以持久化 cron 状态作为所有者专属操作的代表性案例。


    已修复版本


    首个稳定修复版本为 2026.5.20。


    已在 2026.5.20 稳定版本中修复。


    缓解措施


    升级至 openclaw@2026.5.20 或更高版本。保持 Hook 令牌的机密性，限制对 Hook 端点的网络访问，并在不需要时禁用 Hook 功能。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:C/C:H/I:H/A:L
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.20 或更高版本。保持 Hook 令牌的机密性，限制对 Hook 端点的网络访问，并在不需要时禁用 Hook 功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6fvr-66p3-3qj4
rule: version < "2026.5.20"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6fvr-66p3-3qj4
