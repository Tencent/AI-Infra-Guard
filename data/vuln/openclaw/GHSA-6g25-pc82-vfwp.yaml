info:
  name: OpenClaw
  cve: GHSA-6g25-pc82-vfwp
  summary: OpenClaw macOS 测试版入门引导流程通过 OAuth state 暴露 PKCE verifier
  details: >-
    概述


    受影响的攻击面是 OpenClaw macOS 应用入门引导流程，该 macOS 应用目前处于测试阶段。

    在该测试版入门引导流程中，Anthropic OAuth 将 PKCE code_verifier 值用作 OAuth state，导致该密钥在前端通道 URL state 中暴露。


    受影响的包/版本


    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.24（分类时最新发布的 npm 版本）

    - 受影响攻击面：macOS 应用测试版入门引导路径 (apps/macos)

    - 不受影响：核心 CLI/网关入门引导路径

    - 已修复版本：2026.2.25


    影响


    范围限于 macOS 测试版入门引导 OAuth 路径。利用需要在该流程期间同时获取 OAuth 授权凭证和暴露的 state 值。


    修复措施


    OpenClaw 从 macOS 入门引导中移除了 Anthropic OAuth 登录，现在在此路径中支持仅使用 setup-token 的 Anthropic 订阅认证。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。修复提交 - 8f3310000a8b0c11eced054c2cdb6fb27803511a
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6g25-pc82-vfwp
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6g25-pc82-vfwp
