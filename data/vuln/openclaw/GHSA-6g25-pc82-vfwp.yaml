info:
  name: OpenClaw
  cve: GHSA-6g25-pc82-vfwp
  summary: OpenClaw macOS beta onboarding exposed PKCE verifier via OAuth state
  details: >-
    漏洞概述

    OpenClaw 安全漏洞。OpenClaw macOS beta onboarding exposed PKCE verifier via OAuth state。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响：<= 2026.2.24 (latest published npm at triage time)
    - 已修复：2026.2.25

    安全影响

    Scope is limited to the macOS beta onboarding OAuth path. Exploitation required obtaining both OAuth authorization artifacts and exposed state values during that flow.

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 低危
  security_advise: '建议将 OpenClaw 升级至 >= 2026.2.25 或更高版本。 修复提交 - 8f3310000a8b0c11eced054c2cdb6fb27803511a'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6g25-pc82-vfwp
rule: 'version <= "2026.2.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6g25-pc82-vfwp
