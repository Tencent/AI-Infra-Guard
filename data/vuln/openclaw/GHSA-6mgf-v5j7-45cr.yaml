info:
  name: openclaw
  cve: GHSA-6mgf-v5j7-45cr
  summary: OpenClaw fetch-guard 在跨域重定向时转发自定义授权请求头
  details: >-
    OpenClaw 的 fetchWithSsrFGuard(...) 在跟随跨域重定向时保留了任意调用方提供的请求头，仅排除了一个狭窄的拒绝列表（Authorization、
    Proxy-Authorization、Cookie、Cookie2）。这导致自定义授权请求头（如 X-Api-Key、Private-Token 等敏感头）在重定向后被转发到
    不同的源站。


    修复方案将跨域重定向处理从狭窄的敏感头拒绝列表切换为安全头允许列表，因此仅有内容协商和缓存验证等无害请求头能在源站变更后保留。


    受影响的包/版本


    - 包名: openclaw (npm)

    - 受影响版本: <= 2026.3.2

    - 修复版本: 2026.3.7

    - 补丁发布时 npm 最新发布版本: 2026.3.2


    影响


    能够触发跨域重定向的远程服务可以接收到 OpenClaw 调用方附加的自定义授权凭据。这可能暴露仅用于原始目标的 API 密钥、承载式自定义请求头
    或私有 Token 头。


    验证


    - pnpm check 通过

    - pnpm test:fast 通过

    - 专项重定向回归测试通过

    - pnpm exec vitest run --config vitest.gateway.config.ts 在 src/gateway/server-channels.test.ts 和
    src/gateway/server-methods/agents-mutate.test.ts 中仍存在无关的主分支已有失败
  cvss: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:C/C:H/I:L/A:N
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.7 或更高版本。提交记录 - 46715371b0612a6f9114dffd1466941ac476cef5
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6mgf-v5j7-45cr
rule: version <= "2026.3.2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6mgf-v5j7-45cr
