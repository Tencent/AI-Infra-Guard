info:
  name: OpenClaw
  cve: GHSA-6pfc-6m7w-m8fx
  summary: OpenClaw Gateway 执行命令白名单"永久允许"策略可通过未注册的 /usr/bin/script 包装器绕过
  details: >-
    漏洞概述


    "永久允许"持久化信任决策在存储前，未对 /usr/bin/script 及类似包装器进行解包，以获取实际执行的目标二进制文件。


    安全影响


    用户对某一包装命令的授权批准，可能将信任关系持久化至该包装二进制文件，导致后续执行不同底层程序时仍能复用该信任，形成安全绕过。


    受影响组件


    src/infra/dispatch-wrapper-resolution.ts, src/infra/exec-wrapper-resolution.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    由提交 83da3cfe31 修复（infra: unwrap script wrapper approval targets，基础设施：解包 script 包装器审批目标）。
  cvss: ''
  severity: HIGH
  security_advise: '升级 openclaw 至 >= 2026.3.28 或更高版本。由提交 83da3cfe31 修复（infra: unwrap script wrapper approval targets，基础设施：解包 script 包装器审批目标）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6pfc-6m7w-m8fx
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6pfc-6m7w-m8fx
