info:
  name: openclaw
  cve: GHSA-6rcp-vxwf-3mfp
  summary: OpenClaw system.run Shell 包装器位置参数载体可在误导性审批文本下执行隐藏命令
  details: >-
    概述

    在 openclaw 截至并包含 2026.2.23 版本（截至2026年2月25日最新的 npm 发布版本）中，system.run Shell 包装器输入可能呈现误导性的审批/显示文本，同时仍携带在运行时执行的隐藏位置参数 argv 载荷。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.23

    - 已修复版本：>= 2026.2.24（计划的下一个发布版本）


    根本原因

    对于 Shell 包装器形式（例如 /bin/sh -c ...），命令文本绑定可能聚焦于内联 Shell 载荷文本，而运行时执行仍使用完整的 argv 向量。因此，内联载荷之后的位置参数 argv 载体可能在不完整的显示上下文下被执行。


    安全影响

    审批/显示上下文可能遗漏已执行的 argv 载体，导致在误导性操作员可见文本下执行隐藏命令。


    修复

    - 检测携带尾部位置 argv 值的 Shell 包装器内联命令形式。

    - 将审批/显示命令文本绑定到这些载体形式的完整格式化 argv。

    - 当 rawCommand 值与这些形式的执行绑定 argv 上下文不匹配时，拒绝仅载荷的 rawCommand 值。

    - 将规范命令显示文本转发到 macOS 伴侣执行主机，并在那里对载体包装器和 env 修饰符 Shell 前导进行 rawCommand/argv 一致性验证。


    验证

    - pnpm check

    - pnpm exec vitest run --config vitest.gateway.config.ts

    - pnpm test:fast

    - pnpm vitest run src/infra/system-run-command.test.ts src/node-host/invoke-system-run.test.ts src/cli/nodes-cli.coverage.test.ts src/gateway/node-invoke-system-run-approval.test.ts

    - cd apps/macos && swift test --filter ExecSystemRunCommandValidatorTests
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.24 或更高版本。- 检测携带尾部位置 argv 值的 Shell 包装器内联命令形式。- 将审批/显示命令文本绑定到这些载体形式的完整格式化 argv。- 当载荷与执行绑定 argv 上下文不匹配时拒绝 rawCommand 值。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6rcp-vxwf-3mfp
rule: version <= "2026.2.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6rcp-vxwf-3mfp
