info:
  name: OpenClaw
  cve: GHSA-6xg4-82hv-cp6f
  summary: OpenClaw Gateway chat.send 的 ACP 专属来源校验可通过客户端身份伪造绕过
  details: >-
    摘要


    chat.send 中针对 ACP 专属来源字段的访问控制依赖 WebSocket 握手阶段客户端自行申报的元数据，而非经过验证的授权状态。


    影响


    普通的已认证运营商客户端可伪造 ACP 身份标签，注入原本仅供 ACP 桥接器使用的保留来源字段。


    受影响组件


    src/gateway/server-methods/chat.ts, src/gateway/server/ws-connection/message-handler.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 4b9542716c 修复（Gateway：聊天来源校验需要经过验证的权限作用域）。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 4b9542716c 修复（Gateway：聊天来源校验需要经过验证的权限作用域）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6xg4-82hv-cp6f
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6xg4-82hv-cp6f
