info:
  name: OpenClaw
  cve: GHSA-77pv-3w4q-vrj5
  summary: OpenClaw QQBot 预调度斜杠命令可能跳过 allowFrom 检查
  details: >-
    概述


    QQBot 预调度斜杠命令可能跳过 allowFrom 检查。在受影响版本中，能够调用斜杠命令的 QQBot 发送者可能在应用已配置的 allowFrom 策略之前就触发命令调度。


    本安全公告仅限于上述命名功能及其配置范围。它不改变 OpenClaw 的可信运营者模型：已认证的 Gateway 运营者、已安装的插件以及经过授权的本地执行面仍属于可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，可能触发来自本应被策略拦截的发送者的命令处理。实际影响取决于运营者的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.27。


    缓解措施


    在完成修复之前，限制 QQBot 斜杠命令的暴露范围。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.27 或更高版本。在完成修复之前，限制 QQBot 斜杠命令的暴露范围。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-77pv-3w4q-vrj5
rule: version <= "2026.4.26"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-77pv-3w4q-vrj5
