info:
  name: OpenClaw
  cve: GHSA-77q5-rr5v-x43q
  summary: OpenClaw 可信重试端点检查可能匹配主机名前缀
  details: >-
    概述


    可信重试端点检查可能匹配主机名前缀。在受影响版本中，由低信任输入指定的重试端点 URL 可能通过使用与可信主机相似的主机名前缀来通过验证。


    本安全公告仅限于上述命名功能及其配置范围。它不改变 OpenClaw 的可信运营者模型：已认证的 Gateway 运营者、已安装的插件以及经过授权的本地执行面仍属于可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，可能将认证凭据发送至预期信任目标以外的端点。实际影响取决于运营者的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.7。


    缓解措施


    在完成修复之前，将重试端点固定为精确的可信源。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.7 或更高版本。在完成修复之前，将重试端点固定为精确的可信源。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-77q5-rr5v-x43q
rule: version < "2026.5.7"
