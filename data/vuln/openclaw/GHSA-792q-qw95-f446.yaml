info:
  name: OpenClaw
  cve: GHSA-792q-qw95-f446
  summary: OpenClaw Signal 仅回应状态事件在有限情况下可在访问检查前入队
  details: >-
    概述

    在一个窄范围的 Signal 回应通知路径中，仅回应的入站事件可能在发送者访问检查应用之前入队状态事件。

    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.24（修补时最新发布版本）

    - 已修复版本：2026.2.25

    详细信息

    在受影响的流程（src/signal/monitor/event-handler.ts）中，仅回应处理可能在针对该发送者评估 DM/群组授权检查之前，在 enqueueSystemEvent(...) 之后返回。

    此行为仅限于启用了回应通知的仅回应入站事件。在这种情况下，未被授权进行正常 DM 流程的发送者仍可为该会话排队一条 Signal 回应状态行。

    修复在回应通知入队之前应用共享的 DM/群组访问检查。正常 DM 消息的配对行为不受影响。

    影响

    - 仅限于 Signal 仅回应入站事件。

    - 可能为受影响会话的代理上下文添加未经授权的回应状态行。

    - 不会直接启用正常 DM 传递或直接主机命令执行。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。修复提交 - 2aa7842adeedef423be7ce283a9144b9f1a0a669
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-792q-qw95-f446
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-792q-qw95-f446
