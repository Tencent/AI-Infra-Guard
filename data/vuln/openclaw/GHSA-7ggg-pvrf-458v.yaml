info:
  name: OpenClaw
  cve: GHSA-7ggg-pvrf-458v
  summary: OpenClaw `PIP_INDEX_URL` 和 `UV_INDEX_URL` 可绕过宿主机执行环境变量过滤，重定向 Python 包索引流量
  details: >-
    漏洞摘要

    PIP_INDEX_URL 和 UV_INDEX_URL 可绕过宿主机执行环境变量过滤，并重定向 Python 包索引流量


    维护者评估

    - 状态：范围受限

    - 标准化严重等级：高危

    - 评估：v2026.3.28 版本仍允许通过宿主机执行流程利用 Python 包索引相关环境变量实施重定向攻击，但影响范围应限定于已授权或白名单内的包管理执行路径，而非任意远程代码执行场景。


    受影响包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - 7ae1bb0c7799fd0cbd2d4de7b0f5b8039837ab8d — 2026-03-31T09:53:32+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7ggg-pvrf-458v
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7ggg-pvrf-458v
