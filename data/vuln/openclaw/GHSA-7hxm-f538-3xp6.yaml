info:
  name: OpenClaw
  cve: GHSA-7hxm-f538-3xp6
  summary: OpenClaw Matrix allowFrom 可能绑定至可变显示名称
  details: >-
    概述


    Matrix allowFrom 可能绑定至可变显示名称。在受影响版本中，能够修改显示名称元数据的 Matrix 账号可能通过可变显示元数据匹配策略条目。


    本安全公告仅限于上述命名功能及其配置范围。它不改变 OpenClaw 的可信运营者模型：已认证的 Gateway 运营者、已安装的插件以及经过授权的本地执行面仍属于可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，可能获得本应授予其他 Matrix 身份的 Agent 访问权限。实际影响取决于运营者的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.7。


    缓解措施


    在完成修复之前，在白名单中使用稳定的 Matrix 用户 ID。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.7 或更高版本。在完成修复之前，在白名单中使用稳定的 Matrix 用户 ID。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7hxm-f538-3xp6
rule: version <= "2026.5.6"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7hxm-f538-3xp6
