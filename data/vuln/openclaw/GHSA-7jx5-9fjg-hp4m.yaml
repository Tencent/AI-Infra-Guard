info:
  name: OpenClaw
  cve: GHSA-7jx5-9fjg-hp4m
  summary: OpenClaw ACP 权限通过不受信任的工具元数据实现自动审批绕过
  details: >-
    漏洞概述

    OpenClaw ACP 客户端可能基于不受信任的元数据和宽松的名称启发式方法自动审批工具调用。恶意或被篡改的 ACP 工具调用可能绕过预期的读操作类交互式审批提示。

    受影响的包/版本

    - 包名：npm openclaw

    - 受影响的已发布版本：<= 2026.2.22-2（截至2026年2月24日最新发布版本为 2026.2.22-2）

    - 已在主线代码中修复：2026.2.23（已发布）

    技术细节

    - 权限分类信任传入的 toolCall.kind 和启发式名称匹配。

    - 非核心的类读取名称和伪造的 kind 元数据可能到达自动审批路径。

    - 读操作在所有元数据/标题形式中未足够严格地限定到 cwd。

    修复

    - 要求可信的核心工具 ID 用于自动审批，忽略不受信任的 toolCall.kind 作为授权来源。

    - 将读操作自动审批限定到 cwd 解析的路径。

    - 添加更严格的工具名称验证和针对伪造 kind 及非核心类读取名称的回归测试覆盖。

    受影响的函数

    - resolvePermissionRequest

    - resolveToolNameForPermission

    - shouldAutoApproveToolCall
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.23 或更高版本。- 要求可信的核心工具 ID 用于自动审批，忽略不受信任的 toolCall.kind 作为授权来源。- 将读操作自动审批限定到 cwd 解析的路径。- 添加更严格的工具名称验证和回归测试覆盖。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7jx5-9fjg-hp4m
rule: version <= "2026.2.22-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7jx5-9fjg-hp4m
