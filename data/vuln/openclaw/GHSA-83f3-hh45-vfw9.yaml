info:
  name: OpenClaw
  cve: GHSA-83f3-hh45-vfw9
  summary: OpenClaw Android 接受明文远程网关端点并通过 ws:// 传输已存储凭据
  details: >-
    摘要


    在 OpenClaw 2026.4.2 之前，Android 端接受非回环地址的明文 ws:// 网关端点，并会通过该连接发送已存储的网关凭据。
    发现信标或设置码可将客户端引导至明文远程端点。


    影响


    若用户跟随伪造的发现结果或扫描了精心构造的设置码，可能导致已存储的网关凭据以明文形式泄露至攻击者控制的端点。
    该漏洞属于 Android 网关客户端的传输层安全缺陷。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.4.2 或更高版本。相关提交 - a941a4fef9bc43b2973c92d0dcff5b8a426210c5 — 强制要求 Android 远程网关端点使用 TLS 加密连接
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-83f3-hh45-vfw9
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-83f3-hh45-vfw9
