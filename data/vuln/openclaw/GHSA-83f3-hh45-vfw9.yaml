info:
  name: OpenClaw
  cve: GHSA-83f3-hh45-vfw9
  summary: OpenClaw Android 接受明文远程 Gateway 端点并通过 ws:// 发送已存储的凭证
  details: "摘要\r\n\r\n在 OpenClaw 2026.4.2 之前，Android 接受非回环地址的明文 ws:// Gateway 端点，\
    并会通过该连接发送已存储的 Gateway 凭证。因此，发现信标或配置码可能将客户端引导至\
    明文远程端点。\r\n\r\n影响\r\n\r\n若用户跟随伪造的发现结果或扫描精心构造的配置码，\
    可能将已存储的 Gateway 凭证以明文形式泄露给攻击者控制的端点。\
    这是 Android Gateway 客户端中存在的传输安全漏洞。\r\n\r\n受影响的软件包 / 版本\r\n\r\n\
    - 软件包：openclaw (npm)\r\n- 受影响版本：<= 2026.4.1\r\n- 已修复版本：>= 2026.4.2\r\n\
    - npm 最新发布版本：2026.4.1"
  cvss: ''
  severity: LOW
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交 - a941a4fef9bc43b2973c92d0dcff5b8a426210c5
    — 强制远程 Android Gateway 端点使用 TLS
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-83f3-hh45-vfw9
rule: 'version <= "2026.4.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-83f3-hh45-vfw9
