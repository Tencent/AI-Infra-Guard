info:
  name: OpenClaw
  cve: GHSA-83w9-h5wv-j9xm
  summary: OpenClaw 节点配对重连可能混淆审批范围状态
  details: >-
    概述


    节点配对重连可能混淆审批范围状态。在受影响版本中，已配对或正在重连的节点会话可能以改变审批范围决策的方式修改配对状态。


    本安全公告仅限于上述命名功能及其配置范围。它不改变 OpenClaw 的可信运营者模型：已认证的 Gateway 运营者、已安装的插件以及经过授权的本地执行面仍属于可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，可能恢复或呈现超出运营者预期的更广泛节点权限。实际影响取决于运营者的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.27。


    缓解措施


    在完成修复之前，撤销意外的节点配对并仅重新配对可信节点。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.27 或更高版本。在完成修复之前，撤销意外的节点配对并仅重新配对可信节点。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-83w9-h5wv-j9xm
rule: version < "2026.5.27"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-83w9-h5wv-j9xm
