info:
  name: OpenClaw
  cve: GHSA-8689-gm9g-jgr6
  summary: OpenClaw 语音通话 Plivo V3 Webhook 重放密钥使用未排序 URL，攻击者可通过重排查询参数实施重放攻击
  details: "摘要\r\n\r\nPlivo V3 签名验证对查询参数顺序进行了规范化处理，但重放检测对原始验证 URL 进行哈希运算。重排查询参数后，签名依然有效，同时产生新的重放缓存键。\r\
    \n\r\n影响\r\n\r\n攻击者捕获一个有效的已签名 Plivo V3 Webhook 后，可通过打乱查询参数顺序来重放同一事件，触发重复的语音通话处理流程。\r\
    \n\r\n受影响组件\r\n\r\nextensions/voice-call/src/webhook-security.ts\r\
    \n\r\n修复版本\r\n\r\n- 受影响版本：<= 2026.3.24\r\n- 已修复版本：>= 2026.3.28\r\n- 最新稳定版 2026.3.28 包含此修复。\r\
    \n\r\n修复说明\r\n\r\n通过提交 85777e726c 修复（语音通话：规范化 Plivo V3 重放密钥）。"
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。通过提交 85777e726c 修复（语音通话：规范化 Plivo V3 重放密钥）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8689-gm9g-jgr6
rule: 'version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8689-gm9g-jgr6
