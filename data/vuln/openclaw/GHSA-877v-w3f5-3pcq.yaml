info:
  name: OpenClaw
  cve: GHSA-877v-w3f5-3pcq
  summary: OpenClaw 飞书话题历史消息及引用消息可绕过发送者白名单限制
  details: >-
    漏洞摘要

    飞书话题历史消息及引用消息可绕过发送者白名单限制


    维护者评估

    - 状态：未修复

    - 标准化严重等级：中危

    - 评估：该漏洞在已发布的 v2026.3.28 飞书集成中真实存在，原因是获取到的引用消息、根消息及话题上下文内容可绕过发送者白名单验证，且 SECURITY.md 中未将远程发送者白名单绕过列为豁免项。


    受影响包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - f45e5a6569aab1d58cc6de25b19f1dc4c8779b85 — 2026-03-31T19:43:54+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-877v-w3f5-3pcq
rule: version <= "2026.3.28"
