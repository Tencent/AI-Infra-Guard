info:
  name: OpenClaw
  cve: GHSA-89r3-6x4j-v7wf
  summary: OpenClaw 语音通话 Plivo 重放在拒绝重放请求前修改进程内回调来源
  details: "摘要\r\n语音通话 Plivo 重放在拒绝重放请求前修改进程内回调来源\r\n\r\n当前维护者评估\r\n\
    - 状态：影响范围有限\r\n- 规范化严重等级：低危\r\n- 评估：v2026.3.28 在拒绝重放请求前仍可修改\
    Plivo 回调来源，但利用此漏洞需要捕获一个有效的活跃通话回调，因此中危评级存在高估。\r\n\r\n\
    受影响的软件包 / 版本\r\n- 软件包：openclaw (npm)\r\n- npm 最新发布版本：2026.3.31\r\n\
    - 漏洞影响版本范围：<=2026.3.28\r\n- 已修复版本：>= 2026.3.31\r\n- 包含修复的首个稳定标签：v2026.3.31"
  cvss: ''
  severity: LOW
