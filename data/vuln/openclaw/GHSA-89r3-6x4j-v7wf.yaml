info:
  name: OpenClaw
  cve: GHSA-89r3-6x4j-v7wf
  summary: OpenClaw 语音通话 Plivo 重放攻击在拒绝重放前篡改进程内回调来源
  details: >-
    漏洞概述

    语音通话 Plivo 重放攻击在拒绝重放前篡改进程内回调来源


    维护者现状评估

    - 状态：影响范围受限（narrow）

    - 标准化严重等级：低危

    - 评估说明：v2026.3.28 版本在拒绝重放请求之前仍可能篡改 Plivo 回调来源，但利用该漏洞需要捕获有效的活跃通话回调，因此中危评级有所高估。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - efe9183f9d2fd5e01c8068fa01f4a07a58a63c0b — 2026-03-31T19:50:35+09:00
