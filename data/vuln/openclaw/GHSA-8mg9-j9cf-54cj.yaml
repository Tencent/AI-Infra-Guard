info:
  name: OpenClaw
  cve: GHSA-8mg9-j9cf-54cj
  summary: OpenClaw 空权限范围设备重配对可能混淆调用者范围隔离
  details: >-
    概述


    空权限范围设备重配对可能混淆调用者范围隔离。在受影响版本中，携带空权限范围集的设备重配对请求可能在重配对过程中跳过预期的范围隔离守卫。


    本安全公告仅限于上述命名功能及其配置范围。它不改变 OpenClaw 的可信运营者模型：已认证的 Gateway 运营者、已安装的插件以及经过授权的本地执行面仍属于可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能被启用且可访问时，可能恢复或保留超出调用者应被授予范围的更广泛权限。实际影响取决于运营者的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.25。


    缓解措施


    在完成修复之前，撤销意外的设备会话，并要求对可疑设备进行全新配对。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.25 或更高版本。在完成修复之前，撤销意外的设备会话，并要求对可疑设备进行全新配对。作为通用加固措施，应保持通道和工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要该功能时将其禁用。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8mg9-j9cf-54cj
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8mg9-j9cf-54cj
