info:
  name: OpenClaw
  cve: GHSA-8rh7-6779-cjqq
  summary: OpenClaw 当前工作目录 .env 环境变量注入绕过宿主环境策略，可导致配置劫持
  details: >-
    漏洞概述


    OpenClaw 在加载受信任的状态目录配置之前，会优先加载当前工作目录下的 .env 文件，导致不受信任的工作区状态可注入宿主机环境变量值。


    安全影响


    包含恶意 .env 文件的代码仓库或工作区，可在 OpenClaw 于该目录启动时，覆盖运行时配置及安全敏感的环境变量设置，实现配置劫持。


    受影响组件


    src/infra/dotenv.ts, src/cli/dotenv.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    由提交 6a79324802 修复（Filter untrusted CWD .env entries before OpenClaw startup，在 OpenClaw 启动前过滤不受信任的当前工作目录 .env 条目）。
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
  severity: CRITICAL
  security_advise: 升级 openclaw 至 >= 2026.3.28 或更高版本。由提交 6a79324802 修复（Filter untrusted CWD .env entries before OpenClaw startup，在 OpenClaw 启动前过滤不受信任的当前工作目录 .env 条目）。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8rh7-6779-cjqq
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8rh7-6779-cjqq
