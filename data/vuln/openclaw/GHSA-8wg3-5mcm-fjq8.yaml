info:
  name: OpenClaw
  cve: GHSA-8wg3-5mcm-fjq8
  summary: >-
    OpenClaw 工作区 .env 文件可能覆盖技能安装流程中的 Homebrew 可执行文件选择
  details: >-
    摘要


    工作区 .env 文件可能覆盖技能安装流程中的 Homebrew 可执行文件选择。在受影响版本中，受信任操作者打开的代码仓库中的工作区
    .env 文件可能覆盖安装助手所使用的 Homebrew 可执行文件。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，可能在技能安装期间执行非预期的 Homebrew 兼容可执行文件。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.5.27。


    缓解措施


    在修复之前，避免在不受信任的工作区中运行技能安装流程。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.27 或更高版本。在修复之前，避免在不受信任的工作区中运行技能安装流程。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8wg3-5mcm-fjq8
rule: version < "2026.5.27"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8wg3-5mcm-fjq8
