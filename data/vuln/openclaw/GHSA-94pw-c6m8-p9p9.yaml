info:
  name: OpenClaw
  cve: GHSA-94pw-c6m8-p9p9
  summary: OpenClaw Gateway operator.write 权限可通过 chat.send 触发管理员级别的通道白名单持久化写入
  details: "> 已在 OpenClaw 2026.3.24（当前正式发布版本）中修复。\r\n\r\n漏洞概述\r\n\r\n共享的 /allowlist 命令通过 writeConfigFile(...) 持久化通道授权配置，但未对内部\
    \ Gateway 调用方重新校验客户端权限作用域。由于 chat.send 设计上允许 operator.write 权限的调用方访问，并且会创建通用的命令授权内部上下文，经过认证的写权限 Gateway 客户端可间接篡改\
    \ allowFrom 和 groupAllowFrom 策略——而直接调用 config.patch 时，这些策略正确地要求 operator.admin 权限。\r\n\r\n这不仅仅是一个普通的代码质量问题。现有代码已通过为共享的\
    \ /config 和 /plugins 写入添加汇聚侧内部管理员校验来体现预期的权限边界，但 /allowlist 被遗漏了。\r\n\r\n漏洞详情\r\n\r\nGateway 文档化的作用域划分是明确的：\r\n\r\n-\
    \ chat.send 是写权限操作。\r\n- 直接配置变更是管理员权限操作。\r\n\r\n受攻击路径如下：\r\n\r\n1. Gateway 客户端以 operator.write 权限完成认证。\r\n2. 客户端调用 chat.send，该操作对该权限作用域是合法允许的。\r\
    \n3. chat.send 构建内部消息上下文，设置 CommandAuthorized: true，并将 GatewayClientScopes 传入回复处理管道。\r\n4. resolveCommandAuthorization(...)\
    \ 将内部消息转换为 isAuthorizedSender=true（在未配置更严格的 commands.allowFrom 覆盖时为通用情况）。\r\n5. /allowlist add|remove 接受该通用命令授权并进入其配置支持的编辑路径。\r\
    \n6. 处理器克隆解析后的配置，调用 plugin.allowlist.applyConfigEdit(...) 进行校验，并通过 writeConfigFile(validated.config) 持久化。\r\n7.\
    \ 在持久化写入发生前，汇聚侧未校验是否具备 operator.admin 权限。\r\n\r\n这造成了直接的控制平面权限不匹配：\r\n\r\n- config.patch 会以缺少 operator.admin 权限拒绝同一调用方。\r\
    \n- 通过 chat.send 调用 /allowlist add dm ... 或 /allowlist add group ... 仍可改写通道授权配置。"
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.24 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-94pw-c6m8-p9p9
rule: version <= "2026.3.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-94pw-c6m8-p9p9
