info:
  name: OpenClaw
  cve: GHSA-985f-72mj-8gf7
  summary: OpenClaw 工具组策略调用方可能接受未经验证的组 ID
  details: >-
    摘要


    工具组策略调用方可能接受未经验证的组 ID。在受影响版本中，能够向受影响策略解析器提供组 ID 的调用方，可能针对未经验证的组 ID 解析出相应策略。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，可能对工具调用应用错误的组策略决策。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.4.25。


    缓解措施


    在修复之前，避免将受组策略控制的工具暴露给不受信任的发送方。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.25 或更高版本。在修复之前，避免将受组策略控制的工具暴露给不受信任的发送方。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-985f-72mj-8gf7
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-985f-72mj-8gf7
