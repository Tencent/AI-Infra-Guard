info:
  name: OpenClaw
  cve: GHSA-98hh-7ghg-x6rq
  summary: OpenClaw Discord 文本 `/approve` 指令绕过 `channels.discord.execApprovals.approvers` 配置，允许非授权审批者解除待处理的执行审批
  details: >-
    摘要


    Discord 文本审批命令在处理待审批的命令执行请求时，未遵守已配置的审批者白名单限制。


    影响


    被允许发送命令但不在审批者名单中的 Discord 用户，仍可批准待处理的宿主机命令执行请求。


    受影响组件


    extensions/discord/src/exec-approvals.ts, src/auto-reply/reply/commands-approve.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 355abe5eba 修复（Discord：对文本审批指令强制执行审批者身份校验）。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 355abe5eba 修复（Discord：对文本审批指令强制执行审批者身份校验）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-98hh-7ghg-x6rq
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-98hh-7ghg-x6rq
