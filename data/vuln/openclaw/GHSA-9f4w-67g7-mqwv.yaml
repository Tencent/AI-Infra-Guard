info:
  name: OpenClaw
  cve: GHSA-9f4w-67g7-mqwv
  summary: OpenClaw 远程引导在信任拒绝后保留攻击者发现的端点，导致 Gateway 凭证被路由至该端点
  details: "摘要\r\n远程引导在信任拒绝后保留攻击者发现的端点，导致 Gateway 凭证被路由至该端点\r\n\r\n\
    当前维护者评估\r\n- 状态：影响范围有限\r\n- 规范化严重等级：中危\r\n- 评估：这是一个真实发布的\
    引导流程信任拒绝漏洞——被拒绝的已发现 URL 在拒绝后存留至手动输入提示中，但运营者仍需\
    主动接受该预填内容，因此评级为中危。\r\n\r\n受影响的软件包 / 版本\r\n- 软件包：openclaw (npm)\r\n\
    - npm 最新发布版本：2026.3.31\r\n- 漏洞影响版本范围：<=2026.3.28\r\n\
    - 已修复版本：>= 2026.3.31\r\n- 包含修复的首个稳定标签：v2026.3.31"
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 2a75416634837c21ed05b8c3ed906eb7a7807060
    — 2026-03-30T20:03:06+01:00
  references:
