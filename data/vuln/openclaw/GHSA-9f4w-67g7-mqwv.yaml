info:
  name: OpenClaw
  cve: GHSA-9f4w-67g7-mqwv
  summary: OpenClaw 远程引导流程在信任拒绝后保留攻击者发现的端点，并将网关凭据路由至该端点
  details: >-
    漏洞摘要

    远程引导流程在信任拒绝后保留攻击者发现的端点，并将网关凭据路由至该端点


    当前维护者研判

    - 状态：范围收窄

    - 标准化严重等级：中危

    - 研判说明：已确认为已发布版本中存在的引导信任拒绝缺陷——被拒绝的已发现 URL 在手动提示阶段仍然保留，但最终仍需运营商接受该预填充值，因此评定为中危。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 2a75416634837c21ed05b8c3ed906eb7a7807060 — 2026-03-30T20:03:06+01:00
