info:
  name: OpenClaw
  cve: GHSA-9hjh-fr4f-gxc4
  summary: OpenClaw Gateway 后端重连允许非管理员 Operator 权限范围自我声明 operator.admin
  details: >-
    漏洞概述


    Gateway 后端重连允许非管理员 Operator 权限范围自我声明 operator.admin


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    携带 backend 标签的重连请求此前可自行申请更宽泛的权限范围并绕过配对校验，
    使非管理员 Operator 以 operator.admin 身份重新连接。提交 d3d8e316bd819d3c7e34253aeb7eccb2510f5f48
    移除了后端自我配对豁免逻辑，当请求的权限范围超出已批准基线时强制执行配对流程。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 d3d8e316bd819d3c7e34253aeb7eccb2510f5f48 在 main 分支修复。
  cvss: ''
  severity: CRITICAL
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：d3d8e316bd819d3c7e34253aeb7eccb2510f5f48
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9hjh-fr4f-gxc4
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9hjh-fr4f-gxc4
