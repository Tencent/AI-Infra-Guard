info:
  name: OpenClaw
  cve: GHSA-9jpj-g8vv-j5mf
  summary: OpenClaw Gemini OAuth 流程通过 OAuth state 参数泄露 PKCE 验证码
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，Gemini OAuth 流程将 PKCE 验证码（verifier）复用为 OAuth state 参数值。由于授权服务器会在重定向 URL 中回传 state，导致验证码可与授权码同时暴露。


    安全影响


    任何能够截获重定向 URL 的攻击者均可同时获取授权码与 PKCE 验证码，从而彻底绕过 PKCE 对该流程的授权码拦截防护，并可利用上述凭据完成令牌兑换。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：a26f4d0f3ef0757db6c6c40277cc06a5de76c52f —
    将 OAuth state 与 PKCE 验证码分离，使用独立随机值
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9jpj-g8vv-j5mf
rule: 'version <= "2026.4.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9jpj-g8vv-j5mf
