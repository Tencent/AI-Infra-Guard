info:
  name: OpenClaw
  cve: GHSA-9p3r-hh9g-5cmg
  summary: OpenClaw 沙箱逃逸漏洞——远程文件系统桥 readFile 中存在 TOCTOU 竞争条件
  details: "摘要\r\n远程文件系统桥 readFile 中存在 TOCTOU（检查时间/使用时间）竞争条件，导致沙箱逃逸\r\n\r\n当前维护者分类\r\n- 状态：\
    开放\r\n- 规范化严重等级：严重（Critical）\r\n- 评估：v2026.3.28 版本中远程沙箱读取仍采用"路径检查后单独执行文件读取"的方式，\
    因此该 TOCTOU 沙箱逃逸漏洞在最新已发布标签中依然存在。\r\n\r\n受影响软件包 / 版本\r\n- 软件包：openclaw (npm)\r\n\
    - 最新已发布 npm 版本：2026.3.31\r\n- 受影响版本范围：<=2026.3.28\r\n- 已修复版本：>= 2026.3.31\r\n- 首个包含修复的稳定标签：v2026.3.31"
  cvss: ''
  severity: CRITICAL
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：121870a08583033ed6a0ed73d9ffea32991252bb — 2026-03-31T09:55:51+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9p3r-hh9g-5cmg
rule: 'version <= "2026.3.28"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9p3r-hh9g-5cmg
