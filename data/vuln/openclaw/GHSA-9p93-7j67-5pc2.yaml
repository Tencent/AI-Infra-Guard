info:
  name: OpenClaw
  cve: GHSA-9p93-7j67-5pc2
  summary: OpenClaw Gateway HTTP /sessions/:sessionKey/kill 接口未绑定调用方权限范围即进入管理员终止路径
  details: >-
    漏洞概述


    Gateway HTTP /sessions/:sessionKey/kill 接口未绑定调用方权限范围即进入管理员终止路径


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    HTTP /sessions/:sessionKey/kill 路由此前将任何携带 Bearer Token 的请求视为管理员候选，可在未绑定
    请求方所有权或调用方授予的 Operator 权限范围的情况下调用 killSubagentRunAdmin(...)。
    提交 02cf12371f9353a16455da01cc02e6c4ecfc4152 移除了 Bearer Token 管理员回退逻辑，
    将远程会话终止限制在本地管理员或请求方自有路径上。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 02cf12371f9353a16455da01cc02e6c4ecfc4152 在 main 分支修复。
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：02cf12371f9353a16455da01cc02e6c4ecfc4152
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9p93-7j67-5pc2
rule: 'version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9p93-7j67-5pc2
