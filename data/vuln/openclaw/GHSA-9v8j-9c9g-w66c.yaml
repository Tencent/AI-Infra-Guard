info:
  name: OpenClaw
  cve: GHSA-9v8j-9c9g-w66c
  summary: OpenClaw 引导令牌重放攻击可能扩大待处理配对的权限范围
  details: >-
    摘要


    引导令牌重放攻击可能扩大待处理配对的权限范围。在受影响版本中，能够访问待处理引导令牌的调用方，可在审批前使用更大范围的请求权限集重复使用该令牌。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，可能呈现或保留比预期更大的待处理配对权限。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在修复之前，将配对码视为敏感信息并取消意外的待处理配对。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。在修复之前，将配对码视为敏感信息并取消意外的待处理配对。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9v8j-9c9g-w66c
rule: version <= "2026.5.10-beta.2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9v8j-9c9g-w66c
