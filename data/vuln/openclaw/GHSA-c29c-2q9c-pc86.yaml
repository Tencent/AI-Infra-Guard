info:
  name: OpenClaw
  cve: GHSA-c29c-2q9c-pc86
  summary: OpenClaw Slack allowFrom 策略可能绑定到可变的显示名称
  details: >-
    摘要


    Slack allowFrom 策略可能绑定到可变的显示名称。在受影响版本中，能够修改显示名称元数据的 Slack 账户，可能通过可变的显示元数据匹配到策略条目。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，可能获得原本授予其他 Slack 身份的 Agent 访问权限。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.5.3。


    缓解措施


    在修复之前，在白名单中使用稳定的 Slack 用户 ID。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.3 或更高版本。在修复之前，在白名单中使用稳定的 Slack 用户 ID。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-c29c-2q9c-pc86
rule: version <= "2026.5.3-1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-c29c-2q9c-pc86
