info:
  name: OpenClaw
  cve: GHSA-c6hr-w26q-c636
  summary: OpenClaw 通过 RegExp 构造中未转义的飞书提及元数据导致 ReDoS 和正则注入
  details: >-
    概述


    extensions/feishu/src/bot.ts 在 stripBotMention() 中直接从飞书提及元数据（mention.name、mention.key）构造 new RegExp()，而未转义正则元字符。


    受影响的包/版本


    - 包名：npm openclaw

    - 受影响版本：<= 2026.2.17

    - 首次受影响版本：2026.2.6

    - 已修复版本：2026.2.19


    影响


    - ReDoS：提及元数据中构造的嵌套量词模式可触发灾难性回溯并阻塞消息处理。

    - 正则注入：提及元数据中的元字符可在发送到模型之前移除意外的消息内容。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.19 或更高版本。修复提交 - 7e67ab75cc2f0e93569d12fecd1411c2961fcc8c - 74268489137510b6f6349919d1e197b17290d92c
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-c6hr-w26q-c636
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-c6hr-w26q-c636
