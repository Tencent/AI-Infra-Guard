info:
  name: OpenClaw
  cve: GHSA-ccwh-wwpp-6wg5
  summary: OpenClaw 宿主环境净化器遗漏了两个 Node.js 控制变量
  details: >-
    摘要


    宿主环境净化器遗漏了两个 Node.js 控制变量。在受影响版本中，低信任的环境变量来源（如工作区 .env 文件、工具环境覆盖或技能环境块）可能通过共享净化器传递 Node.js 控制变量。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，在接受该环境的情况下启动后续 Node.js 子进程时，可能影响该子进程的行为或覆盖输出路径。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.5.26。


    缓解措施


    在修复之前，避免从不受信任的代码仓库继承工作区或工具提供的环境变量。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.26 或更高版本。在修复之前，避免从不受信任的代码仓库继承工作区或工具提供的环境变量。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-ccwh-wwpp-6wg5
rule: version <= "2026.5.22"
