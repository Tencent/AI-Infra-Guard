  summary: OpenClaw 宿主机 exec 环境清理策略遗漏包管理、镜像仓库、Docker、编译器及 TLS 覆盖相关变量
  details: >-
    摘要

    宿主机 exec 环境清理策略遗漏包管理、镜像仓库、Docker、编译器及 TLS 覆盖相关变量


    维护者风险评估

    - 状态：开放

    - 标准化严重等级：中危

    - 评估：v2026.3.28 版本已发布的宿主机环境策略同样遗漏了包管理、镜像仓库、编译器、Docker 及 TLS 等更广泛的环境变量族，主分支的修复尚未发布，属于真实存在的中危开放问题。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
