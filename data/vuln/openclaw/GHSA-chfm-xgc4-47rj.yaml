info:
  name: OpenClaw
  cve: GHSA-chfm-xgc4-47rj
  summary: OpenClaw MS Teams 话题历史消息可通过 Graph API 绕过发送者白名单限制
  details: >-
    漏洞摘要

    MS Teams 话题历史消息可通过 Graph API 绕过发送者白名单限制


    维护者评估

    - 状态：未修复

    - 标准化严重等级：中危

    - 评估：该漏洞在已发布的 v2026.3.28 MS Teams 集成中真实存在，原因是通过 Graph API 获取的话题历史消息可绕过发送者白名单验证，主线过滤修复补丁尚未发布。


    受影响包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - 5cca38084074fb5095aa11b6a59820d63e4937c9 — 2026-03-30T15:38:26+01:00
  references:
