info:
  name: OpenClaw
  cve: GHSA-chr9-m4q2-76hw
  summary: OpenClaw 控制界面本地性欺骗攻击可导致铸造持久化管理员设备令牌
  details: >-
    摘要


    在受影响的局域网/共享令牌控制界面部署中，攻击者可伪造控制界面配对过程中使用的本地性信息，从而获取具有持久化管理员权限的设备令牌。


    本问题仅影响调用方已具备访问控制界面配对路径所需的网络/认证立足点的部署场景，不属于未经认证的互联网暴露问题。


    受影响配置


    本问题影响以下配置：局域网绑定的 Gateway，或基于共享令牌的控制界面访问场景，其中本地性信号被接受为配对决策的充分依据。


    影响


    临时或共享的控制界面访问路径可被转化为持久化的管理员设备令牌。即使共享 Gateway 令牌已轮换，该令牌在配对设备被移除前仍可保持有效。


    本问题本质上是配对/本地性验证缺陷：基于本地性推断的信任强度超出了应有边界。


    已修复版本


    首个稳定修复版本为 2026.5.22。


    缓解措施


    升级至 openclaw@2026.5.22 或更高版本。对于旧版部署，移除意外的已配对设备，并避免在存在不受信任客户端的网络中暴露控制界面配对路径。
  cvss: CVSS:3.1/AV:A/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.22 或更高版本。对于旧版部署，移除意外的已配对设备，并避免在存在不受信任客户端的网络中暴露控制界面配对路径。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-chr9-m4q2-76hw
rule: version < "2026.5.22"
