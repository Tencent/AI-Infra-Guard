info:
  name: OpenClaw
  cve: GHSA-cqgw-44wg-44rf
  summary: OpenClaw Discord 语音管理器绕过频道级成员访问白名单
  details: >-
    漏洞概述

    Discord 语音管理器绕过频道级成员访问白名单


    维护者现状评估

    - 状态：未修复（open）

    - 标准化严重等级：中危

    - 评估说明：v2026.3.28 版本在频道白名单授权完成前仍接受 Discord 语音入口流量，且仅限主分支的门控机制意味着该访问控制缺陷已实际发布在线上版本中。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
