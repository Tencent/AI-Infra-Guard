info:
  name: OpenClaw
  cve: GHSA-cqwv-9qjx-vxw2
  summary: OpenClaw Skill Workshop 应用流程可能绕过待处理的审批
  details: >-
    摘要


    Skill Workshop 应用流程可能绕过待处理的审批。在受影响版本中，到达受影响 Skill Workshop 应用路径的 Agent 工具调用，可能在 approvalPolicy 为 pending 的情况下将 apply 设置为 true。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，可能在预期的审批步骤完成之前应用工作区变更。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.5.6。


    缓解措施


    在修复之前，手动审查 Skill Workshop 变更并限制工具的访问权限。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:N/I:H/A:N
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.6 或更高版本。在修复之前，手动审查 Skill Workshop 变更并限制工具的访问权限。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cqwv-9qjx-vxw2
rule: version <= "2026.5.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cqwv-9qjx-vxw2
