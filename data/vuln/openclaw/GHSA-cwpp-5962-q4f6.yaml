info:
  name: OpenClaw
  cve: GHSA-cwpp-5962-q4f6
  summary: >-
    OpenClaw 执行白名单可能遗漏透明命令包装器产生的副作用
  details: >-
    摘要


    执行白名单可能遗漏透明命令包装器产生的副作用。在受影响版本中，到达执行白名单路径的命令请求，可能仅对内层命令进行白名单评估，而包装器调用本身仍会执行。


    本安全公告仅针对上述特定功能和配置。它不改变 OpenClaw 的受信任操作者模型：经过身份验证的 Gateway 操作者、已安装的插件以及有意设置的本地执行面仍属可信范围，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能启用且可被访问时，可能在白名单命令意图之外执行包装器层面的副作用操作。实际影响取决于操作者的配置以及低信任输入是否能够到达该执行路径。


    已修复版本


    首个稳定修复版本为 2026.5.26。


    缓解措施


    在修复之前，仔细审查包装器命令，并对类 Shell 包装器用法要求审批确认。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.26 或更高版本。在修复之前，仔细审查包装器命令，并对类 Shell 包装器用法要求审批确认。作为通用加固措施，保持通道和工具白名单的最小权限范围，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cwpp-5962-q4f6
rule: version <= "2026.5.22"
