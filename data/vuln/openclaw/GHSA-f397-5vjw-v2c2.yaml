info:
  name: OpenClaw
  cve: GHSA-f397-5vjw-v2c2
  summary: OpenClaw Shell 内联命令解析可能绕过白名单检查
  details: >-
    摘要


    Shell 内联命令解析可能绕过白名单检查。在受影响版本中，使用 Shell 内联命令形式的命令请求可能通过某个未执行预期白名单判断的解析分支路由内联命令。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能在未经预期审批或白名单提示的情况下执行 Shell 内容。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在修复前，对 Shell 内联命令形式要求审批。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。在修复前，对 Shell 内联命令形式要求审批。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f397-5vjw-v2c2
rule: version <= "2026.5.10-beta.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f397-5vjw-v2c2
