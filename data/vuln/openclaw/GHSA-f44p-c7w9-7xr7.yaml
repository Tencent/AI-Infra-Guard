info:
  name: OpenClaw
  cve: GHSA-f44p-c7w9-7xr7
  summary: OpenClaw Gateway WebSocket 因无上限的预认证连接升级请求导致拒绝服务漏洞
  details: >-
    摘要


    Gateway 在将 WebSocket 连接分配至已认证会话配额之前，接受了无上限的并发未认证 WebSocket 升级请求。


    影响


    未经身份验证的网络攻击者可耗尽套接字和工作进程资源，导致合法客户端无法正常建立 WebSocket 连接。


    受影响组件


    src/gateway/server-http.ts, src/gateway/server/preauth-connection-budget.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 cb5f7e201f 修复（gateway：限制并发预认证 WebSocket 升级请求数量上限）。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 cb5f7e201f 修复（gateway：限制并发预认证 WebSocket 升级请求数量上限）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f44p-c7w9-7xr7
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f44p-c7w9-7xr7
