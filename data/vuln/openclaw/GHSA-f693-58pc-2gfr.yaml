info:
  name: OpenClaw
  cve: GHSA-f693-58pc-2gfr
  summary: OpenClaw Telegram 旧版 allowFrom 迁移将默认账户信任传播至所有命名账户
  details: >-
    漏洞摘要

    Telegram 旧版 allowFrom 迁移将默认账户信任传播至所有命名账户


    当前维护者研判

    - 状态：开放

    - 标准化严重等级：低危

    - 研判说明：已发布的 v2026.3.28 版本中，Telegram 迁移逻辑将旧版默认账户的 allowFrom 信任扩散至命名账户，构成在范围内的认证边界缺陷，评定为低危。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - d8c68c8d4265ea6fa5e8c5e056534c351bddef37 — 2026-03-31T12:51:38+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f693-58pc-2gfr
rule: version <= "2026.3.28"
