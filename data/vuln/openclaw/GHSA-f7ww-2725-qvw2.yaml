info:
  name: OpenClaw
  cve: GHSA-f7ww-2725-qvw2
  summary: OpenClaw 节点 system.run 通过父符号链接 cwd 重绑定绕过审批
  details: >-
    概述

    对于 host=node 执行，审批上下文可在审批后通过在保持可见 cwd 字符串的同时重绑定 cwd 中的可写父符号链接来绕过。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.25

    - 已修复版本：>= 2026.2.26（计划的下一个 npm 发布版本）


    影响

    为一个文件系统位置审批的命令，如果在审批和执行之间可变父符号链接发生更改，则可能从不同位置执行。


    修复

    - 添加不可变的审批时计划准备（system.run.prepare）和 systemRunPlanV2 规范字段（argv、cwd、agentId、sessionKey）。

    - 通过审批请求存储和转发时净化强制执行规范计划值。

    - 在审批计划构建期间拒绝可变父符号链接路径组件，以阻止符号链接重绑定绕过。

    - 后续重构集中了命令目录和审批上下文/错误处理以减少未来漂移。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.26 或更高版本。- 添加不可变的审批时计划准备和 systemRunPlanV2 规范字段。- 通过审批请求存储和转发时净化强制执行规范计划值。- 在审批计划构建期间拒绝可变父符号链接路径组件。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f7ww-2725-qvw2
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f7ww-2725-qvw2
