info:
  name: OpenClaw
  cve: GHSA-fcvx-5cxc-v5p8
  summary: OpenClaw Slack 表情回应事件可能忽略回应通知设置
  details: >-
    摘要


    Slack 表情回应事件可能忽略回应通知设置。在受影响版本中，投递至已配置应用的 Slack 表情回应事件，即便在回应通知已禁用的情况下，仍可能进入 Agent 处理管道。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能触发针对表情回应事件的非预期 Agent 处理。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在修复前，如不需要该路径，禁用或限制 Slack 表情回应事件订阅。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: LOW
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。在修复前，如不需要该路径，禁用或限制 Slack 表情回应事件订阅。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fcvx-5cxc-v5p8
rule: version <= "2026.5.7"
