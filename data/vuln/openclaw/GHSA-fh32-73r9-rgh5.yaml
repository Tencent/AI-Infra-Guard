info:
  name: OpenClaw
  cve: GHSA-fh32-73r9-rgh5
  summary: OpenClaw 尾随点形式的 localhost CDP 主机可绕过远程回环保护机制
  details: >-
    摘要


    在 OpenClaw 2026.4.2 之前，远程 CDP 发现响应可返回带有尾随点的 localhost 主机名（如 localhost.），
    绕过 OpenClaw 的回环主机规范化处理。这使得非回环远程 CDP Profile 能够将后续连接重定向回 localhost。


    影响


    恶意发现响应可将已认证的浏览器控制流量重定向至 OpenClaw 宿主机上解析为 localhost 的端点。
    该漏洞削弱了现有的远程 CDP 回环保护机制，可能暴露 localhost 上的浏览器状态数据。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.4.2 或更高版本。相关提交 - 9c22d636697336a6b22b0ae24798d8b8325d7828 — 在执行回环检查前对 localhost 绝对形式 CDP 主机名进行规范化处理
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fh32-73r9-rgh5
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fh32-73r9-rgh5
