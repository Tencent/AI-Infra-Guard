info:
  name: OpenClaw
  cve: GHSA-fq9j-vw4w-fr6v
  summary: >-
    OpenClaw 工作区 .env 中的 CLOUDSDK_PYTHON 可能影响 Gmail 配置时 gcloud 的执行
  details: >-
    摘要


    工作区 .env 中的 CLOUDSDK_PYTHON 可能影响 Gmail 配置时 gcloud 的执行。在受影响版本中，受信任操作员打开的代码仓库中若存在工作区 .env 文件，其 CLOUDSDK_PYTHON 变量可能影响 gcloud 所使用的 Python 运行时。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能通过非预期的本地 Python 路径执行配置流程。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.2。


    缓解措施


    在修复前，从可信工作区运行 Gmail 配置并清除工作区环境变量覆盖。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.2 或更高版本。在修复前，从可信工作区运行 Gmail 配置并清除工作区环境变量覆盖。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fq9j-vw4w-fr6v
rule: version < "2026.5.2"
