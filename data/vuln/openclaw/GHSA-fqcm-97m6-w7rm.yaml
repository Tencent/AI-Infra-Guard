info:
  name: OpenClaw
  cve: GHSA-fqcm-97m6-w7rm
  summary: OpenClaw 消息操作附件加载在 sandboxRoot 未设置时绕过本地媒体根检查
  details: >-
    影响

    当 sandboxRoot 未设置时，sendAttachment 和 setGroupIcon 消息操作可以从本地绝对路径加载媒体，绕过预期的本地媒体根检查。当授权的消息操作路径被触发时，这可能允许读取运行时用户可访问的任意宿主文件。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 分类时最新发布的 npm 版本：2026.2.23

    - 受影响版本：<= 2026.2.23

    - 已在代码中修复：>= 2026.2.24（计划的下一个发布版本）


    修复措施

    升级至 openclaw 2026.2.24 或更高版本。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.24 或更高版本。修复提交 - 270ab03e379f9653e15f7033c9830399b66b7e51
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fqcm-97m6-w7rm
rule: version <= "2026.2.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fqcm-97m6-w7rm
