info:
  name: OpenClaw
  cve: GHSA-fqw4-mph7-2vr8
  summary: OpenClaw Gateway 本地共享认证重连静默将已配对设备权限从 operator.read 扩升至 operator.admin，可达节点 RCE
  details: >-
    漏洞概述


    Gateway 本地共享认证重连静默将已配对设备权限范围从 operator.read 扩升至 operator.admin，可达节点远程代码执行


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    本地共享认证的静默重连此前可自动批准权限升级请求，将已配对设备的权限范围
    从 operator.read 扩升至 operator.admin。提交 81ebc7e0344fd19c85778e883bad45e2da972229
    阻断了静默重连的权限升级路径，要求权限扩升必须经由显式配对审批，而非隐式本地重连路径。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 81ebc7e0344fd19c85778e883bad45e2da972229 在 main 分支修复。
  cvss: ''
  severity: CRITICAL
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：81ebc7e0344fd19c85778e883bad45e2da972229
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fqw4-mph7-2vr8
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fqw4-mph7-2vr8
