  summary: OpenClaw SSH 沙箱 tar 上传跟随符号链接，导致远程主机任意文件写入
  details: >-
    摘要

    SSH 沙箱 tar 上传跟随符号链接，导致远程主机任意文件写入


    维护者风险评估

    - 状态：开放

    - 标准化严重等级：高危

    - 评估：在已发布的 v2026.3.28 版本中确认存在：SSH 沙箱 tar 上传在 2026-03-31 的提交 3d5af14984 修复之前，缺少上传前符号链接逃逸的拒绝校验；维护者已确认该问题，修复尚未正式发布。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
