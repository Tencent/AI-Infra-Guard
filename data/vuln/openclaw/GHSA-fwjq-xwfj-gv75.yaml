info:
  name: OpenClaw
  cve: GHSA-fwjq-xwfj-gv75
  summary: 'OpenClaw `session_status` 在非沙箱调用场景下仍绕过已配置的 `tools.sessions.visibility` 可见性策略'
  details: >-
    漏洞概述

    session_status 在非沙箱调用场景下仍绕过已配置的 tools.sessions.visibility 可见性策略


    维护者评估

    - 状态：有限范围

    - 标准化严重等级：中危

    - 评估：在已发布的 v2026.3.22 中确认存在：非沙箱的 session_status 跳过了共享可见性守卫，
      但这属于同一 Agent 内的会话策略绕过，修复尚未发布，并非更广泛的宿主边界突破。


    受影响的软件包及版本

    - 软件包：openclaw（npm）

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 4d369a3400dc9b737fbe8daa63f09d909ce7beb8 — 2026-03-30T16:48:12+02:00
  references:
