info:
  name: OpenClaw
  cve: GHSA-g374-mggx-p6xc
  summary: OpenClaw 权限范围清除修复不完整，允许通过可信代理认证模式进行 operator.admin 权限提升
  details: >-
    漏洞概述

    权限范围清除修复不完整，允许通过可信代理（trusted-proxy）认证模式进行 operator.admin 权限提升


    维护者评估

    - 状态：待修复

    - 标准化严重等级：高危

    - 评估说明：v2026.3.28 对非 Control-UI 客户端仍缺少可信代理的权限范围清除处理，因此自声明的 operator 权限范围可在真实的携带身份信息的认证路径中得以保留；完整修复方案尚未发布。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：8b88b927cb0747ad24d95b07d35682bf85dc5b0e — 2026-03-30T14:19:00+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g374-mggx-p6xc
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g374-mggx-p6xc
