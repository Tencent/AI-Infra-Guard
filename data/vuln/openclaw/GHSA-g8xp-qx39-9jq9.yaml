info:
  name: OpenClaw
  cve: GHSA-g8xp-qx39-9jq9
  summary: OpenClaw `host-env-security-policy.json` 配置不完整，允许不受信任的模型通过环境变量覆盖在已批准的宿主执行请求中替换编译器二进制文件（`CC`、`CXX`、`CARGO_BUILD_RUSTC`、`CMAKE_C_COMPILER`）
  details: >-
    漏洞摘要

    host-env-security-policy.json 配置不完整，允许不受信任的模型通过环境变量覆盖在已批准的宿主执行请求中替换编译器二进制文件（CC、CXX、CARGO_BUILD_RUSTC、CMAKE_C_COMPILER）


    当前维护者研判

    - 状态：范围收窄

    - 标准化严重等级：中危

    - 研判说明：已发布的 v2026.3.28 版本中，宿主环境策略遗漏了编译器覆盖变量，但漏洞利用仍需在现有执行信任域内获得已批准的宿主执行请求，因此评定为中危而非高危。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - e277a37f896b5011a1df06e6490c6630074d0afa — 2026-03-30T20:06:32+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g8xp-qx39-9jq9
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g8xp-qx39-9jq9
