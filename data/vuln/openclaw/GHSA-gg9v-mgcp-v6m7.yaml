info:
  name: OpenClaw
  cve: GHSA-gg9v-mgcp-v6m7
  summary: OpenClaw Bootstrap 初始化配置码未绑定预期的设备角色与权限范围，导致配对过程中首次使用时可实施权限提升攻击
  details: >-
    漏洞概述

    Bootstrap 初始化配置码未绑定预期的设备角色与权限范围，
    导致配对过程中首次使用时可实施权限提升攻击


    维护者评估

    - 状态：开放

    - 标准化严重等级：高危

    - 评估：首次使用 Bootstrap 阶段的权限提升漏洞已在 v2026.3.22+ 中修复并发布，
      保持当前严重等级开放以供正式发布。


    受影响的软件包及版本

    - 软件包：openclaw（npm）

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.13-1

    - 已修复版本：>= 2026.3.22

    - 包含修复的首个稳定标签：v2026.3.22
