info:
  name: OpenClaw
  cve: GHSA-gjm7-hw8f-73rq
  summary: OpenClaw 已配对节点通过无限制的 node.event 代理调度提权至网关远程代码执行（RCE）
  details: >-
    漏洞概述

    已配对节点通过无限制的 node.event 代理调度提权至网关远程代码执行（RCE）


    维护者评估

    - 状态：范围已收窄

    - 标准化严重等级：高危

    - 评估说明：v2026.3.28 仍允许拥有 role=node 的已配对客户端通过 node.event agent.request 调用，访问超出节点 RPC 权限范围的网关侧工具，但"严重"定性被高估，因为利用此漏洞的前提是已获取可信已配对节点的立足点。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：a77928b1087e90f2a8903f8e5aca6dec9237ac62 — 2026-03-30T14:22:15+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-gjm7-hw8f-73rq
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-gjm7-hw8f-73rq
