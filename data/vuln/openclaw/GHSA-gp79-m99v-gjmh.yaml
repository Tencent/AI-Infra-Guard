info:
  name: OpenClaw
  cve: GHSA-gp79-m99v-gjmh
  summary: OpenClaw Mattermost 处理程序在缺少频道类型时可能放行请求
  details: >-
    摘要


    Mattermost 处理程序在缺少频道类型时可能放行请求。在受影响版本中，缺少频道类型元数据的 Mattermost 事件可能在未应用预期私信（DM）策略判断的情况下继续处理。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能处理本应被频道策略拦截的 Mattermost 事件。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.6。


    缓解措施


    在修复前，限制 Mattermost 机器人的访问权限并检查频道元数据错误。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.6 或更高版本。在修复前，限制 Mattermost 机器人的访问权限并检查频道元数据错误。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-gp79-m99v-gjmh
rule: version <= "2026.5.5"
