info:
  name: OpenClaw
  cve: GHSA-grc3-2j34-p6gm
  summary: >-
    OpenClaw message.action 转发可能将 Gateway 凭据发送至模型提供的回环地址
  details: >-
    摘要


    message.action 转发可能将 Gateway 凭据发送至模型提供的回环地址。在受影响版本中，模型控制的 action 元数据若选择了回环 Gateway URL，可能将携带 Gateway 凭据的 action 负载转发至所指定的回环地址。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能通过受影响路径将令牌和 action 负载暴露给由模型选择的本地监听者。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.2。


    缓解措施


    在修复前，限制消息 action 转发并避免使用模型提供的回环目标。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.2 或更高版本。在修复前，限制消息 action 转发并避免使用模型提供的回环目标。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-grc3-2j34-p6gm
rule: version <= "2026.4.29"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-grc3-2j34-p6gm
