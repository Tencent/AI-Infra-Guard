info:
  name: OpenClaw
  cve: GHSA-gxg4-2rrr-jhc7
  summary: OpenClaw 主机名检查可能对带尾部点号的主机名处理不一致
  details: >-
    摘要


    主机名检查可能对带尾部点号的主机名处理不一致。在受影响版本中，接受模型或工作区派生 URL 的请求路径，可通过在相同主机名后附加尾部点号的方式绕过封禁列表比对。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能访问操作员预期由主机名策略拦截的目标地址。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.26。


    缓解措施


    在修复前，通过代理或网络层封锁私有网络及元数据目标地址。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.26 或更高版本。在修复前，通过代理或网络层封锁私有网络及元数据目标地址。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-gxg4-2rrr-jhc7
rule: version <= "2026.5.22"
references:
