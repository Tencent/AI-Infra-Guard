info:
  name: OpenClaw
  cve: GHSA-h43v-27wg-5mf9
  summary: OpenClaw 伪造的 Nostr 私信可在签名验证前创建配对状态
  details: >-
    摘要


    在 OpenClaw 2026.3.31 之前，Nostr 私信入站处理路径可能在验证事件签名之前就发起配对挑战。
    伪造的私信可创建待处理配对条目，并在签名被拒绝之前触发配对回复尝试。


    影响


    未经认证的远程发送方可消耗共享配对容量，并在 Nostr 通道上触发有限的中继/日志记录操作。
    该漏洞不会导致消息解密、配对审批通过或更广泛的授权绕过。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：>= 2026.3.22，< 2026.3.31

    - 已修复版本：>= 2026.3.31

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - 4ee742174f36b5445703e3b1ef2fbd6ae6700fa4 — 在发送配对回复前验证入站私信签名
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-h43v-27wg-5mf9
rule: version < "2026.3.31"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-h43v-27wg-5mf9
