info:
  name: OpenClaw
  cve: GHSA-h5hg-h7rr-gpf3
  summary: OpenClaw Node 浏览器代理 `allowProfiles` 可通过持久化配置文件篡改与运行时配置文件选择绕过
  details: "摘要\r\nNode 浏览器代理的 allowProfiles 限制可通过持久化配置文件篡改与运行时配置文件选择实现绕过\r\
    \n\r\n当前维护者分析\r\n- 状态：开放中\r\n- 归一化严重等级：高危\r\n- 评估：已确认存在真实可利用的 allowProfiles 绕过漏洞，\
    攻击者可通过配置文件篡改和运行时配置文件选择实现绕过，该问题已在 v2026.3.22+ 版本中修复并发布，故保持开放状态待发布，而非关闭。\r\
    \n\r\n受影响的软件包 / 版本\r\n- 软件包：openclaw（npm）\r\n- 最新发布的 npm 版本：2026.3.31\r\n- 受影响版本范围：<=2026.3.13-1\r\
    \n- 已修复版本：>= 2026.3.22\r\n- 包含修复的第一个稳定标签：v2026.3.22"
  cvss: ''
  severity: HIGH
  security_advise: 请将 openclaw 升级至 >= 2026.3.22 或更高版本。相关提交：eac93507c36ccd0c359fba18fa466ef6448be8a5 — 2026-03-23T00:56:44-07:00
  references:
