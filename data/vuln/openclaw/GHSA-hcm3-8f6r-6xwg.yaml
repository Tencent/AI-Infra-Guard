info:
  name: OpenClaw
  cve: GHSA-hcm3-8f6r-6xwg
  summary: OpenClaw 浏览器调试/导出路由可能复用已打开的被封锁标签页
  details: >-
    摘要


    浏览器调试/导出路由可能复用已打开的被封锁标签页。在受影响版本中，能够引用已打开浏览器标签页的调用方，可在不重新应用预期 SSRF 策略的情况下复用被封锁的私有网络标签页。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能导出或检查本应受浏览器网络策略保护的标签页内容。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.29。


    缓解措施


    在使用调试/导出功能前关闭被封锁的标签页，并限制浏览器调试路由的访问权限，直至完成修复。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:R/S:C/C:H/I:L/A:N
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.29 或更高版本。在使用调试/导出功能前关闭被封锁的标签页，并限制浏览器调试路由的访问权限，直至完成修复。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hcm3-8f6r-6xwg
rule: version < "2026.4.29"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-hcm3-8f6r-6xwg
