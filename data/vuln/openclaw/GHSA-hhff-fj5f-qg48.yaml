  summary: OpenClaw Discord 音频预处理转录在成员授权校验前执行
  details: >-
    摘要

    Discord 音频预处理转录在成员授权校验前执行


    维护者风险评估

    - 状态：范围受限

    - 标准化严重等级：中危

    - 评估：v2026.3.28 版本仍在成员白名单拒绝校验之前执行 Discord 音频预处理，属于授权前资源消耗漏洞类型，而非草案中所描述的高危身份验证绕过。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
