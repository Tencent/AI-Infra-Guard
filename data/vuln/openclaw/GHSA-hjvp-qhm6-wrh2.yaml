info:
  name: openclaw
  cve: GHSA-hjvp-qhm6-wrh2
  summary: OpenClaw Node system.run 审批在启用审批的 host=node 流程中存在上下文绑定弱点
  details: >-
    概述

    在启用审批的 host=node 工作流中，system.run 审批并不总是携带严格的、版本化的执行上下文绑定。在依赖这些审批作为完整性保障的不常见配置中，先前已批准的请求可能在更改了环境输入的情况下被重用。


    受影响的包/版本

    - 包：npm openclaw

    - 分类时最新发布的 npm 版本：2026.2.25

    - 受影响范围：<= 2026.2.25

    - 计划修复版本（下一个 npm 发布）：2026.2.26


    前提条件/典型暴露场景

    此问题需要满足以下所有条件：

    - 通过 host=node 使用 system.run

    - 启用执行审批并将其用作执行完整性控制

    - 在同一上下文中可访问审批 ID


    大多数默认的单操作员本地配置不依赖此路径，因此实际暴露程度通常较低。


    详情

    审批匹配现在使用必需的版本化绑定（systemRunBindingV1），覆盖命令 argv、cwd、代理/会话上下文和环境哈希。


    修复内容：

    - 请求 host=node 审批时要求提供 commandArgv。

    - 消费 node system.run 审批时要求提供 systemRunBindingV1。

    - 移除了传统的非版本化回退匹配，在绑定缺失/不匹配时执行关闭失败策略。

    - 保持环境不匹配处理的显式性，并在主机环境策略中阻止 GIT_EXTERNAL_DIFF。

    - 添加/更新了不匹配映射和绑定规则的回归和契约测试覆盖。


    影响

    node 主机执行审批流程中依赖配置的审批完整性弱点。由于利用取决于特定的审批模式和上下文，严重性保持中等。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:U/C:L/I:L/A:L
  severity: MEDIUM
  security_advise: 升级 openclaw 到 >= 2026.2.26 或更高版本。提交 - 10481097f8e6dd0346db9be0b5f27570e1bdfcfa
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hjvp-qhm6-wrh2
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-hjvp-qhm6-wrh2
