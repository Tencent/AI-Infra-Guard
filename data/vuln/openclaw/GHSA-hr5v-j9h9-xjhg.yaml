info:
  name: OpenClaw
  cve: GHSA-hr5v-j9h9-xjhg
  summary: OpenClaw 沙箱媒体根目录绕过：通过未规范化的 `mediaUrl` / `fileUrl` 参数键实现路径穿越（CWE-22）
  details: >-
    > 已在 OpenClaw 2026.3.24（当前正式发布版本）中修复。


    公告详情

    标题：沙箱媒体根目录绕过——通过未规范化的 mediaUrl / fileUrl 参数键实现路径穿越（CWE-22）


    漏洞描述：

    概述

    Agent 沙箱强制机制中存在路径穿越漏洞，允许沙箱内的 Agent 通过在消息工具调用中使用 mediaUrl 或 fileUrl 参数键，读取其他 Agent 工作区中的任意文件。normalizeSandboxMediaParams
    函数仅校验 ["media", "path", "filePath"] 键，而 mediaUrl 和 fileUrl 完全绕过了规范化处理。结合 handlePluginAction 从分发上下文中丢弃 mediaLocalRoots
    的问题，最终实现完整的沙箱逃逸——任意 Agent 均可读取其指定沙箱根目录之外的文件。


    漏洞详情

    该漏洞存在于消息处理管道的两个文件中：


    1. normalizeSandboxMediaParams 中参数键覆盖不完整：


    在 src/infra/outbound/message-action-params.ts 中，该函数遍历硬编码的参数键白名单进行校验：


    ``typescript

    // 第 212 行

    const mediaKeys: Array<"media" | "path" | "filePath"> = ["media", "path", "filePath"];

    `


    mediaUrl 和 fileUrl 参数键未包含在此数组中。这两个键被多个通道扩展（Discord、Telegram、Slack、Matrix、Twitch）用于媒体附件处理，但完全绕过了 resolveSandboxedMediaSource
    执行的沙箱路径校验。


    2. handlePluginAction 中 mediaLocalRoots 被丢弃：


    在 src/infra/outbound/message-action-runner.ts 中，handlePluginAction 函数将操作分发至通道插件时，从上下文中省略了 mediaLocalRoots：


    `typescript

    // 第 684-697 行

    const handled = await dispatchChannelMessageAction({
        channel,
        action,
        cfg,
        params,
        accountId: accountId ?? undefined,
        requesterSenderId: input.requesterSenderId ?? undefined,
        sessionKey: input.sessionKey,
        sessionId: input.sessionId,
        agentId,
        gateway,
        toolContext: input.tool...
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.24 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hr5v-j9h9-xjhg
rule: 'version <= "2026.3.14"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-hr5v-j9h9-xjhg
