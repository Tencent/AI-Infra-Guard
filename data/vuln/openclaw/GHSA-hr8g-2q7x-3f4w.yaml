  summary: OpenClaw 网关控制接口信息泄露漏洞
  details: >-
    漏洞概述

    OpenClaw 网关控制接口信息泄露漏洞


    维护者评估

    - 状态：范围已收窄

    - 标准化严重等级：低危

    - 评估说明：已发布版本中 Control UI 引导 JSON 确实暴露了版本号和助手代理 ID，但仅属于低危的指纹识别或信息泄露问题；未发布的提交 c5c10adc 已精简了响应内容。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：c5c10adc022f42eb75ebb3bf364dd607738683b3 — 2026-03-30T15:08:19+01:00
  references:
