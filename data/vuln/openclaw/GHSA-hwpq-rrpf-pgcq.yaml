info:
  name: OpenClaw
  cve: GHSA-hwpq-rrpf-pgcq
  summary: OpenClaw system.run 审批身份不匹配可能执行与显示不同的二进制文件
  details: >-
    概述

    OpenClaw 中的 system.run 审批使用渲染后的命令文本作为审批标识，同时对 argv 令牌的空白字符进行裁剪。运行时执行仍使用原始 argv。因此，精心构造的带尾部空格的可执行令牌可以执行与审批者所见不同的二进制文件。


    受影响的包/版本

    - 包：openclaw (npm)

    - 受影响版本：<= 2026.2.24

    - 修复版本：>= 2026.2.25


    影响

    这是一个审批完整性绕过漏洞，当攻击者能够影响命令 argv 并重用/获取匹配的审批上下文时，可导致在 OpenClaw 运行时用户下执行意外命令。


    信任模型说明

    OpenClaw 不将单一网关主机/配置的对抗性多用户共享视为受支持的安全边界。此发现在受支持的部署中仍然有效，因为它破坏了操作员审批边界本身（审批显示的命令与实际执行的 argv 不一致）。
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 到 >= 2026.2.25 或更高版本。提交 - 03e689fc89bbecbcd02876a95957ef1ad9caa176
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hwpq-rrpf-pgcq
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-hwpq-rrpf-pgcq
