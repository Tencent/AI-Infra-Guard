info:
  name: OpenClaw
  cve: GHSA-j472-gf56-x589
  summary: OpenClaw PowerShell 编码命令别名可能绕过执行白名单检查
  details: >-
    摘要


    PowerShell 编码命令别名可能绕过执行白名单检查。在受影响版本中，使用缩写编码命令标志的命令请求，可能使用白名单解析器无法识别的别名形式。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能在未经预期白名单判断的情况下执行经编码的 PowerShell 内容。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在修复前，避免将 PowerShell 包装形式加入白名单，并对编码命令要求审批。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。在修复前，避免将 PowerShell 包装形式加入白名单，并对编码命令要求审批。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-j472-gf56-x589
rule: version <= "2026.5.7"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-j472-gf56-x589
