info:
  name: OpenClaw
  cve: GHSA-j4c9-w69r-cw33
  summary: OpenClaw Telegram DM 范围内联按钮回调绕过 DM 配对校验并篡改会话状态
  details: >-
    漏洞概述


    Telegram DM 范围内联按钮回调绕过 DM 配对校验并篡改会话状态


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    来自私信的 Telegram 回调查询此前使用较弱的仅回调授权机制，
    可在未满足正常 DM 配对要求的情况下篡改会话状态。
    提交 269282ac69ab6030d5f30d04822668f607f13065 对回调强制执行 DM 授权校验。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 269282ac69ab6030d5f30d04822668f607f13065 在 main 分支修复。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：269282ac69ab6030d5f30d04822668f607f13065
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-j4c9-w69r-cw33
rule: 'version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-j4c9-w69r-cw33
