info:
  name: OpenClaw
  cve: GHSA-j7p2-qcwm-94v4
  summary: OpenClaw 宿主环境变量清理黑名单不完整，可通过包管理器环境变量覆盖实现供应链重定向攻击
  details: >-
    漏洞概述


    宿主机执行环境变量覆盖的清理逻辑，未对多个包管理器及相关重定向变量实施失败关闭（fail-closed）策略，上述变量可操控依赖解析路径或启动行为。


    安全影响


    经过授权批准的执行请求，可被静默地重定向至攻击者控制的基础设施进行包解析或运行时引导，从而执行木马化内容，实现供应链攻击。


    受影响组件


    src/infra/host-env-security-policy.json, src/infra/host-env-security.ts


    修复版本


    - 受影响版本：< 2026.3.22

    - 已修复版本：>= 2026.3.22

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    由提交 7abfff756d 修复（Exec: harden host env override handling across gateway and node，执行：加固网关与节点的宿主环境变量覆盖处理机制）。
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
  severity: CRITICAL
  security_advise: '升级 openclaw 至 >= 2026.3.22 或更高版本。由提交 7abfff756d 修复（Exec: harden host env override handling across gateway and node，执行：加固网关与节点的宿主环境变量覆盖处理机制）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-j7p2-qcwm-94v4
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-j7p2-qcwm-94v4
