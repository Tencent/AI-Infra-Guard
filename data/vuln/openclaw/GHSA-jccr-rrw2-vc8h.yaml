info:
  name: OpenClaw
  cve: GHSA-jccr-rrw2-vc8h
  summary: OpenClaw safeBins jq `$ENV` 过滤器绕过导致环境变量信息泄露
  details: >-
    摘要


    jq 安全二进制策略（safe-bin policy）封锁了显式的 env 调用，但仍允许通过 $ENV 访问环境数据的 jq 程序执行。


    影响


    经运营商批准的 safe-bin jq 命令可泄露本应被安全策略隔离的环境变量信息。


    受影响组件


    src/infra/exec-safe-bin-semantics.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 78e2f3d66d 修复（Exec：加强 jq safe-bin 环境变量访问检查）。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 78e2f3d66d 修复（Exec：加强 jq safe-bin 环境变量访问检查）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jccr-rrw2-vc8h
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jccr-rrw2-vc8h
