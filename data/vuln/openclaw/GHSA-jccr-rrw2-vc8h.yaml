info:
  name: OpenClaw
  cve: GHSA-jccr-rrw2-vc8h
  summary: OpenClaw safeBins 中 jq `$ENV` 过滤器绕过导致环境变量信息泄露
  details: "概述\r\n\r\njq 安全白名单（safe-bin）策略阻止了显式的环境变量访问，但未能阻止通过 $ENV 访问环境数据的 jq 程序。\r\
    \n\r\n影响\r\n\r\n经运营商审批的安全白名单 jq 命令可泄露原本应被 safe-bin 策略限制在访问范围之外的环境变量。\r\n\r\n受影响组件\r\
    \n\r\nsrc/infra/exec-safe-bin-semantics.ts\r\n\r\n已修复版本\r\n\r\n- 受影响版本：<= 2026.3.24\r\n- 已修复版本：>= 2026.3.28\r\
    \n- 最新稳定版 2026.3.28 包含此修复。\r\n\r\n修复方案\r\n\r\n已通过提交 78e2f3d66d（Exec：收紧 jq safe-bin 环境变量检查）修复。\r\
    \n\r\n感谢腾讯朱雀实验室 @nicky-cc（https://github.com/Tencent/AI-Infra-Guard）的漏洞报告。"
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N
  severity: HIGH
  security_advise: '请升级 openclaw 至 >= 2026.3.28 或更高版本。已通过提交 78e2f3d66d（Exec：收紧 jq safe-bin 环境变量检查）修复。
    感谢腾讯朱雀实验室 @nicky-cc（https://github.com/Tencent/AI-Infra-Guard）的漏洞报告。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jccr-rrw2-vc8h
rule: 'version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jccr-rrw2-vc8h
