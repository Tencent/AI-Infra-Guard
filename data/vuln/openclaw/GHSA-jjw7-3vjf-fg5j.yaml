  summary: OpenClaw Nostr privateKey 配置脱敏绕过导致明文签名密钥通过 config.get 泄露
  details: "摘要\r\nOpenClaw Nostr privateKey 配置脱敏绕过导致明文签名密钥通过 config.get 泄露\r\n\r\n\
    当前维护者评估\r\n- 状态：开放\r\n- 规范化严重等级：中危\r\n- 评估：v2026.3.28 仍将 Nostr privateKey\
    \ 建模为普通字符串，导致配置视图可暴露该密钥，且密钥 schema 修复尚未发布。\r\n\r\n受影响的软件包 / 版本\r\n\
    - 软件包：openclaw (npm)\r\n- npm 最新发布版本：2026.3.31\r\n- 漏洞影响版本范围：<=2026.3.28\r\n\
    - 已修复版本：>= 2026.3.31\r\n- 包含修复的首个稳定标签：v2026.3.31"
  cvss: ''
