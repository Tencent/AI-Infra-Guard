info:
  name: OpenClaw
  cve: GHSA-jjw7-3vjf-fg5j
  summary: OpenClaw Nostr privateKey 配置脱敏绕过漏洞可通过 config.get 泄露明文签名密钥
  details: >-
    漏洞概述

    OpenClaw Nostr privateKey 配置脱敏绕过漏洞可通过 config.get 泄露明文签名密钥


    维护者现状评估

    - 状态：未修复（open）

    - 标准化严重等级：中危

    - 评估说明：v2026.3.28 版本仍将 Nostr privateKey 建模为普通字符串，导致配置视图可能暴露该密钥，且 secret-schema 修复尚未发布。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 57700d716f660591fb6e09727f3ca8041fa48b9d — 2026-03-31T19:55:03+09:00
