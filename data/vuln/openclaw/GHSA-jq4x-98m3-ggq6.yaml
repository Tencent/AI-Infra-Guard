info:
  name: openclaw
  cve: GHSA-jq4x-98m3-ggq6
  summary: 'OpenClaw ZDI-CAN-29312: OpenClaw Canvas 路径遍历信息泄露漏洞'
  details: >-
    ZDI-CAN-29312: OpenClaw Canvas 路径遍历信息泄露漏洞


    -- CVSS -----------------------------------------


    6.5: AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N


    -- 摘要 -------------------------------------


    趋势科技零日计划（Zero Day Initiative）发现了影响以下产品的漏洞：

    OpenClaw - OpenClaw


    -- 漏洞详情 ------------------------

    * 测试版本：openclaw 2026.2.17

    * 测试平台：macOS 26.3


    ---


    分析


    描述


    OpenClaw 网关的 canvas 工具接受带有 jsonlPath 参数的 a2ui_push 操作，该参数指定要读取的文件系统路径。网关使用 fs.readFile() 读取此文件，未进行路径验证、规范化或目录限制。经过认证的攻击者可以提供任意绝对或相对路径来读取网关进程可访问的任何文件。


    文件内容通过 canvas.a2ui.pushJSONL WebSocket 命令转发到已连接的 node 客户端。网关本身向 HTTP 调用方返回 { ok: true }，确认文件已被读取和传输。


    根本原因


    在 src/agents/tools/canvas-tool.ts 中，a2ui_push 操作处理器在没有任何路径限制的情况下从磁盘读取文件：


    ``typescript

    case "a2ui_push": {
      const jsonl =
        typeof params.jsonl === "string" && params.jsonl.trim()
          ? params.jsonl
          : typeof params.jsonlPath === "string" && params.jsonlPath.trim()
            ? await fs.readFile(params.jsonlPath.trim(), "utf8")  // <-- 未进行路径验证
            : "";
      if (!jsonl.trim()) {
        throw new Error("jsonl or jsonlPath required");
      }
      await invoke("canvas.a2ui.pushJSONL", { jsonl });
      return jsonResult({ ok: true });
    }

    `


    jsonlPath 参数仅经过 .trim() 调用后就直接传递给 fs.readFile()。缺少以下保护措施：

    - 无允许目录白名单

    - 无规范化处理（path.resolve / realpath）

    - 无目录遍历序列（..）检查

    - 无 .jsonl 文件扩展名限制


    攻击场景


    提示...
