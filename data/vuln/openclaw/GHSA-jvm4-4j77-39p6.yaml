info:
  name: OpenClaw
  cve: GHSA-jvm4-4j77-39p6
  summary: OpenClaw QQBot 流式命令可能在无明确 allowFrom 配置的情况下修改配置
  details: >-
    摘要


    QQBot 流式命令可能在无明确 allowFrom 配置的情况下修改系统配置。在受影响版本中，触达受影响命令的 QQBot 发送方，可在不要求明确非通配符白名单条目的情况下变更配置。


    本公告的范围仅限于上述具名功能及配置。其不影响 OpenClaw 的可信操作员模型：经过身份验证的 Gateway 操作员、已安装插件及有意设定的本地执行面仍属受信任范畴，除非跨越了独立的策略、审批、白名单、沙箱或认证边界。


    影响


    当受影响功能已启用且可访问时，可能在预期管理员策略之外修改 QQBot 流式配置。实际影响取决于操作员的配置，以及低信任输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.29。


    缓解措施


    在修复前，禁用该命令或将其限制为明确信任的 QQBot 发送方。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.29 或更高版本。在修复前，禁用该命令或将其限制为明确信任的 QQBot 发送方。作为通用加固措施，保持通道和工具白名单的严格限制，避免在相互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jvm4-4j77-39p6
rule: version <= "2026.4.27"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jvm4-4j77-39p6
