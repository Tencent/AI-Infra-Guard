info:
  name: OpenClaw
  cve: GHSA-jwf4-8wf4-jf2m
  summary: OpenClaw BlueBubbles（可选插件）在 allowFrom 为空时的配对/白名单不匹配
  details: >-
    概述

    BlueBubbles 是 OpenClaw 的可选通道插件。一个配置敏感的访问控制不匹配导致当 dmPolicy 为 pairing 或 allowlist 且 allowFrom 为空/未设置时，DM 发送者被视为已授权。


    严重性评估（中等）

    严重性设为中等，因为：

    - 此问题影响可选插件，而非核心消息接口；

    - 许多部署使用所有者控制的/私有的 BlueBubbles 身份，外部可达性有限；

    - 实际可利用性取决于不受信任的发送者是否能够联系到该特定 BlueBubbles 账户标识符。


    在典型的个人/自托管 BlueBubbles 配置中，映射的 Apple 身份为单一所有者且不可广泛访问，因此通常实际风险较低。


    在标识符可公开访问和/或代理工具权限较广的部署中，风险更高。


    技术详情

    1. BlueBubbles DM 策略默认为 pairing（dmPolicy ?? "pairing"）。

    2. 有效白名单可以为空（effectiveAllowFrom）。

    3. DM/反应授权调用 isAllowedBlueBubblesSender(...)。

    4. 该函数委托给共享的 isAllowedParsedChatSender(...)，该函数此前对空白名单返回 true。

    5. 结果：当 allowFrom 为空时，未知发送者可以绕过预期的配对/白名单控制。


    受影响的包/版本

    - 包：openclaw (npm)

    - 受影响版本：<= 2026.2.21-2

    - 计划修复版本：2026.2.22


    修复

    共享的解析聊天白名单辅助函数现在对空白名单执行关闭失败策略，恢复了预期的 BlueBubbles DM 控制行为。BlueBubbles 入站控制也被重构为对消息和反应路径使用统一的 DM/群组决策辅助函数，以减少未来的偏差。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 到 2026.2.22 或更高版本。共享的解析聊天白名单辅助函数现在对空白名单执行关闭失败策略，恢复了预期的
    BlueBubbles DM 控制行为。BlueBubbles 入站控制也被重构为对消息和反应路径使用统一的 DM/群组决策辅助函数，以减少未来的偏差。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jwf4-8wf4-jf2m
rule: version <= "2026.2.21-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jwf4-8wf4-jf2m
