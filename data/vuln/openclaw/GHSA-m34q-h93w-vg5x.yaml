info:
  name: OpenClaw
  cve: GHSA-m34q-h93w-vg5x
  summary: OpenClaw OpenShell 镜像模式在根目录范围配置错误时可删除任意远程目录
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，OpenShell 镜像后端接受任意绝对路径作为 remoteWorkspaceDir 和 remoteAgentWorkspaceDir 的值。在镜像模式下，这些路径随后会被用作远程清理与覆盖写入操作的目标目录。


    安全影响


    若攻击者能够影响上述 OpenShell 配置值，镜像同步操作可能删除非预期远程目录中的全部内容，并将上传的工作区数据写入其中，构成镜像同步路径上的破坏性远程路径漏洞。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: HIGH
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：b21c9840c2e38f4bb338d031511b479d5f07ca25 —
    约束 OpenShell 镜像同步的根目录范围
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-m34q-h93w-vg5x
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-m34q-h93w-vg5x
