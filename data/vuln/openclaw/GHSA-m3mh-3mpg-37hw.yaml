info:
  name: OpenClaw
  cve: GHSA-m3mh-3mpg-37hw
  summary: OpenClaw 任意恶意代码执行漏洞
  details: "> 已在 OpenClaw 2026.3.24（当前正式发布版本）中修复。\n\n概述\r\n在 OpenClaw 本地插件/钩子的安装阶段，Git 可执行文件可被项目级 .npmrc 文件劫持，导致安装过程中发生任意代码执行。\r\
    \n\r\n漏洞详情\r\n请注意，以下源码位置基于版本 openclaw-2026.3.13-1，但已确认该问题在当前最新版本 2026.3.23 中仍然存在。\r\n\r\n安装本地插件目录、本地插件压缩包、本地钩子包目录或本地钩子包压缩包时，OpenClaw\
    \ 首先将源目录复制到临时暂存目录（stageDir），然后在该目录中执行：\r\n\r\n``\r\nnpm install --omit=dev --silent --ignore-scripts\r\n`\r\n\r\n参见 src/infra/install-package-dir.ts:176-199。\r\
    \n\r\n由于此过程未剥离项目根目录的 .npmrc 文件，而 npm 在本地项目安装时会读取项目级 .npmrc，攻击者可在恶意插件或钩子目录中放置 .npmrc 文件以覆盖 npm 的 Git 可执行文件路径。利用 Git 依赖，攻击者可触发\
    \ npm 调用该恶意程序，从而在安装阶段执行任意本地代码。\r\n\r\n受影响路径\r\n\r\n- 插件 CLI 入口点：src/cli/plugins-cli.ts:199-255\r\n- 钩子 CLI 入口点：src/cli/hooks-cli.ts:573-676\r\
    \n- 插件本地目录/压缩包安装：src/plugins/install.ts:379-405, src/plugins/install.ts:541-565\r\n- 钩子本地目录/压缩包安装：src/hooks/install.ts:380-403,\
    \ src/hooks/install.ts:443-470\r\n- npm install --ignore-scripts 的实际执行：src/infra/install-package-dir.ts:176-199\r\n\r\
    \n漏洞触发流程\r\n\r\n1. 用户执行以下任一命令：\r\n\r\n   - openclaw plugins install <路径或规格>\r\n   - openclaw hooks install <路径或规格>\r\
    \n2. 若参数为本地目录或本地压缩包，OpenClaw 导航至本地安装路径。\r\n3. OpenClaw 将源目录复制至..."
  cvss: CVSS:3.1/AV:L/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.24 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-m3mh-3mpg-37hw
rule: 'version <= "2025.3.23"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-m3mh-3mpg-37hw
