info:
  name: OpenClaw
  cve: GHSA-m866-6qv5-p2fg
  summary: OpenClaw 宿主机环境变量黑名单遗漏 `GIT_TEMPLATE_DIR` 和 `AWS_CONFIG_FILE`，可通过环境变量覆盖实现代码执行
  details: >-
    摘要


    宿主机命令执行时的环境变量安全过滤未封锁 GIT_TEMPLATE_DIR 和 AWS_CONFIG_FILE，而这两个变量均可将受信任工具的行为重定向至攻击者控制的内容。


    影响


    已审批的命令执行请求可通过攻击者控制的配置文件重定向 git 或 AWS CLI 的行为，进而执行不受信任的代码或加载攻击者指定的凭据。


    受影响组件


    src/infra/host-env-security-policy.json, src/infra/host-env-security.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 6eb82fba3c 修复（Infra：封锁额外的宿主机命令执行环境变量键名）。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:C/C:L/I:L/A:N
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 6eb82fba3c 修复（Infra：封锁额外的宿主机命令执行环境变量键名）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-m866-6qv5-p2fg
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-m866-6qv5-p2fg
