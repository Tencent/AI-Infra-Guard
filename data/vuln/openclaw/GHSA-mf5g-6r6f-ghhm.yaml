info:
  name: OpenClaw
  cve: GHSA-mf5g-6r6f-ghhm
  summary: OpenClaw Synology Chat Webhook 认证前频率限制绕过，导致可暴力破解弱 Webhook Token
  details: >-
    漏洞概述


    Synology Chat Webhook 认证前频率限制绕过，导致可暴力破解弱 Webhook Token


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    Synology Chat Webhook 认证此前在拒绝无效 Token 时未对重复猜测进行限速，
    使攻击者可对弱 Webhook Secret 发起暴力破解攻击。
    提交 0b4d07337467f4d40a0cc1ced83d45ceaec0863c 在返回认证失败响应前添加重复猜测限速逻辑。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 0b4d07337467f4d40a0cc1ced83d45ceaec0863c 在 main 分支修复。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：0b4d07337467f4d40a0cc1ced83d45ceaec0863c
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mf5g-6r6f-ghhm
rule: 'version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mf5g-6r6f-ghhm
