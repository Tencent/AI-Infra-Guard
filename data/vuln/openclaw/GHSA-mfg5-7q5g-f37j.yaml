info:
  name: OpenClaw
  cve: GHSA-mfg5-7q5g-f37j
  summary: OpenClaw 语音通话媒体流在升级后才验证流，可能允许预启动未认证套接字增加资源压力
  details: >-
    概述

    @openclaw/voice-call（以及 openclaw 中捆绑的副本）在流验证之前接受媒体流 WebSocket 升级。在可达的部署中，未认证的预启动套接字可被持续打开并增加资源压力。


    受影响的包/版本

    - openclaw (npm)：受影响 <= 2026.2.21-2，修复于 2026.2.22。

    - @openclaw/voice-call (npm)：受影响 <= 2026.2.21，修复于 2026.2.22。


    技术详情

    在此修复之前，语音通话媒体流路径先升级套接字，然后在后续的 start 帧之后才运行 shouldAcceptStream()。这创造了一个预认证窗口，远程客户端可以在没有通话/令牌验证的情况下保持空闲套接字。


    影响

    在媒体流端点可达且流功能已启用的部署中存在可用性风险。在持续滥用下，这可能消耗连接相关资源并降低合法流的服务质量。


    修复措施

    修复在媒体流路径中添加了分层控制：

    - 严格的预启动超时（关闭未能快速发送有效 start 帧的套接字）

    - 全局待处理连接上限

    - 每 IP 待处理连接上限

    - 总开放媒体流连接上限

    - Webhook 服务器中更安全的升级路径解析
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H
  severity: HIGH
  security_advise: 升级 openclaw 到 2026.2.22 或更高版本。提交 - 1d8968c8a821ff1a05c294a1846b3bcb6f343794
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mfg5-7q5g-f37j
rule: version <= "2026.2.21-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mfg5-7q5g-f37j
