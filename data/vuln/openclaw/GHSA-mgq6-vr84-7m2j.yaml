info:
  name: OpenClaw
  cve: GHSA-mgq6-vr84-7m2j
  summary: >-
    OpenClaw QQBot 原生审批按钮未强制校验已配置的审批人身份
  details: >-
    漏洞概述


    OpenClaw 的 QQBot 频道可为 exec 及插件审批提供原生审批按钮。在受影响的版本中，按钮回调路径在处理审批时未强制校验已配置的 QQBot 审批人身份。


    文本命令审批路径使用了授权检查，此问题仅存在于原生 QQBot 审批按钮路径中。


    受影响的配置


    该漏洞影响以下部署场景：启用了 QQBot 原生审批按钮，且审批消息可被未配置为审批人的 QQ 用户看到。


    漏洞影响


    能够看到审批消息的非审批人用户可点击审批按钮并通过待处理请求。视待处理审批内容而定，这可能允许本应由授权审批人才能执行的 exec 或插件操作被非授权用户执行。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    升级至 openclaw@2026.5.18 或更高版本。在升级之前，请避免将原生审批按钮下发到包含不应具有审批权限的用户的 QQ 会话中。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: >-
    升级 openclaw 至 2026.5.18 或更高版本。在升级之前，请避免将原生审批按钮下发到包含不应具有审批权限的用户的 QQ 会话中。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mgq6-vr84-7m2j
rule: version < "2026.5.18"
references:
