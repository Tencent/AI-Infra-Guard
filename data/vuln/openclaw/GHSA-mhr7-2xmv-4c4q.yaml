info:
  name: OpenClaw
  cve: GHSA-mhr7-2xmv-4c4q
  summary: OpenClaw HTTP 运营商端点在可信代理模式下缺乏浏览器来源（Origin）校验
  details: >-
    漏洞概述

    HTTP 运营商端点在可信代理（trusted-proxy）模式下缺乏浏览器来源（Origin）校验


    维护者评估

    - 状态：范围已收窄

    - 标准化严重等级：中危

    - 评估说明：这是已发布标签中真实存在的可信代理 HTTP CSRF 或浏览器来源校验缺失问题，但非严重漏洞，因为其利用条件依赖于携带身份信息的可信代理浏览器部署场景，而非共享密钥 HTTP 运营商模型。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：6b3f99a11f4d070fa5ed2533abbb3d7329ea4f0d — 2026-03-31T19:49:26+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mhr7-2xmv-4c4q
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mhr7-2xmv-4c4q
