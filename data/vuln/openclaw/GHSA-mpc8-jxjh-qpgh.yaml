info:
  name: OpenClaw
  cve: GHSA-mpc8-jxjh-qpgh
  summary: OpenClaw Focus 命令可能绕过控制范围（controlScope）校验
  details: >-
    漏洞概述


    Focus 命令可能绕过控制范围（controlScope）校验。在受影响的版本中，能够触发 focus 命令的调用方可在未强制执行预期控制范围的情况下运行该命令。


    本公告仅针对所述功能和配置。不影响 OpenClaw 的可信操作员模型：除非跨越独立的策略、审批、白名单、沙箱或认证边界，否则已认证的 Gateway 操作员、已安装的插件及有意设计的本地执行接口仍被视为可信。


    漏洞影响


    当受影响功能启用且可被访问时，此漏洞可能导致 focus 状态在预期调用方权限之外被修改。实际影响取决于操作员的配置以及低信任输入是否能到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.25。


    缓解措施


    在修复前，将 focus 命令访问权限限制为可信操作员。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    升级 openclaw 至 2026.4.25 或更高版本。在修复前，将 focus 命令访问权限限制为可信操作员。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mpc8-jxjh-qpgh
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mpc8-jxjh-qpgh
