info:
  name: OpenClaw
  cve: GHSA-mw7w-g3mg-xqm7
  summary: OpenClaw BlueBubbles 群组表情回应绕过 requireMention 并仍将系统事件加入 Agent 可见队列
  details: >-
    漏洞概述


    BlueBubbles 群组表情回应绕过 requireMention 并仍将系统事件加入 Agent 可见队列


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    BlueBubbles 群组表情回应事件此前绕过 requireMention 检查，
    仍将 Agent 可见的系统事件加入队列，而对应群组本应处于仅限 @提及 的访问控制下。
    提交 f8c98630785288cc1f1d0893503ef3b653a3cede 将表情回应路径纳入与普通群组消息相同的 @提及 门控逻辑。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 f8c98630785288cc1f1d0893503ef3b653a3cede 在 main 分支修复。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：f8c98630785288cc1f1d0893503ef3b653a3cede
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mw7w-g3mg-xqm7
rule: 'version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mw7w-g3mg-xqm7
