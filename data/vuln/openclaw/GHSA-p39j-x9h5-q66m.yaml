info:
  name: OpenClaw
  cve: GHSA-p39j-x9h5-q66m
  summary: OpenClaw 嵌入式运行器策略可被提供商别名混淆
  details: >-
    漏洞概述


    嵌入式运行器策略可被提供商别名混淆。在受影响的版本中，使用提供商别名的请求可能将策略与别名进行比较，而非与规范的提供商身份进行比较。


    本公告仅针对所述功能和配置。不影响 OpenClaw 的可信操作员模型：除非跨越独立的策略、审批、白名单、沙箱或认证边界，否则已认证的 Gateway 操作员、已安装的插件及有意设计的本地执行接口仍被视为可信。


    漏洞影响


    当受影响功能启用且可被访问时，此漏洞可能导致捆绑工具访问超出预期提供商策略的范围。实际影响取决于操作员的配置以及低信任输入是否能到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.25。


    缓解措施


    在修复前，避免在嵌入式运行器工具策略中使用提供商别名路由。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    升级 openclaw 至 2026.4.25 或更高版本。在修复前，避免在嵌入式运行器工具策略中使用提供商别名路由。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-p39j-x9h5-q66m
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-p39j-x9h5-q66m
