info:
  name: openclaw
  cve: GHSA-p4wh-cr8m-gm6c
  summary: OpenClaw shell-env 受信任前缀回退允许通过 $SHELL 执行攻击者控制的二进制文件
  details: >-
    概述

    shell-env 对 $SHELL 回退使用受信任的基于前缀的可执行路径，允许在本地/运行时环境影响场景中执行攻击者控制的二进制文件。


    详情

    在受影响版本中，shell 选择接受以下任一条件：

    1. 列在 /etc/shells 中的 shell，或

    2. 硬编码受信任前缀下的任何可执行文件（/bin、/usr/bin、/usr/local/bin、/opt/homebrew/bin、/run/current-system/sw/bin）。


    选定的 shell 随后作为登录 shell（-l -c 'env -0'）执行，用于 PATH/环境探测。


    在受信任前缀目录可写（例如 /opt/homebrew/bin 下的常见 Homebrew 布局）且运行时 $SHELL 可被影响的系统上，这使得能够在 OpenClaw 进程上下文中执行攻击者控制的二进制文件。


    修复移除了受信任前缀可执行文件回退，现在仅信任在 /etc/shells 中显式注册的 shell；否则回退到 /bin/sh。


    受影响的包/版本

    - 包：openclaw (npm)

    - 受影响版本：>= 2026.2.22, <= 2026.2.22-2

    - 最新发布的受影响版本：2026.2.22-2

    - 修复版本（已发布）：>= 2026.2.23
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 到 >= 2026.2.23 或更高版本。提交 - ff10fe8b91670044a6bb0cd85deb736a0ec8fb55
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-p4wh-cr8m-gm6c
rule: version <= "2026.2.22-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-p4wh-cr8m-gm6c
