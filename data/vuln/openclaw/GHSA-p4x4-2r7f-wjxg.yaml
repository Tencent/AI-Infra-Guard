info:
  name: OpenClaw
  cve: GHSA-p4x4-2r7f-wjxg
  summary: OpenClaw Gateway 执行审批的"永久允许"功能对载体可执行文件的信任过于宽泛
  details: >-
    摘要


    当命令通过调度包装器路由时，"永久允许"持久化可能将包装器载体可执行文件而非实际调用的目标程序加入信任列表。


    影响


    单次审批操作可能持久化比运营商预期更宽泛的未来白名单条目，削弱命令执行审批的边界控制。


    受影响组件


    src/infra/exec-approvals-allowlist.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 9ec44fad39 修复（Exec approvals：拒绝将包装器载体可执行文件作为"永久允许"目标）。
  cvss: CVSS:3.1/AV:L/AC:L/PR:L/UI:R/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 9ec44fad39 修复（Exec approvals：拒绝将包装器载体可执行文件作为"永久允许"目标）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-p4x4-2r7f-wjxg
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-p4x4-2r7f-wjxg
