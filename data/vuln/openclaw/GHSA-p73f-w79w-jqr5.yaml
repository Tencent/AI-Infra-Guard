info:
  name: OpenClaw
  cve: GHSA-p73f-w79w-jqr5
  summary: OpenClaw 原生命令授权可能跳过所有者命令（owner-command）强制校验
  details: >-
    漏洞概述


    原生命令授权可能跳过所有者命令（owner-command）强制校验。在受影响的版本中，能够触发原生命令处理的发送方可在未强制执行已配置的仅限所有者命令策略的情况下对原生命令进行授权。


    本公告仅针对所述功能和配置。不影响 OpenClaw 的可信操作员模型：除非跨越独立的策略、审批、白名单、沙箱或认证边界，否则已认证的 Gateway 操作员、已安装的插件及有意设计的本地执行接口仍被视为可信。


    漏洞影响


    当受影响功能启用且可被访问时，此漏洞可能导致本不应具有该命令访问权限的发送方执行所有者级别的命令。实际影响取决于操作员的配置以及低信任输入是否能到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.6。


    缓解措施


    在修复前，将原生命令接口限制为可信发送方。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    升级 openclaw 至 2026.5.6 或更高版本。在修复前，将原生命令接口限制为可信发送方。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-p73f-w79w-jqr5
rule: version <= "2026.5.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-p73f-w79w-jqr5
