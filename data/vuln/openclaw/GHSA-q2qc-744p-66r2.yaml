info:
  name: OpenClaw
  cve: GHSA-q2qc-744p-66r2
  summary: OpenClaw `session_status` sessionId 解析绕过沙箱会话树可见性限制
  details: >-
    漏洞概述


    session_status sessionId 解析绕过沙箱会话树可见性限制


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：>= 2026.3.11，<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    session_status 此前在早期可见性检查完成后才将 sessionId 解析为规范会话键，
    使处于沙箱中的子会话能够访问因 sessionKey 限制而应被阻断的父会话或同级会话。
    提交 d9810811b6c3c9266d7580f00574e5e02f7663de 在 sessionId 解析后再次执行可见性检查，
    防止沙箱调用方逃逸其会话树边界。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 d9810811b6c3c9266d7580f00574e5e02f7663de 在 main 分支修复。
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：d9810811b6c3c9266d7580f00574e5e02f7663de
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-q2qc-744p-66r2
rule: 'version >= "2026.3.11" && version <= "2026.3.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-q2qc-744p-66r2
