info:
  name: OpenClaw
  cve: GHSA-q99w-vh6v-q3v7
  summary: >-
    OpenClaw 配对范围设备会话可在节点令牌撤销后恢复其权限
  details: >-
    漏洞概述


    在受影响的版本中，设备的配对范围会话在该节点令牌被撤销后，仍可重新建立节点令牌权限。撤销操作应使设备永久失去该权限，除非再次通过正常配对流程重新获得批准。


    此问题涉及令牌撤销和设备角色隔离，不允许未经身份验证的设备创建。


    受影响的配置


    该漏洞影响以下场景：已配对设备在其节点令牌被撤销后，仍保留具有配对相关权限范围的同设备会话。


    漏洞影响


    本应已失去节点 WebSocket 权限的设备可在未经重新审批的情况下重新获取该权限。这削弱了撤销操作作为操作员控制手段的有效性，可能导致节点级访问权限存续时间超出预期。


    影响仅限于已具备合法配对或会话基础的设备。


    已修复版本


    首个稳定修复版本为 2026.5.26。


    缓解措施


    升级至 openclaw@2026.5.26 或更高版本。如果在旧版本上已撤销节点令牌，请重启 Gateway 并移除并重新配对受影响设备，以确保不存在残留的有效会话。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: >-
    升级 openclaw 至 2026.5.26 或更高版本。如果在旧版本上已撤销节点令牌，请重启 Gateway 并移除并重新配对受影响设备，以确保不存在残留的有效会话。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-q99w-vh6v-q3v7
rule: version < "2026.5.26"
