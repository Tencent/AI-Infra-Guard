info:
  name: OpenClaw
  cve: GHSA-q9w8-cf67-r238
  summary: OpenClaw macOS 广域发现功能接受任意 Tailnet 对等节点作为 DNS 权威并泄露运营商凭据
  details: >-
    漏洞摘要

    macOS 广域发现功能接受任意 Tailnet 对等节点作为 DNS 权威并泄露运营商凭据


    当前维护者研判

    - 状态：范围收窄

    - 标准化严重等级：中危

    - 研判说明：已确认为已发布版本中存在的 macOS 发现引导缺陷，但漏洞利用需要攻击者处于同一 Tailnet 内、具备 CA 信任的端点，并需要用户主动选择，因此评定为中危而非高危。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - a23c33a681f8c1b22dc793995acc4c5c4b568346 — 2026-03-31T10:04:11+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-q9w8-cf67-r238
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-q9w8-cf67-r238
