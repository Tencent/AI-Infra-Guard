info:
  name: OpenClaw
  cve: GHSA-qcc3-jqwp-5vh2
  summary: OpenClaw LINE Webhook 处理器在签名验证前缺少共享预认证并发限额
  details: >-
    漏洞摘要

    LINE Webhook 处理器在签名验证前缺少共享预认证并发限额


    当前维护者研判

    - 状态：开放

    - 标准化严重等级：低危

    - 研判说明：已发布的 v2026.3.28 版本在公开 LINE Webhook 路径上缺少共享预认证并发限额，但其影响仅限于短暂的可用性损失，因此评定为低危。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
