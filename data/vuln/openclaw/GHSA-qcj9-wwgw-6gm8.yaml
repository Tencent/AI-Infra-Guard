info:
  name: OpenClaw
  cve: GHSA-qcj9-wwgw-6gm8
  summary: OpenClaw 工作区 .env 文件可覆盖内置插件信任根目录
  details: >-
    漏洞概述

    工作区 .env 文件可覆盖内置插件信任根目录


    维护者现状评估

    - 状态：未修复（open）

    - 标准化严重等级：高危

    - 评估说明：v2026.3.28 版本仍允许工作区 .env 文件覆盖 OPENCLAW_BUNDLED_PLUGINS_DIR 环境变量，但严重级别不应评定为危急，因为利用该漏洞仍依赖攻击者控制的工作区被加载，而非通用的远程利用方式。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: HIGH
  security_advise: 将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 330a9f98cb29c79b1c16a2117e03d6276a0d6289 — 2026-03-31T19:25:12+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qcj9-wwgw-6gm8
rule: version <= "2026.3.28"
