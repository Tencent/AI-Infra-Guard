info:
  name: OpenClaw
  cve: GHSA-qf48-qfv4-jjm9
  summary: OpenClaw 飞书扩展 resolveUploadInput 绕过文件系统沙箱，可通过 upload_image 实现任意文件读取
  details: >-
    漏洞概述


    飞书上传路径解析逻辑在将文件路径传递至上传流程之前，未能将其限制在已配置的 localRoots 沙箱范围内，存在路径穿越风险。


    安全影响


    受 workspace 或 localRoots 路径约束的工具调用方，可利用飞书文档上传操作窃取宿主机上的任意文件，造成敏感信息泄露。


    受影响组件


    extensions/feishu/src/docx.ts


    修复版本


    - 受影响版本：>= 2026.2.6，<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    由提交 764394c78b 修复（fix: enforce localRoots sandbox on Feishu docx upload file reads，修复：对飞书文档上传文件读取强制执行 localRoots 沙箱限制）。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:N/A:N
  severity: MEDIUM
  security_advise: '升级 openclaw 至 >= 2026.3.28 或更高版本。由提交 764394c78b 修复（fix: enforce localRoots sandbox on Feishu docx upload file reads，修复：对飞书文档上传文件读取强制执行 localRoots 沙箱限制）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qf48-qfv4-jjm9
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qf48-qfv4-jjm9
