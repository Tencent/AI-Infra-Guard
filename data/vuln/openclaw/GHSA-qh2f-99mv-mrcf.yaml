info:
  name: OpenClaw
  cve: GHSA-qh2f-99mv-mrcf
  summary: OpenClaw Bundle MCP 回环在会话创建时可能绕过 exec 拒绝列表
  details: >-
    漏洞概述


    Bundle MCP 回环在会话创建时可能绕过 exec 拒绝列表。在受影响的版本中，能够访问受影响的捆绑 MCP 会话创建路径的调用方，可绕过针对该回环 MCP 入口点所设置的拒绝列表。


    本公告仅针对所述功能和配置。不影响 OpenClaw 的可信操作员模型：除非跨越独立的策略、审批、白名单、沙箱或认证边界，否则已认证的 Gateway 操作员、已安装的插件及有意设计的本地执行接口仍被视为可信。


    漏洞影响


    当受影响功能启用且可被访问时，此漏洞可能启动一个具有比该 MCP 路径预期更宽泛命令访问范围的会话。实际影响取决于操作员的配置以及低信任输入是否能到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在修复前，将捆绑 MCP 回环访问权限限制为可信操作员。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    升级 openclaw 至 2026.5.12 或更高版本。在修复前，将捆绑 MCP 回环访问权限限制为可信操作员。作为通用加固措施，保持频道和工具白名单的严格范围，避免多个互不信任的用户共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qh2f-99mv-mrcf
rule: version < "2026.5.12"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qh2f-99mv-mrcf
