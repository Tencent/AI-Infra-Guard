info:
  name: OpenClaw
  cve: GHSA-qjpc-qf9m-xwmr
  summary: >-
    OpenClaw 可信代理控制 UI WebSocket 在配对前接受客户端声明的权限范围
  details: >-
    漏洞概述


    在可信代理（trusted-proxy）控制 UI 模式下，OpenClaw 在客户端声明的操作员权限范围绑定到服务器批准的配对或可信代理授权基线之前，就接受了 WebSocket 客户端所声明的权限范围。


    此问题影响可信代理控制 UI 部署，不适用于共享密钥控制 UI 会话（该类会话在设计上被视为可信操作员会话）。


    受影响的配置


    该漏洞影响以下场景：使用 `gateway.auth.mode: "trusted-proxy"` 进行控制 UI 访问，且受限的可信代理用户可以打开控制 UI WebSocket 并以提升的请求权限范围提交全新的未配对设备身份。


    漏洞影响


    未配对或受限的可信代理控制 UI 客户端可在其活跃的 WebSocket 连接上获取缓存的 operator.admin 权限，该权限随后可用于调用需要管理员授权的 Gateway RPC，直至连接关闭或重新验证为止。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    升级至 openclaw@2026.5.18 或更高版本。在升级之前，将可信代理控制 UI 访问权限限制为仅允许其所请求权限范围的用户，并在修改可信代理授权策略后重启 Gateway。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: >-
    升级 openclaw 至 2026.5.18 或更高版本。在升级之前，将可信代理控制 UI 访问权限限制为仅允许其所请求权限范围的用户，并在修改可信代理授权策略后重启 Gateway。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qjpc-qf9m-xwmr
rule: version < "2026.5.18"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qjpc-qf9m-xwmr
