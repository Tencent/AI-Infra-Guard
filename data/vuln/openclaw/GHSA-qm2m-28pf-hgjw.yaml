info:
  name: OpenClaw
  cve: GHSA-qm2m-28pf-hgjw
  summary: 'OpenClaw Gateway 插件 HTTP auth: "gateway" 临时授予 operator.admin 运行时权限范围'
  details: >-
    漏洞概述


    Gateway 插件 HTTP auth: "gateway" 临时授予 operator.admin 运行时权限范围


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    Gateway 认证的插件 HTTP 路由此前会创建包含 operator.admin 的运行时权限集，
    而不考虑调用方已授予的实际权限范围。提交 ec2dbcff9afd8a52e00de054b506c91726d9fbbe
    使插件 HTTP 运行时权限保持最小化，并保留调用方权限范围边界。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 ec2dbcff9afd8a52e00de054b506c91726d9fbbe 在 main 分支修复。
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：ec2dbcff9afd8a52e00de054b506c91726d9fbbe
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qm2m-28pf-hgjw
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qm2m-28pf-hgjw
