info:
  name: OpenClaw
  cve: GHSA-r5fq-947m-xm57
  summary: OpenClaw apply_patch 路径遍历可在工作区外写入/删除文件
  details: "概述\r\n\r\n在受影响版本中，当 apply_patch 已启用且代理在无文件系统沙箱隔离的情况下运行时，精心构造的路径可导致在配置的工作区目录之外进行文件写入/删除。\r\n\r\n受影响的包/版本\r\n\r\n- 包：openclaw (npm)\r\n- 受影响：<= 2026.2.13\r\n- 修复：>= 2026.2.14\r\n\r\n详情\r\
    \n\r\napply_patch 中的非沙箱路径解析未执行工作区包含性检查。../../... 或绝对路径等输入可在非沙箱模式下逃逸工作目录。\r\n\r\n影响\r\n\r\n实际影响取决于部署方式和谁能触发工具执行。当工具调用暴露给不太受信任的调用方或操作员期望仅工作区隔离时，此问题最为相关。\r\n\r\n变通方法\r\n\r\n- 如果不需要 apply_patch，保持 tools.exec.applyPatch.enabled 禁用。\r\n- 保持 tools.exec.applyPatch.workspaceOnly 为安全默认值 true。\r\n- 限制谁能触发工具执行（以及哪些工具在白名单中）。\r\n\r\n配置说明\r\n\r\ntools.exec.applyPatch.workspaceOnly:\
    \ false 有意选择退出工作区隔离，可重新启用工作区外的写入/删除。\r\n\r\n修复\r\n\r\n- PR: https://github.com/openclaw/openclaw/pull/16405\r\n- 合并提交: 5544646a09c0121fca7d7093812dc2de8437c7f1\r\
    \n\r\n致谢\r\n\r\n感谢 @p80n-sec 报告此问题。"
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: '升级 openclaw 到 >=2026.2.14 或更高版本。- PR: https://github.com/openclaw/openclaw/pull/16405
    - 合并提交: 5544646a09c0121fca7d7093812dc2de8437c7f1'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-r5fq-947m-xm57
rule: version <= "2026.2.13"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-r5fq-947m-xm57
