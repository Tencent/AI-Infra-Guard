info:
  name: OpenClaw
  cve: GHSA-rf6h-5gpw-qrgq
  summary: OpenClaw MS Teams 反馈 Invoke 绕过发件方白名单并记录未授权会话反馈
  details: >-
    漏洞概述


    MS Teams 反馈 Invoke 绕过发件方白名单并记录未授权会话反馈


    受影响软件包及版本


    - 软件包：openclaw

    - 受影响版本：<= 2026.3.24

    - 首个修复版本：2026.3.25

    - 验证时 npm 最新发布版本：2026.3.24


    漏洞详情


    Microsoft Teams 反馈 Invoke 操作此前绕过发件方授权检查，
    可为未授权发件方记录反馈或触发反射响应。
    提交 c5415a474bb085404c20f8b312e436997977b1ea 对反馈 Invoke 应用与 DM 和群组相同的授权校验。


    已在标签 v2026.3.24 上验证存在该漏洞，并由提交 c5415a474bb085404c20f8b312e436997977b1ea 在 main 分支修复。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.25 或更高版本。相关提交：c5415a474bb085404c20f8b312e436997977b1ea
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rf6h-5gpw-qrgq
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rf6h-5gpw-qrgq
