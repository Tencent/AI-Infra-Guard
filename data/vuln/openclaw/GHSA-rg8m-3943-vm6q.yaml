info:
  name: OpenClaw
  cve: GHSA-rg8m-3943-vm6q
  summary: OpenClaw Matrix 话题根消息及回复上下文可绕过发送者白名单限制
  details: >-
    漏洞摘要

    Matrix 话题根消息及回复上下文可绕过发送者白名单限制


    维护者评估

    - 状态：未修复

    - 标准化严重等级：中危

    - 评估：该漏洞在已发布的 v2026.3.28 Matrix 集成中真实存在，原因是获取到的话题根消息及回复上下文可绕过发送者白名单验证，主线过滤修复补丁尚未发布。


    受影响包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - 8a563d603b70ef6338915f0527bee87282c3bad5 — 2026-03-31T17:09:03+01:00
