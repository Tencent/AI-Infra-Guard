info:
  name: OpenClaw
  cve: GHSA-rggc-m335-3wvj
  summary: >-
    OpenClaw 同主机可信代理部署可能接受本地伪造的身份标头
  details: >-
    摘要


    同主机可信代理部署可能接受本地伪造的身份标头。在受影响版本中，能够访问面向代理的 Gateway
    端口的本地同主机调用方，可以提供通常仅由可信代理使用的身份标头。


    本安全公告的影响范围限定于上述特定功能和配置。它不改变 OpenClaw 的可信操作员模型：经过身份验证的
    Gateway 操作员、已安装的插件以及预期的本地执行面，在未跨越独立的策略、审批、白名单、沙箱或认证边界的情况下，
    仍被视为可信实体。


    影响


    当受影响功能被启用且可访问时，攻击者可能借助伪造的标头获取与之关联的操作员身份。实际影响取决于操作员的配置，
    以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    将可信代理入口绑定在实际代理之后，并通过防火墙阻止直接的同主机访问。作为常规安全加固措施，应保持通道和工具白名单的严格限制，
    避免在相互不受信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.18 或更高版本。将可信代理入口绑定在实际代理之后，并通过防火墙阻止直接的同主机访问。
    作为常规安全加固措施，应保持通道和工具白名单的严格限制，避免在相互不受信任的用户之间共享同一 Gateway，
    并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rggc-m335-3wvj
rule: version < "2026.5.18"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rggc-m335-3wvj
