info:
  name: OpenClaw
  cve: GHSA-rj6p-xmxr-qj4h
  summary: OpenClaw MCP 回环路径可能允许非所有者调用方绕过仅限所有者的工具策略
  details: >-
    摘要


    MCP 回环路径可能允许非所有者调用方绕过仅限所有者的工具策略。在受影响版本中，能够访问受影响回环路径的非所有者调用方，
    可以绕过仅限所有者的工具策略及工具调用前置钩子（before-tool-call hooks）。


    本安全公告的影响范围限定于上述特定功能和配置。它不改变 OpenClaw 的可信操作员模型：经过身份验证的
    Gateway 操作员、已安装的插件以及预期的本地执行面，在未跨越独立的策略、审批、白名单、沙箱或认证边界的情况下，
    仍被视为可信实体。


    影响


    当受影响功能被启用且可访问时，攻击者可能通过该回环路径调用仅限所有者的行为。实际影响取决于操作员的配置，
    以及低信任级别的输入是否能够到达该路径。


    解决方案


    当本安全公告中列出修复版本后，请更新至对应的已修复 OpenClaw 版本。若"已修复版本"字段已填充，
    请使用该版本或更高版本。


    缓解措施


    在修复完成前，将 MCP 回环访问限制为可信操作员。作为常规安全加固措施，应保持通道和工具白名单的严格限制，
    避免在相互不受信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:L/I:H/A:L
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.24 或更高版本。在修复完成前，将 MCP 回环访问限制为可信操作员。
    作为常规安全加固措施，应保持通道和工具白名单的严格限制，避免在相互不受信任的用户之间共享同一 Gateway，
    并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rj6p-xmxr-qj4h
rule: version < "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rj6p-xmxr-qj4h
