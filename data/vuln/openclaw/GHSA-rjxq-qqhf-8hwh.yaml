info:
  name: OpenClaw
  cve: GHSA-rjxq-qqhf-8hwh
  summary: >-
    OpenClaw MCP 流式 HTTP 重定向可能将已配置的自定义请求头转发至其他源站
  details: >-
    摘要


    OpenClaw 支持通过操作员配置自定义请求头的远程 MCP 流式 HTTP 服务器。在受影响版本中，当 MCP 端点响应跨源重定向时，
    这些自定义请求头可能被一并转发至重定向目标。


    此问题仅影响配置了自定义请求头的 MCP 流式 HTTP 服务器，不会暴露 OpenClaw 的其他凭据。


    受影响配置


    以下部署场景受到影响，需同时满足所有条件：


    - transportType 设置为 "streamable-http"

    - 在 mcp.servers.*.headers 下配置了敏感自定义请求头

    - MCP 端点存在恶意行为、已被攻陷，或能够重定向至其他源站


    影响


    MCP 自定义请求头（如 API 密钥或租户路由头）可能被发送至重定向目标。泄露的凭据范围取决于操作员为该 MCP 服务器配置的具体请求头。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    升级至 openclaw@2026.5.8 或更高版本。在升级前，避免对不完全受信任的服务器使用自定义 MCP 请求头，
    并轮换可能已因重定向端点而泄露的 MCP 专用凭据。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:L/A:N
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。升级至 openclaw@2026.5.8 或更高版本。在升级前，避免对不完全受信任的服务器使用自定义
    MCP 请求头，并轮换可能已因重定向端点而泄露的 MCP 专用凭据。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rjxq-qqhf-8hwh
rule: version < "2026.5.12"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rjxq-qqhf-8hwh
