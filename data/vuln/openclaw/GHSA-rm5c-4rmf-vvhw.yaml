info:
  name: OpenClaw
  cve: GHSA-rm5c-4rmf-vvhw
  summary: OpenClaw 沙箱文件操作采用"先检查后执行"模式，绕过基于文件描述符的 TOCTOU 防御机制
  details: >-
    漏洞概述

    沙箱文件操作采用"先检查后执行"（check-then-act）模式，绕过基于文件描述符（fd）的 TOCTOU（检查时间与使用时间竞争）防御机制


    维护者评估

    - 状态：范围已收窄

    - 标准化严重等级：中危

    - 评估说明：已发布版本中工作空间的 apply_patch 删除和目录创建操作仍使用"先检查后执行"模式，但草案夸大了漏洞范围，将更广泛的编辑路径捆绑其中；保持开放状态，但将范围收窄至实际的沙箱工作空间变更边界。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：32a4a47d602e0618f87b3e59f94d8c142767f860 — 2026-03-30T16:49:49+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rm5c-4rmf-vvhw
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rm5c-4rmf-vvhw
