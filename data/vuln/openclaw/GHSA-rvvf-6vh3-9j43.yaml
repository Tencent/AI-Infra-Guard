info:
  name: OpenClaw
  cve: GHSA-rvvf-6vh3-9j43
  summary: OpenClaw Discord 斜杠命令绕过群组私信（Group DM）信道白名单限制
  details: >-
    漏洞概述

    Discord 斜杠命令（Slash Commands）绕过群组私信（Group DM）信道白名单限制


    维护者评估

    - 状态：范围已收窄

    - 标准化严重等级：低危

    - 评估说明：v2026.3.28 的原生 Discord 斜杠命令和自动补全路径仍跳过了群组私信白名单校验，但影响范围有限——仅限于已授权的 Discord 用户绕过信道限制，而非跨越更强的信任边界。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交：8fdb19676ab44cf85d47ee13c578195f2e527591 — 2026-03-30T11:17:36-06:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rvvf-6vh3-9j43
rule: version <= "2026.3.28"
references:
