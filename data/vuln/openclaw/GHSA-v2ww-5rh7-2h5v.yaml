info:
  name: OpenClaw
  cve: GHSA-v2ww-5rh7-2h5v
  summary: OpenClaw Linux 和 macOS exec 白名单跳过了已配置的参数模式检查
  details: >-
    摘要


    OpenClaw 的 exec 白名单支持可选的 argPattern 条目，用于限制白名单可执行文件所接受的参数。在受影响版本中，
    Linux 和 macOS 上的 Gateway 跳过了 argPattern 检查，仅将匹配的可执行文件路径视为满足白名单条件的充分条件。


    这意味着操作员配置的白名单条目看似只允许特定的参数形式（argv 形状），但当 tools.exec.security 设置为 allowlist 时，
    OpenClaw 实际上会允许同一可执行文件使用其他参数，而不会触发审批提示。


    此问题仅影响已配置的 argPattern 值的直接执行策略。OpenClaw 的 exec 审批机制属于尽力而为的安全防护，
    并不试图对每个解释器、加载器、包脚本、Shell 功能或命令可能调用的传递文件进行语义建模。


    受影响配置


    以下部署场景受到影响，需同时满足所有条件：


    - Gateway 运行于 Linux 或 macOS 系统

    - exec 配置中 tools.exec.security 设置为 "allowlist"

    - 至少一条 exec 白名单条目使用了 argPattern

    - 白名单中的可执行文件接受具有安全意义的参数或标志


    仅使用路径匹配的白名单条目不受此问题额外影响，因为这类条目本身就允许已匹配可执行文件使用任意参数。
    Windows 不受此特定漏洞影响，因为相关代码路径在 Windows 上已正确应用了 argPattern 检查。


    影响


    若不受信任或低信任级别的发送方能够影响启用了工具的 Agent 调用 exec，攻击者可能对操作员原本打算通过 argPattern
    限制的可执行文件运行未经允许的参数。根据可执行文件的不同，这些参数可能导致主机端的文件访问、网络访问或命令执行，
    而这些操作本应需要审批提示才能执行。


    实际影响取决于操作员的白名单配置和通道暴露情况。高风险白名单可执行文件的示例包括具有解释器、加载器、子进程、
    网络或插件标志的工具等。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:L
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。升级至 openclaw@2026.5.12 或更高版本。升级前，使用 exec 白名单模式的操作员应检查
    将可执行文件路径与 argPattern 组合使用的条目，尤其是涉及解释器类或具备子进程调用能力的工具。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v2ww-5rh7-2h5v
rule: version < "2026.5.12"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v2ww-5rh7-2h5v
