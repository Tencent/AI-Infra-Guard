info:
  name: openclaw
  cve: GHSA-v3j7-34xh-6g3w
  summary: OpenClaw 回环 CDP 探测可将网关令牌泄露给本地监听者
  details: >-
    概述

    本地进程可从回环上的 Chrome CDP 探测流量中捕获 OpenClaw 网关认证令牌。


    详情

    受影响版本为回环 CDP URL 注入 x-openclaw-relay-token，CDP 可达性探测将该头发送到 /json/version。

    如果攻击者控制了被探测的回环端口，他们可以读取该令牌并将其作为网关 bearer 认证重用。


    相关代码路径（修复前）：

    - src/browser/extension-relay.ts (getChromeExtensionRelayAuthHeaders)

    - src/browser/cdp.helpers.ts (getHeadersWithAuth)

    - src/browser/chrome.ts (fetchChromeVersion)


    受影响的包/版本

    - 包：openclaw (npm)

    - 分类时最新发布版本：2026.2.21-2

    - 受影响：<= 2026.2.21-2

    - 修复：>= 2026.2.22


    部署模型适用性

    这不改变 OpenClaw 记录的标准单所有者安装的安全模型（你拥有机器/VPS 并信任该 OS 账户边界下的本地进程）。

    风险存在于非标准的共享用户/共享主机安装中，不受信任的本地用户/进程可以竞争/绑定回环中继端口。


    影响

    - 本地凭据泄露。

    - 后续影响取决于本地部署和已启用的网关能力。
  cvss: CVSS:3.1/AV:L/AC:H/PR:N/UI:N/S:U/C:H/I:L/A:N
  severity: MEDIUM
  security_advise: 升级 openclaw 到 >= 2026.2.22 或更高版本。提交 - afa22acc4a09fdf32be8a167ae216bee85c30dad
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v3j7-34xh-6g3w
rule: version <= "2026.2.21-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v3j7-34xh-6g3w
