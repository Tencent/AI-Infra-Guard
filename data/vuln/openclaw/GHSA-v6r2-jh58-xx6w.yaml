info:
  name: OpenClaw
  cve: GHSA-v6r2-jh58-xx6w
  summary: >-
    OpenClaw 插件市场运行时扩展元数据可能指向未经扫描的载荷
  details: >-
    摘要


    插件市场运行时扩展元数据可能指向未经扫描的载荷。在受影响版本中，由可信操作员选择安装的软件包，
    其运行时加载可能被重定向至未按预期进行安全扫描的隐藏包内容。


    本安全公告的影响范围限定于上述特定功能和配置。它不改变 OpenClaw 的可信操作员模型：经过身份验证的
    Gateway 操作员、已安装的插件以及预期的本地执行面，在未跨越独立的策略、审批、白名单、沙箱或认证边界的情况下，
    仍被视为可信实体。


    影响


    当受影响功能被启用且可访问时，攻击者可能加载经过审查的包入口点之外的插件代码。实际影响取决于操作员的配置，
    以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    在修复完成前，仅安装受信任的插件，并保持插件白名单的明确配置。作为常规安全加固措施，应保持通道和工具白名单的严格限制，
    避免在相互不受信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.18 或更高版本。在修复完成前，仅安装受信任的插件，并保持插件白名单的明确配置。
    作为常规安全加固措施，应保持通道和工具白名单的严格限制，避免在相互不受信任的用户之间共享同一 Gateway，
    并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v6r2-jh58-xx6w
rule: version < "2026.5.18"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v6r2-jh58-xx6w
