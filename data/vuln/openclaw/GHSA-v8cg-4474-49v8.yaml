info:
  name: openclaw
  cve: GHSA-v8cg-4474-49v8
  summary: OpenClaw Slack 系统事件在成员和消息子类型处理器中绕过发送者授权
  details: >-
    概述

    Slack member_* 和消息子类型系统事件（message_changed、message_deleted、thread_broadcast）在入队系统事件之前未一致地执行发送者授权。


    受影响的包/版本

    - 包：openclaw (npm)

    - 最新发布版本：2026.2.25

    - 受影响范围：<= 2026.2.25

    - 计划修复版本：2026.2.26（为发布就绪预设）


    技术详情

    src/slack/monitor/events/members.ts 和 src/slack/monitor/events/messages.ts 中的 Slack 系统事件处理器在频道检查后入队事件时未经过共享发送者授权。依赖 Slack DM 白名单（dmPolicy / allowFrom）或每频道用户白名单的部署可能收到来自非白名单发送者的未授权系统事件入站。


    修复将这些处理器路由通过 authorizeAndResolveSlackSystemEventContext(...)，并在无法解析消息子类型发送者身份时执行关闭失败。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:N
  severity: MEDIUM
  security_advise: 升级 openclaw 到 >= 2026.2.26 或更高版本。提交 - 3d30ba18a2aba1e1b302e77ff33145c3b06c01c8
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cg-4474-49v8
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cg-4474-49v8
