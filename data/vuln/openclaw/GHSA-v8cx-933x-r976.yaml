info:
  name: OpenClaw
  cve: GHSA-v8cx-933x-r976
  summary: OpenClaw 伪造的包根目录可能影响 memory-core 制品的加载
  details: >-
    摘要


    伪造的包根目录可能影响 memory-core 制品的加载。在受影响版本中，受工作区状态影响的本地包根目录解析路径，
    可能选择非预期的包根目录，而非正确的内置制品根目录。


    本安全公告的影响范围限定于上述特定功能和配置。它不改变 OpenClaw 的可信操作员模型：经过身份验证的
    Gateway 操作员、已安装的插件以及预期的本地执行面，在未跨越独立的策略、审批、白名单、沙箱或认证边界的情况下，
    仍被视为可信实体。


    影响


    当受影响功能被启用且可访问时，memory-core 制品可能从非预期的本地位置加载。实际影响取决于操作员的配置，
    以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.25。


    缓解措施


    在修复完成前，在受信任的工作区中运行 memory-core 相关流程。作为常规安全加固措施，应保持通道和工具白名单的严格限制，
    避免在相互不受信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.25 或更高版本。在修复完成前，在受信任的工作区中运行 memory-core 相关流程。
    作为常规安全加固措施，应保持通道和工具白名单的严格限制，避免在相互不受信任的用户之间共享同一 Gateway，
    并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cx-933x-r976
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cx-933x-r976
