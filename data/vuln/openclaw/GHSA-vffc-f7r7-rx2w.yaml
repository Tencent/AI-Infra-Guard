info:
  name: OpenClaw
  cve: GHSA-vffc-f7r7-rx2w
  summary: OpenClaw systemd 单元生成中换行符的不当中和导致本地命令执行（Linux）
  details: >-
    概述

    OpenClaw 的 Linux systemd 单元生成路径中存在命令注入漏洞。

    在渲染 Environment= 条目时，攻击者控制的值未被拒绝 CR/LF，且 systemdEscapeArg() 使用了不正确的空白字符匹配正则表达式。这允许换行注入突破 Environment= 行并注入独立的 systemd 指令（例如 ExecStartPre=）。在服务重启时，注入的命令被执行，导致在网关服务用户下的本地任意命令执行（本地 RCE）。


    ---


    详情

    问题位于 src/daemon/systemd-unit.ts：


    - renderEnvLines(...) 构建：

    - Environment=${systemdEscapeArg(${key}=${value})}

    - 在写入单元行之前未对环境键/值执行 CR/LF 验证。

    - systemdEscapeArg(...) 使用：

    - /[\\s"\\\\]/

    - 在此正则表达式中，\\s 被解释为字面的反斜杠 + s，而非空白字符类。

    因此空白字符检测/引用行为不正确。

    由于 systemd 逐行解析单元文件，环境值中的换行可注入额外的指令行。示例渲染输出：


    ``ini

    Environment=INJECT=ok

    ExecStartPre=/bin/touch /tmp/oc15789_rce

    `


    在重启时，systemd 执行 ExecStartPre，实现命令执行。


    利用链涉及的相关代码路径/组件：

    - src/daemon/systemd-unit.ts

    - src/commands/daemon-install-helpers.ts

    - src/config/env-vars.ts

    - src/config/zod-schema.ts


    触发条件：

    1. 攻击者可影响 config.env.vars（直接或间接）。

    2. 安装/重新安装路径被调用以写入/更新单元。

    3. 服务重启发生（systemctl --user restart ...）。


    ---


    概念验证

    环境：启用 systemd 用户服务的 Linux 主机。


    1. 在 OpenClaw 配置（config.env.vars）中配置恶意环境值，包含换行和注入的指令：

    - 键：INJECT

    - 值：

    `text

    ok

    ExecStartPre=/bin/touch /tmp/oc15789_rce

    `


    2. 安装/重新安装网关服务（固定端口 ...
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 到 >= 2026.2.21 或更高版本。提交 - 61f646c41fb43cd87ed48f9125b4718a30d38e84
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vffc-f7r7-rx2w
rule: version <= "2026.2.19-2"
references:
