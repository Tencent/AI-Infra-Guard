info:
  name: openclaw
  cve: GHSA-vmqr-rc7x-3446
  summary: OpenClaw 非默认 safeBins sort 配置可绕过预期的允许列表审批约束
  details: >-
    当 sort 被显式添加到 tools.exec.safeBins（非默认配置）时，--compress-program 选项可以调用外部辅助程序，
    从而在允许列表模式下绕过预期的安全二进制文件审批约束。


    受影响的包/版本


    - 包：openclaw (npm)

    - 漏洞版本：<=2026.2.21-2

    - 分类时检查的最新 npm 发布版本：2026.2.21-2（截至 2026 年 2 月 22 日）

    - 计划下一版本修复：2026.2.22
  cvss: CVSS:3.1/AV:L/AC:H/PR:H/UI:N/S:U/C:H/I:H/A:H
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >=2026.2.22 或更高版本。提交记录 - 57fbbaebca4d34d17549accf6092ae26eb7b605c
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vmqr-rc7x-3446
rule: version <= "2026.2.21-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vmqr-rc7x-3446
