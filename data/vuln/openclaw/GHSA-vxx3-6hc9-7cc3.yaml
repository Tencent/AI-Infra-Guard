info:
  name: OpenClaw
  cve: GHSA-vxx3-6hc9-7cc3
  summary: OpenClaw 组合式 POSIX Shell 选项可能干扰 exec 重验证逻辑
  details: >-
    摘要


    组合式 POSIX Shell 选项可能干扰 exec 重验证逻辑。在受影响版本中，使用组合式 Shell 标志的命令请求，
    可能在审批时和执行时对 Shell 选项产生不同的解析结果。


    本安全公告的影响范围限定于上述特定功能和配置。它不改变 OpenClaw 的可信操作员模型：经过身份验证的
    Gateway 操作员、已安装的插件以及预期的本地执行面，在未跨越独立的策略、审批、白名单、沙箱或认证边界的情况下，
    仍被视为可信实体。


    影响


    当受影响功能被启用且可访问时，攻击者可能绕过预期的白名单决策，直接执行内联 Shell 内容。实际影响取决于操作员的配置，
    以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在修复完成前，避免在白名单命令中使用组合式 Shell 选项形式。作为常规安全加固措施，应保持通道和工具白名单的严格限制，
    避免在相互不受信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。在修复完成前，避免在白名单命令中使用组合式 Shell 选项形式。
    作为常规安全加固措施，应保持通道和工具白名单的严格限制，避免在相互不受信任的用户之间共享同一 Gateway，
    并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vxx3-6hc9-7cc3
rule: version <= "2026.5.7"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vxx3-6hc9-7cc3
