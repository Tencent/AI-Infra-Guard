info:
  name: OpenClaw
  cve: GHSA-w4v6-g3wm-w36c
  summary: OpenClaw QQBot 管理命令可能绕过仅限私信及 allowFrom 策略
  details: >-
    摘要


    QQBot 管理命令可能绕过仅限私信（DM-only）及 allowFrom 策略。在受影响版本中，能够触发已导出命令的 QQBot
    发送方，可以在未经 QQBot 专属的仅限私信检查和 allowFrom 检查的情况下，路由执行管理命令。


    本安全公告的影响范围限定于上述特定功能和配置。它不改变 OpenClaw 的可信操作员模型：经过身份验证的
    Gateway 操作员、已安装的插件以及预期的本地执行面，在未跨越独立的策略、审批、白名单、沙箱或认证边界的情况下，
    仍被视为可信实体。


    影响


    当受影响功能被启用且可访问时，原本应被策略拦截的发送方或上下文，可能触发 QQBot 管理行为。实际影响取决于操作员的配置，
    以及低信任级别的输入是否能够到达该路径。


    已修复版本


    首个稳定修复版本为 2026.4.29。


    缓解措施


    在修复完成前，禁用已导出的 QQBot 管理命令，或限制 QQBot 访问权限。作为常规安全加固措施，应保持通道和工具白名单的严格限制，
    避免在相互不受信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.4.29 或更高版本。在修复完成前，禁用已导出的 QQBot 管理命令，或限制 QQBot 访问权限。
    作为常规安全加固措施，应保持通道和工具白名单的严格限制，避免在相互不受信任的用户之间共享同一 Gateway，
    并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-w4v6-g3wm-w36c
rule: version < "2026.4.29"
