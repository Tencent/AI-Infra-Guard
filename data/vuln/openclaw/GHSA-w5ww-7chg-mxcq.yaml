info:
  name: OpenClaw
  cve: GHSA-w5ww-7chg-mxcq
  summary: OpenClaw Telegram 交互式回调可绕过 commands.allowFrom 配置
  details: >-
    摘要


    Telegram 交互式回调可绕过 commands.allowFrom 配置。在受影响版本中，能够触发受影响回调的 Telegram
    用户，可在 commands.allowFrom 策略生效之前将该回调标记为已授权发送方。


    本安全公告的影响范围限定于所述功能及其配置。它不改变 OpenClaw 的受信任运营者模型：经过身份验证的
    Gateway 运营者、已安装的插件以及有意开放的本地执行接口，除非额外的策略、审批、白名单、沙箱或鉴权边界被突破，否则仍属可信范围。


    影响


    当受影响功能启用且可被访问时，此漏洞可能触发位于已配置 Telegram 发送方白名单之外的命令行为。实际影响程度取决于运营者的配置，以及较低可信度的输入是否能够到达该代码路径。


    已修复版本


    首个稳定修复版本为 2026.5.6。


    缓解措施


    在完成修复升级之前，将 Telegram 命令回调限制为受信任的聊天会话。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.6 或更高版本。在完成修复升级之前，将 Telegram 命令回调限制为受信任的聊天会话。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-w5ww-7chg-mxcq
rule: version <= "2026.5.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-w5ww-7chg-mxcq
