info:
  name: OpenClaw
  cve: GHSA-w85g-3h6x-4xh2
  summary: OpenClaw 图像像素上限防护在 sips 处理时可能失效并触发解压炸弹拒绝服务攻击
  details: >-
    漏洞摘要

    图像像素上限防护在 sips 处理时可能失效并触发解压炸弹拒绝服务攻击


    当前维护者研判

    - 状态：开放

    - 标准化严重等级：中危

    - 研判说明：已发布的 v2026.3.28 版本中，图像处理逻辑在处理超大像素数量时可能出现防护失效，进而引发解压炸弹（Decompression Bomb）拒绝服务攻击，属于可用性影响问题，中危评级合理。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 0ed4f8a72bb140045962e97ab01c94c076b758a4 — 2026-03-31T22:52:55+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-w85g-3h6x-4xh2
