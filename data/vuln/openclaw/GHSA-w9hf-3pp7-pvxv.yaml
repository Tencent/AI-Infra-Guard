info:
  name: OpenClaw
  cve: GHSA-w9hf-3pp7-pvxv
  summary: OpenClaw 导出的会话 HTML 文件可能保留不安全的 Markdown 链接
  details: >-
    摘要


    导出的会话 HTML 文件可能保留不安全的 Markdown 链接。在受影响版本中，渲染至导出会话的内容可能在生成的
    HTML 中保留 javascript: 或 data: 形式的不安全链接。


    本安全公告的影响范围限定于所述功能及其配置。它不改变 OpenClaw 的受信任运营者模型：经过身份验证的
    Gateway 运营者、已安装的插件以及有意开放的本地执行接口，除非额外的策略、审批、白名单、沙箱或鉴权边界被突破，否则仍属可信范围。


    影响


    当受影响功能启用且可被访问时，若受信任的运营者在浏览器中打开导出文件并激活该链接，可能导致浏览器端脚本执行。实际影响程度取决于运营者的配置，以及较低可信度的输入是否能够到达该代码路径。


    已修复版本


    首个稳定修复版本为 2026.5.12。


    缓解措施


    在完成修复升级之前，不要在高权限浏览器配置文件中打开来自不可信内容的导出会话 HTML 文件。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.12 或更高版本。在完成修复升级之前，不要在高权限浏览器配置文件中打开来自不可信内容的导出会话 HTML
    文件。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-w9hf-3pp7-pvxv
rule: version <= "2026.5.7"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-w9hf-3pp7-pvxv
