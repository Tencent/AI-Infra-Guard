info:
  name: OpenClaw
  cve: GHSA-wc84-j36w-pw4x
  summary: OpenClaw 工作区 .env 中的 STATE_DIRECTORY 可能影响捆绑运行时依赖项的根路径
  details: >-
    摘要


    工作区 .env 中的 STATE_DIRECTORY 可能影响捆绑运行时依赖项的根路径。在受影响版本中，受信任运营者打开的代码仓库中若存在工作区
    .env 文件，其中的 STATE_DIRECTORY 配置可能在运行时依赖项根路径解析之前生效。


    本安全公告的影响范围限定于所述功能及其配置。它不改变 OpenClaw 的受信任运营者模型：经过身份验证的
    Gateway 运营者、已安装的插件以及有意开放的本地执行接口，除非额外的策略、审批、白名单、沙箱或鉴权边界被突破，否则仍属可信范围。


    影响


    当受影响功能启用且可被访问时，此漏洞可能导致从非预期的本地状态路径加载捆绑运行时依赖项。实际影响程度取决于运营者的配置，以及较低可信度的输入是否能够到达该代码路径。


    已修复版本


    首个稳定修复版本为 2026.5.2。


    缓解措施


    在完成修复升级之前，避免在运行时依赖项安装前打开不可信的工作区环境变量文件。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.2 或更高版本。在完成修复升级之前，避免在运行时依赖项安装前打开不可信的工作区环境变量文件。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-wc84-j36w-pw4x
rule: version < "2026.5.2"
