info:
  name: OpenClaw
  cve: GHSA-wpc6-37g7-8q4w
  summary: OpenClaw Shell 初始化文件选项可满足 exec 白名单脚本匹配条件
  details: >-
    摘要


    在 OpenClaw 2026.3.31 之前，exec 白名单匹配逻辑可能将 Shell 初始化文件包装器调用误认为是已审批脚本本身正在执行。
    因此，--rcfile、--init-file、--startup-file 等 Shell 选项可从已匹配脚本路径继承白名单信任，
    即便 Shell 实际上优先加载了攻击者指定的初始化内容。


    影响


    该漏洞仅在启用了 exec 白名单或 allow-always 行为，且攻击者能够构造使用初始化文件选项的 Shell 包装器命令形态时才可被利用。
    其结果是白名单的局部绕过，而非来自不可信边界的通用任意命令执行。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：< 2026.3.31

    - 已修复版本：>= 2026.3.31

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - 0c8375424620e12777ef24c162eedc7e9fcfd7e3 — 拒绝通过 Shell 初始化文件方式匹配脚本
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-wpc6-37g7-8q4w
rule: version < "2026.3.31"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-wpc6-37g7-8q4w
