info:
  name: OpenClaw
  cve: GHSA-x2m8-53h4-6hch
  summary: OpenClaw Discord 语音接入授权可通过频道、名称及过期角色校验缺陷实施绕过
  details: >-
    漏洞摘要

    Discord 语音接入授权可通过频道、名称及过期角色校验缺陷实施绕过


    维护者评估

    - 状态：范围受限

    - 标准化严重等级：中危

    - 评估：该漏洞在已发布的 v2026.3.28 Discord 语音接入模块中真实存在，但影响范围为频道/成员白名单绕过，而非更大范围的严重身份验证失效，且主线修复补丁尚未发布。


    受影响包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - dba96e7507e0900f120e5e28e57755d69bf78759 — 2026-03-31T21:29:13+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-x2m8-53h4-6hch
rule: version <= "2026.3.28"
