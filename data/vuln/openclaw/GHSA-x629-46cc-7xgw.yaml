info:
  name: OpenClaw
  cve: GHSA-x629-46cc-7xgw
  summary: OpenClaw Active Memory 写入权限范围可能篡改全局配置
  details: >-
    摘要


    Active Memory 写入权限范围可能篡改全局配置。在受影响版本中，拥有受影响命令 operator.write 访问权限的
    Gateway 调用方，无需 operator.admin 权限即可修改全局配置。


    本安全公告的影响范围限定于所述功能及其配置。它不改变 OpenClaw 的受信任运营者模型：经过身份验证的
    Gateway 运营者、已安装的插件以及有意开放的本地执行接口，除非额外的策略、审批、白名单、沙箱或鉴权边界被突破，否则仍属可信范围。


    影响


    当受影响功能启用且可被访问时，此漏洞可能导致超出预期写入权限范围的配置变更被应用。实际影响程度取决于运营者的配置，以及较低可信度的输入是否能够到达该代码路径。


    已修复版本


    首个稳定修复版本为 2026.5.6。


    缓解措施


    在完成修复升级之前，将 Active Memory 的写入访问权限限制为受信任的运营者。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一 Gateway，并在不需要时禁用受影响功能。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    将 openclaw 升级至 2026.5.6 或更高版本。在完成修复升级之前，将 Active Memory 的写入访问权限限制为受信任的运营者。作为通用安全加固措施，保持信道与工具白名单的最小化，避免在互不信任的用户之间共享同一
    Gateway，并在不需要时禁用受影响功能。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-x629-46cc-7xgw
rule: version <= "2026.5.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-x629-46cc-7xgw
