info:
  name: OpenClaw
  cve: GHSA-xj9w-5r6q-x6v4
  summary: OpenClaw 设备配对节点跳过节点作用域访问控制门，导致宿主机远程代码执行（RCE）
  details: >-
    漏洞摘要

    设备配对节点跳过节点作用域访问控制门，导致宿主机远程代码执行（RCE）


    维护者评估

    - 状态：未修复

    - 标准化严重等级：高危

    - 评估：该漏洞在已发布的 v2026.3.28 中真实存在，原因是仅完成设备配对（而未完成节点配对）的节点即可在未授权情况下暴露节点命令执行能力，考虑到配对与初始化前提条件，高危等级定性适当。


    受影响包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.3.31 或更高版本。相关提交 - 3886b65ef21d02808c1a106fa1f9f69e22f71c32 — 2026-03-30T17:29:28+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xj9w-5r6q-x6v4
rule: version <= "2026.3.28"
references:
