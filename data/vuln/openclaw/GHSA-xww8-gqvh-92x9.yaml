info:
  name: OpenClaw
  cve: GHSA-xww8-gqvh-92x9
  summary: OpenClaw exec 审批界面的命令截断可能隐藏待审批的完整命令
  details: >-
    摘要


    OpenClaw exec 审批可能在审批界面中仅显示截断后的命令，而保留完整原始命令用于实际执行。对于超长命令，审批者可能看到并批准一个表面无害的命令前缀，而隐藏的命令后缀仍属于审批通过后将被执行的命令的一部分。


    此问题影响超长 exec 命令的审批显示与绑定机制。它不会使未经身份验证的用户获得 exec 访问权限，也不改变
    OpenClaw 的本地优先信任模型。


    受影响配置


    此问题影响以下部署场景：exec 审批已启用，且经过身份验证的调用方能够创建命令长度足以在审批视图中被截断的待处理主机 exec 请求。


    影响


    审批者可能基于不完整的命令文本作出审批决策。若隐藏的命令后缀包含额外的 Shell 操作，这些操作将在审批通过后被执行。


    实际影响程度取决于谁能发起 exec 审批请求以及谁被允许执行审批。此问题属于审批完整性缺陷：审批界面未能如实呈现将被执行的完整命令。


    已修复版本


    首个稳定修复版本为 2026.5.18。


    缓解措施


    升级至 openclaw@2026.5.18 或更高版本。在升级之前，避免审批异常超长的 exec 命令，并将审批能力限制为受信任的运营者。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: >-
    将 openclaw 升级至 2026.5.18 或更高版本。在升级之前，避免审批异常超长的 exec 命令，并将审批能力限制为受信任的运营者。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xww8-gqvh-92x9
rule: version < "2026.5.18"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-xww8-gqvh-92x9
