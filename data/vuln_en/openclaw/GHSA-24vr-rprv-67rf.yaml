info:
  name: OpenClaw
  cve: GHSA-24vr-rprv-67rf
  summary: >-
    OpenClaw Workspace .env npm_execpath could influence bundled runtime dependency install
  details: >-
    Summary


    Workspace .env npm_execpath could influence bundled runtime dependency install. In affected versions, a workspace .env
    in a repository opened by a trusted operator could override the package-manager executable path used by the install helper.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run an unintended local package-manager executable during
    dependency setup. Practical impact depends on the operator's configuration and whether lower-trust input can reach that
    path.


    Patched Versions


    The first stable patched version is 2026.4.29.


    Mitigations


    install bundled runtime dependencies from trusted workspaces until patched. As general hardening, keep channel and tool
    allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it
    is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.29 or later. install bundled runtime dependencies from trusted workspaces until patched. As
    general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-24vr-rprv-67rf
rule: version < "2026.4.29"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-24vr-rprv-67rf
