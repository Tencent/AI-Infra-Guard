info:
  name: OpenClaw
  cve: GHSA-275c-xpvc-jgfw
  summary: OpenClaw Slack and Zalo webhook secrets could remain active after secrets.reload
  details: >-
    Summary


    Slack and Zalo webhook secrets could remain active after secrets.reload. In affected versions, a caller with an old webhook
    secret during the stale-secret window could keep accepting the previous secret after secrets.reload.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could deliver webhook events briefly after the operator expected
    revocation. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.4.22.


    Mitigations


    restart the affected channel runtime after rotating webhook secrets until patched. As general hardening, keep channel
    and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature
    when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.22 or later. restart the affected channel runtime after rotating webhook secrets until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-275c-xpvc-jgfw
rule: version <= "2026.4.21"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-275c-xpvc-jgfw
