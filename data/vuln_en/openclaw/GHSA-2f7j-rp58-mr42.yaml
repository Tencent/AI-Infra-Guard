info:
  name: OpenClaw
  cve: GHSA-2f7j-rp58-mr42
  summary: OpenClaw Gateway hello snapshots exposed host config and state paths to non-admin clients
  details: >-
    Summary


    Before OpenClaw 2026.4.2, the Gateway connect success snapshot exposed local configPath and stateDir metadata to non-admin
    clients. Low-privilege authenticated clients could learn host filesystem layout and deployment details that were not needed
    for their role.


    Impact


    A non-admin client could recover host-specific filesystem paths and related deployment metadata, aiding host fingerprinting
    and chained attacks. This was an information-disclosure issue, not a direct authorization bypass.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.1

    - Patched versions: >= 2026.4.2

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.4.2 or later. Commit(s) - 676b748056b5efca6f1255708e9dd9469edf5e2e — limit
    connect snapshot metadata to admin-scoped clients
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2f7j-rp58-mr42
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-2f7j-rp58-mr42
