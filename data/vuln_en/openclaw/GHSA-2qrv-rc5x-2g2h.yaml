info:
  name: OpenClaw
  cve: GHSA-2qrv-rc5x-2g2h
  summary: >-
    OpenClaw Untrusted workspace channel shadows could execute during built-in channel setup
  details: >-
    Summary


    Before OpenClaw 2026.4.2, built-in channel setup and login could resolve an untrusted workspace channel shadow before
    the plugin was explicitly trusted. A malicious workspace plugin that claimed a bundled channel id could execute during
    channel setup even while still disabled.


    Impact


    A cloned workspace could turn channel setup for a built-in channel into unintended in-process code execution from an untrusted
    workspace plugin. This bypassed the intended workspace-plugin trust boundary during setup and login.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.1

    - Patched versions: >= 2026.4.2

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to >= 2026.4.2 or later. Commit(s) - 53c29df2a9eb242a70d0ff29f3d1e67c8d6801f0 — ignore untrusted workspace
    channel shadows during setup resolution
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2qrv-rc5x-2g2h
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-2qrv-rc5x-2g2h
