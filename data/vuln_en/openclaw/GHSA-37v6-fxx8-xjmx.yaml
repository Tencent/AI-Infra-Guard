info:
  name: OpenClaw
  cve: GHSA-37v6-fxx8-xjmx
  summary: OpenClaw Telnyx Webhook Replay Detection Bypass via Base64 Signature Re-encoding
  details: >-
    Summary

    Telnyx Webhook Replay Detection Bypass via Base64 Signature Re-encoding


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: low

    - Assessment: Shipped v2026.3.28 replay hashing treated equivalent Telnyx Base64/Base64URL signatures as distinct requests,
    but signature verification still held, so lower to low.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - ad77666054651c1fd77b1dc60fd6a8db6600a29a — 2026-03-30T20:01:43+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-37v6-fxx8-xjmx
rule: version <= "2026.3.28"
