info:
  name: OpenClaw
  cve: GHSA-39mp-545q-w789
  summary: OpenClaw Non-owner command-authorized sender can change the owner-only `/send` session delivery policy
  details: "> Fixed in OpenClaw 2026.3.24, the current shipping release.\n\nTitle  \r\nNon-owner command-authorized sender\
    \ can change the owner-only /send session delivery policy\r\n\r\nCWE  \r\nCWE-285 Improper Authorization\r\n\r\nCVSS v3.1\
    \  \r\nCVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:L  \r\nBase score: 5.4 (Medium)\r\n\r\nSeverity Assessment  \r\nMedium.\
    \ This is a real owner-only authorization bypass, but the demonstrated impact is limited to persistent mutation of the\
    \ current session’s delivery policy rather than direct code execution, sandbox escape, or cross-host compromise.\r\n\r\
    \nImpact  \r\nA non-owner sender who is allowed to run commands can invoke /send on|off|inherit and persistently change\
    \ the current session’s sendPolicy, even though OpenClaw documents /send as owner-only.\r\n\r\nThat lets a lower-trust\
    \ participant:\r\n- disable reply delivery for the current session (/send off), suppressing future replies in that chat;\r\
    \n- re-enable reply delivery (/send on) after the owner intentionally disabled it;\r\n- remove the session override (/send\
    \ inherit).\r\n\r\nAffected Component  \r\nVerified against the latest published GitHub release tag v2026.3.23 (ccfeecb6887cd97937e33a71877ad512741e82b2),\
    \ published 2026-03-23T23:15:50Z.\r\n\r\nExact vulnerable path on the shipped tag:\r\n- src/auto-reply/reply/commands-session.ts:212-239\r\
    \n  - handleSendPolicyCommand(...) checks only params.command.isAuthorizedSender.\r\n  - when true, it mutates params.sessionEntry.sendPolicy\
    \ and persists the session entry.\r\n\r\nAuthorization behavior that makes this reachable:\r\n- src/auto-reply/command-auth.ts:401-407\r\
    \n  - senderIsOwner is computed separately from general command authorization.\r\n- src/auto-reply/command-auth.ts:420-429\r\
    \n  - command authorization can succeed even when senderIsOwner === false.\r\n- src/auto-reply/command-auth.owner-default.test.ts:10-47\r\
    \n  - existing coverage confirms a sender can be command-authorized while not treated as owner.\r\n\r\nDocumented owner-only\
    \ contract:\r\n- docs/tools/slash-commands.md:112\r\n  - /send on|o..."
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:L
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.24 or later.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-39mp-545q-w789
rule: version <= "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-39mp-545q-w789
