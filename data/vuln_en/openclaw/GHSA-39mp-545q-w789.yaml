info:
  name: OpenClaw
  cve: GHSA-39mp-545q-w789
  summary: >-
    OpenClaw Non-owner command-authorized sender can change the owner-only `/send` session delivery policy
  details: "> Fixed in OpenClaw 2026.3.24, the current shipping release.\n\nTitle  \nNon-owner command-authorized sender can\
    \ change the owner-only /send session delivery policy\n\nCWE  \nCWE-285 Improper Authorization\n\nCVSS v3.1  \nCVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:L\
    \  \nBase score: 5.4 (Medium)\n\nSeverity Assessment  \nMedium. This is a real owner-only authorization bypass, but the\
    \ demonstrated impact is limited to persistent mutation of the current session’s delivery policy rather than direct code\
    \ execution, sandbox escape, or cross-host compromise.\n\nImpact  \nA non-owner sender who is allowed to run commands\
    \ can invoke /send on|off|inherit and persistently change the current session’s sendPolicy, even though OpenClaw documents\
    \ /send as owner-only.\n\nThat lets a lower-trust participant:\n- disable reply delivery for the current session (/send\
    \ off), suppressing future replies in that chat;\n- re-enable reply delivery (/send on) after the owner intentionally\
    \ disabled it;\n- remove the session override (/send inherit).\n\nAffected Component  \nVerified against the latest published\
    \ GitHub release tag v2026.3.23 (ccfeecb6887cd97937e33a71877ad512741e82b2), published 2026-03-23T23:15:50Z.\n\nExact vulnerable\
    \ path on the shipped tag:\n- src/auto-reply/reply/commands-session.ts:212-239\n  - handleSendPolicyCommand(...) checks\
    \ only params.command.isAuthorizedSender.\n  - when true, it mutates params.sessionEntry.sendPolicy and persists the session\
    \ entry.\n\nAuthorization behavior that makes this reachable:\n- src/auto-reply/command-auth.ts:401-407\n  - senderIsOwner\
    \ is computed separately from general command authorization.\n- src/auto-reply/command-auth.ts:420-429\n  - command authorization\
    \ can succeed even when senderIsOwner === false.\n- src/auto-reply/command-auth.owner-default.test.ts:10-47\n  - existing\
    \ coverage confirms a sender can be command-authorized while not treated as owner.\n\nDocumented owner-only contract:\n\
    - docs/tools/slash-commands.md:112\n  - /send on|off|inherit is documented as owner-only...."
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:L
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.24 or later.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-39mp-545q-w789
rule: version <= "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-39mp-545q-w789
