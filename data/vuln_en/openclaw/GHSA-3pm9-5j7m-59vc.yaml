info:
  name: OpenClaw
  cve: GHSA-3pm9-5j7m-59vc
  summary: OpenClaw Tlon Startup Migration Rehydrates Empty-Array Revocations From File Config
  details: >-
    Summary

    Tlon Startup Migration Rehydrates Empty-Array Revocations From File Config


    Current Maintainer Triage

    - Status: open

    - Normalized severity: low

    - Assessment: v2026.3.28 startup migration still treats empty-array settings as missing and can rehydrate revoked Tlon
    config from file state after restart.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - a4d72a83f01fedd35964c352e3473c7712a3511b — 2026-03-31T14:57:03+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3pm9-5j7m-59vc
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3pm9-5j7m-59vc
