info:
  name: OpenClaw
  cve: GHSA-3wqp-prf6-2m72
  summary: OpenClaw Feishu dynamic-agent bindings could miss configWrites enforcement
  details: >-
    Summary


    Feishu dynamic-agent bindings could miss configWrites enforcement. In affected versions, a Feishu sender using dynamic-agent
    binding behavior could create or update bindings without honoring the configured config-write control.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could change sender-agent binding state beyond the intended policy.
    Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.6.


    Mitigations


    disable sender-created Feishu dynamic-agent bindings until patched if not needed. As general hardening, keep channel and
    tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when
    it is not needed.
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:N/I:L/A:N
  severity: LOW
  security_advise: >-
    Upgrade openclaw to 2026.5.6 or later. disable sender-created Feishu dynamic-agent bindings until patched if not needed.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3wqp-prf6-2m72
rule: version <= "2026.5.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3wqp-prf6-2m72
