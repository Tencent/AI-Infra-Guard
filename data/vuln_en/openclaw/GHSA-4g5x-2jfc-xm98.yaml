info:
  name: OpenClaw
  cve: GHSA-4g5x-2jfc-xm98
  summary: OpenClaw Tlon media downloads can bypass core safety limits and exhaust disk
  details: >-
    Summary

    Tlon media downloads can bypass core safety limits and exhaust disk


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: low

    - Assessment: Shipped v2026.3.28 Tlon media downloads bypassed core size/count/cleanup limits, but this is availability-only
    resource exhaustion in a bundled plugin path, so low.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
