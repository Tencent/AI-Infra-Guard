info:
  name: OpenClaw
  cve: GHSA-4hmj-39m8-jwc7
  summary: OpenClaw ACP CLI approval prompt ANSI escape sequence injection
  details: >-
    Summary


    ACP CLI approval prompt ANSI escape sequence injection


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: >= 2026.2.13, <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    ACP tool titles could previously carry ANSI control sequences into approval prompts and permission logs, letting untrusted
    tool metadata spoof terminal output. Commit 464e2c10a5edceb380d815adb6ff56e1a4c50f60 sanitizes tool titles at the source
    and broadens ANSI stripping to full CSI sequences.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit 464e2c10a5edceb380d815adb6ff56e1a4c50f60.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.3.25 or later. Commit(s) - 464e2c10a5edceb380d815adb6ff56e1a4c50f60
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4hmj-39m8-jwc7
rule: version >= "2026.2.13" && version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4hmj-39m8-jwc7
