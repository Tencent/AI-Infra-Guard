info:
  name: OpenClaw
  cve: GHSA-4hpg-mp64-x7xq
  summary: >-
    OpenClaw Internal/webchat command auth could inherit ownerAllowFrom wildcard state
  details: >-
    Summary


    Internal/webchat command auth could inherit ownerAllowFrom wildcard state. In affected versions, a sender on an affected
    internal or webchat path could inherit wildcard ownerAllowFrom state across channel boundaries.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run owner-style command behavior that should have stayed
    channel-scoped. Practical impact depends on the operator's configuration and whether lower-trust input can reach that
    path.


    Patched Versions


    The first stable patched version is 2026.4.25.


    Mitigations


    keep owner command allowlists explicit per channel until patched. As general hardening, keep channel and tool allowlists
    narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.25 or later. keep owner command allowlists explicit per channel until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4hpg-mp64-x7xq
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4hpg-mp64-x7xq
