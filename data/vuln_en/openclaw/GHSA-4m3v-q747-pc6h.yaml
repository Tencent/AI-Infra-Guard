info:
  name: OpenClaw
  cve: GHSA-4m3v-q747-pc6h
  summary: OpenClaw Mattermost slash token revocation could lag until monitor refresh
  details: >-
    Summary


    Mattermost slash token revocation could lag until monitor refresh. In affected versions, a caller with an old Mattermost
    slash token during the refresh window could continue accepting the old token until the monitor refreshed.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could invoke slash command behavior briefly after token revocation.
    Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.4.24.


    Mitigations


    restart or refresh the Mattermost monitor after token rotation until patched. As general hardening, keep channel and tool
    allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it
    is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.24 or later. restart or refresh the Mattermost monitor after token rotation until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4m3v-q747-pc6h
rule: version <= "2026.4.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4m3v-q747-pc6h
