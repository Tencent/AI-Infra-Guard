info:
  name: OpenClaw
  cve: GHSA-4p4f-fc8q-84m3
  summary: OpenClaw iOS A2UI bridge trusted generic local-network pages for agent.request dispatch
  details: >-
    Summary


    Before OpenClaw 2026.4.2, the iOS A2UI bridge treated generic local-network pages as trusted bridge origins. A page loaded
    from a local-network or tailnet host could trigger agent.request dispatch without the stricter trusted-canvas origin check.


    Impact


    A loaded attacker-controlled page could inject unauthorized non-owner agent.request runs into the active iOS node session,
    polluting session state and consuming budget. The demonstrated impact did not include owner-only actions or arbitrary
    host execution.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.1

    - Patched versions: >= 2026.4.2

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.4.2 or later. Commit(s) - 49d08382a90f71dabe2877b3f6729ad85f808d57 — restrict
    A2UI action dispatch to trusted canvas URLs
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4p4f-fc8q-84m3
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4p4f-fc8q-84m3
