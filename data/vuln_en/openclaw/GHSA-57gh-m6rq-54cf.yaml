info:
  name: OpenClaw
  cve: GHSA-57gh-m6rq-54cf
  summary: OpenClaw Media Local Roots Self-Whitelisting in <code>appendLocalMediaParentRoots</code> Allows Model-Initiated
    Arbitrary Host File Read and Credential Exfiltration
  details: >-
    Summary

    Media Local Roots Self-Whitelisting in <code>appendLocalMediaParentRoots</code> Allows Model-Initiated Arbitrary Host
    File Read and Credential Exfiltration


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: medium

    - Assessment: v2026.3.28 still self-whitelists media parent dirs in src/media/local-roots.ts, but only after config already
    permits tool-fs root expansion, so the impact is narrower than the default-critical framing.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - 1ca4261d7e055d0be141ed79ebb1365d0fbc7364 — 2026-03-30T17:15:03+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-57gh-m6rq-54cf
rule: version <= "2026.3.28"
