info:
  name: OpenClaw
  cve: GHSA-5h2w-qmfp-ggp6
  summary: OpenClaw Gateway `operator.write` can reach admin-only persisted `verboseLevel` via `chat.send` `/verbose`
  details: >-
    Summary


    The chat.send path let authorized write-scoped callers persist /verbose session overrides even though the same stored
    session mutation is admin-only through sessions.patch.


    Impact


    A write-scoped gateway caller could persist verbose output for later runs and expose more reasoning or tool output than
    the operator intended.


    Affected Component


    src/auto-reply/reply/directive-handling.impl.ts, src/gateway/sessions-patch.ts


    Fixed Versions


    - Affected: <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit c603123528 (fix(gateway): require admin for persisted verbose defaults).
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit c603123528 (fix(gateway): require admin for
    persisted verbose defaults).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5h2w-qmfp-ggp6
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5h2w-qmfp-ggp6
