info:
  name: OpenClaw
  cve: GHSA-6c4r-g249-wv3c
  summary: >-
    OpenClaw Sandboxed session spawn could expose the real workspace path to child prompts
  details: >-
    Summary


    Sandboxed session spawn could expose the real workspace path to child prompts. In affected versions, a child session spawned
    from a sandboxed parent could forward the host workspace path into the child session prompt.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could reveal host workspace location or related memory context
    to the child model. Practical impact depends on the operator's configuration and whether lower-trust input can reach that
    path.


    Patched Versions


    The first stable patched version is 2026.4.26.


    Mitigations


    avoid spawning child sessions from sensitive sandboxed workspaces until patched. As general hardening, keep channel and
    tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when
    it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.26 or later. avoid spawning child sessions from sensitive sandboxed workspaces until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6c4r-g249-wv3c
rule: version <= "2026.4.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6c4r-g249-wv3c
