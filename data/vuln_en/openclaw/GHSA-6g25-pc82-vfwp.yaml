info:
  name: OpenClaw
  cve: GHSA-6g25-pc82-vfwp
  summary: OpenClaw macOS beta onboarding exposed PKCE verifier via OAuth state
  details: >-
    Summary


    The affected surface is the OpenClaw macOS app onboarding flow, and the macOS app is currently in beta.

    In that beta onboarding flow, Anthropic OAuth used the PKCE code_verifier value as OAuth state, exposing that secret in
    front-channel URL state.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.2.24 (latest published npm at triage time)

    - Affected surface: macOS app beta onboarding path (apps/macos)

    - Not affected: core CLI/gateway onboarding paths

    - Patched version : 2026.2.25


    Impact


    Scope is limited to the macOS beta onboarding OAuth path. Exploitation required obtaining both OAuth authorization artifacts
    and exposed state values during that flow.


    Remediation


    OpenClaw removed Anthropic OAuth sign-in from macOS onboarding and now supports setup-token-only Anthropic subscription
    auth in this path.
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.2.25 or later. Commit(s) - 8f3310000a8b0c11eced054c2cdb6fb27803511a
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6g25-pc82-vfwp
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6g25-pc82-vfwp
