  summary: OpenClaw Gateway operator.write Can Reach Admin-Class Telegram Config and Cron Persistence via send
  details: >-
    Summary

    Gateway operator.write Can Reach Admin-Class Telegram Config and Cron Persistence via send


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: medium

    - Assessment: Real shipped operator.write to admin-class Telegram config or cron persistence bug, but it is an authenticated
