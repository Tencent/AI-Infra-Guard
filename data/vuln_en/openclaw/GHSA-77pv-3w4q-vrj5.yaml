info:
  name: OpenClaw
  cve: GHSA-77pv-3w4q-vrj5
  summary: OpenClaw QQBot pre-dispatch slash commands could skip allowFrom checks
  details: >-
    Summary


    QQBot pre-dispatch slash commands could skip allowFrom checks. In affected versions, a QQBot sender able to invoke slash
    commands could dispatch the command before applying the configured allowFrom policy.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could trigger command handling from a sender that policy should
    have blocked. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.4.27.


    Mitigations


    restrict QQBot slash command exposure until patched. As general hardening, keep channel and tool allowlists narrow, avoid
    sharing one Gateway between mutually untrusted users, and disable the affected feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.27 or later. restrict QQBot slash command exposure until patched. As general hardening, keep
    channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-77pv-3w4q-vrj5
rule: version <= "2026.4.26"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-77pv-3w4q-vrj5
