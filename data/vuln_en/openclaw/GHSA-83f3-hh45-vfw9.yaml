info:
  name: OpenClaw
  cve: GHSA-83f3-hh45-vfw9
  summary: OpenClaw Android accepted cleartext remote gateway endpoints and sent stored credentials over ws://
  details: >-
    Summary


    Before OpenClaw 2026.4.2, Android accepted non-loopback cleartext ws:// gateway endpoints and would send stored gateway
    credentials over that connection. Discovery beacons or setup codes could therefore steer the client onto a cleartext remote
    endpoint.


    Impact


    A user who followed a forged discovery result or scanned a crafted setup code could disclose stored gateway credentials
    to an attacker-controlled endpoint in plaintext. This was a transport-security bug in the Android gateway client.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.1

    - Patched versions: >= 2026.4.2

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.4.2 or later. Commit(s) - a941a4fef9bc43b2973c92d0dcff5b8a426210c5 — require
    TLS for remote Android gateway endpoints
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-83f3-hh45-vfw9
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-83f3-hh45-vfw9
