info:
  name: OpenClaw
  cve: GHSA-83w9-h5wv-j9xm
  summary: OpenClaw Node pairing reconnection could confuse approval scope state
  details: >-
    Summary


    Node pairing reconnection could confuse approval scope state. In affected versions, a paired or reconnecting node session
    could mutate pairing state in a way that changed the approval scope decision.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could restore or present broader node authority than the operator
    intended. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.27.


    Mitigations


    revoke unexpected node pairings and re-pair only trusted nodes until patched. As general hardening, keep channel and tool
    allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it
    is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.27 or later. revoke unexpected node pairings and re-pair only trusted nodes until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-83w9-h5wv-j9xm
rule: version < "2026.5.27"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-83w9-h5wv-j9xm
