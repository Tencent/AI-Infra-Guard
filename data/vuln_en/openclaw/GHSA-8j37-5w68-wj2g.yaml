info:
  name: OpenClaw
  cve: GHSA-8j37-5w68-wj2g
  summary: OpenClaw BlueBubbles sender policy could match mutable conversation identifiers
  details: >-
    Summary


    BlueBubbles sender policy could match mutable conversation identifiers. In affected versions, a participant able to influence
    conversation-level identifiers could match an allowlist entry through conversation metadata rather than a stable sender
    identity.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could receive agent responses that should have been limited to
    a configured sender. Practical impact depends on the operator's configuration and whether lower-trust input can reach
    that path.


    Patched Versions


    The first stable patched version is 2026.5.7.


    Mitigations


    prefer stable sender identifiers and keep BlueBubbles groups restricted until patched. As general hardening, keep channel
    and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature
    when it is not needed.
  cvss: ''
  severity: LOW
  security_advise: >-
    Upgrade openclaw to 2026.5.7 or later. prefer stable sender identifiers and keep BlueBubbles groups restricted until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8j37-5w68-wj2g
rule: version <= "2026.5.6"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8j37-5w68-wj2g
