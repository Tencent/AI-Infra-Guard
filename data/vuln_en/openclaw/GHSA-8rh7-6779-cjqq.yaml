info:
  name: OpenClaw
  cve: GHSA-8rh7-6779-cjqq
  summary: OpenClaw CWD `.env` environment variable injection bypasses host-env policy and allows config takeover
  details: >-
    Summary


    OpenClaw loaded the current working directory .env before trusted state-dir configuration, allowing untrusted workspace
    state to inject host environment values.


    Impact


    A repository or workspace containing a malicious .env file could override runtime configuration and security-sensitive
    environment settings when OpenClaw started there.


    Affected Component


    src/infra/dotenv.ts, src/cli/dotenv.ts


    Fixed Versions


    - Affected: <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit 6a79324802 (Filter untrusted CWD .env entries before OpenClaw startup).
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
  severity: CRITICAL
  security_advise: Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit 6a79324802 (Filter untrusted CWD .env entries
    before OpenClaw startup).
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8rh7-6779-cjqq
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8rh7-6779-cjqq
