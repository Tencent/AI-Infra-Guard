info:
  name: OpenClaw
  cve: GHSA-8wg3-5mcm-fjq8
  summary: >-
    OpenClaw Workspace .env could override Homebrew executable selection for skill install flows
  details: >-
    Summary


    Workspace .env could override Homebrew executable selection for skill install flows. In affected versions, a workspace
    .env in a repository opened by a trusted operator could override the Homebrew executable used by the install helper.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run an unintended Homebrew-compatible executable during
    skill setup. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.27.


    Mitigations


    avoid running skill install flows from untrusted workspaces until patched. As general hardening, keep channel and tool
    allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it
    is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.27 or later. avoid running skill install flows from untrusted workspaces until patched. As
    general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8wg3-5mcm-fjq8
rule: version < "2026.5.27"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8wg3-5mcm-fjq8
