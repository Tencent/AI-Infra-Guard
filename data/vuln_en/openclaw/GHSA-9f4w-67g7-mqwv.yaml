info:
  name: OpenClaw
  cve: GHSA-9f4w-67g7-mqwv
  summary: OpenClaw Remote onboarding preserves attacker-discovered endpoint after trust decline, routing gateway credentials
    to it
  details: >-
    Summary

    Remote onboarding preserves attacker-discovered endpoint after trust decline, routing gateway credentials to it


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: medium

    - Assessment: Real shipped onboarding trust-decline bug because the declined discovered URL survived into the manual prompt,
    but operator acceptance of that prefill is still required, so medium.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - 2a75416634837c21ed05b8c3ed906eb7a7807060 — 2026-03-30T20:03:06+01:00
  references:
