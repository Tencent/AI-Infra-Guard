info:
  name: OpenClaw
  cve: GHSA-9hjh-fr4f-gxc4
  summary: >-
    OpenClaw Gateway Backend Reconnect lets Non-Admin Operator Scopes Self-Claim operator.admin
  details: >-
    Summary


    Gateway Backend Reconnect lets Non-Admin Operator Scopes Self-Claim operator.admin


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Backend-labeled reconnects could previously self-request broader scopes and bypass pairing, allowing non-admin operators
    to reconnect as operator.admin. Commit d3d8e316bd819d3c7e34253aeb7eccb2510f5f48 removes the backend self-pairing skip
    and requires pairing when requested scopes exceed the approved baseline.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit d3d8e316bd819d3c7e34253aeb7eccb2510f5f48.
  cvss: ''
  severity: CRITICAL
  security_advise: >-
    Upgrade openclaw to 2026.3.25 or later. Commit(s) - d3d8e316bd819d3c7e34253aeb7eccb2510f5f48
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9hjh-fr4f-gxc4
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9hjh-fr4f-gxc4
