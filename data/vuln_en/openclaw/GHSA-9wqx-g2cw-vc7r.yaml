info:
  name: OpenClaw
  cve: GHSA-9wqx-g2cw-vc7r
  summary: >-
    OpenClaw Matrix Verification Notices Bypass Matrix DM Policy and Reply to Unpaired DM Peers
  details: >-
    Summary


    Matrix Verification Notices Bypass Matrix DM Policy and Reply to Unpaired DM Peers


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Matrix verification notices previously bypassed DM access checks and could reply to peers that were unpaired or otherwise
    outside the allowed DM policy. Commit 2383daf5c4a4e08d9553e0e949552ad755ef9ec2 gates verification notices on DM access
    before sending.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit 2383daf5c4a4e08d9553e0e949552ad755ef9ec2.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.3.25 or later. Commit(s) - 2383daf5c4a4e08d9553e0e949552ad755ef9ec2
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9wqx-g2cw-vc7r
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9wqx-g2cw-vc7r
