info:
  name: OpenClaw
  cve: GHSA-cqgw-44wg-44rf
  summary: OpenClaw Discord voice manager bypasses channel-level member access allowlist
  details: >-
    Summary

    Discord voice manager bypasses channel-level member access allowlist


    Current Maintainer Triage

    - Status: open

    - Normalized severity: medium

    - Assessment: v2026.3.28 still accepts Discord voice ingress before channel allowlist authorization, and main-only gating
    means this remains a real shipped access-control bug.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - dba96e7507e0900f120e5e28e57755d69bf78759 — 2026-03-31T21:29:13+09:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cqgw-44wg-44rf
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cqgw-44wg-44rf
