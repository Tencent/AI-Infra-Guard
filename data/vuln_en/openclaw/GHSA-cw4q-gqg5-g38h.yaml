info:
  name: OpenClaw
  cve: GHSA-cw4q-gqg5-g38h
  summary: OpenClaw Discord allowFrom could bind to mutable display names
  details: >-
    Summary


    Discord allowFrom could bind to mutable display names. In affected versions, a Discord account able to change display
    or global name metadata could match a policy entry through mutable display metadata.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could receive agent access intended for another Discord identity.
    Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.7.


    Mitigations


    use stable Discord user IDs in allowlists until patched. As general hardening, keep channel and tool allowlists narrow,
    avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.7 or later. use stable Discord user IDs in allowlists until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cw4q-gqg5-g38h
rule: version <= "2026.5.6"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cw4q-gqg5-g38h
