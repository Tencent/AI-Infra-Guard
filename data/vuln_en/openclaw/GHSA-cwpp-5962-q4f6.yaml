info:
  name: OpenClaw
  cve: GHSA-cwpp-5962-q4f6
  summary: >-
    OpenClaw Exec allowlist could miss side effects from transparent command wrappers
  details: >-
    Summary


    Exec allowlist could miss side effects from transparent command wrappers. In affected versions, a command request that
    reaches the exec allowlist path could be evaluated against the inner command while the wrapper invocation still executed.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could perform wrapper-level side effects outside the intent of
    the allowlisted command. Practical impact depends on the operator's configuration and whether lower-trust input can reach
    that path.


    Patched Versions


    The first stable patched version is 2026.5.26.


    Mitigations


    review wrapper commands carefully and require approval for shell-like wrapper usage until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.26 or later. review wrapper commands carefully and require approval for shell-like wrapper
    usage until patched. As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between
    mutually untrusted users, and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cwpp-5962-q4f6
rule: version <= "2026.5.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cwpp-5962-q4f6
