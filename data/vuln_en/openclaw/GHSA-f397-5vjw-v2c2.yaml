info:
  name: OpenClaw
  cve: GHSA-f397-5vjw-v2c2
  summary: OpenClaw Shell inline-command parsing could miss an allowlist check
  details: >-
    Summary


    Shell inline-command parsing could miss an allowlist check. In affected versions, a command request using shell inline-command
    forms could route an inline command through a parser case that did not receive the expected allowlist decision.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run shell content without the intended approval or allowlist
    prompt. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.12.


    Mitigations


    require approval for shell inline-command forms until patched. As general hardening, keep channel and tool allowlists
    narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.12 or later. require approval for shell inline-command forms until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f397-5vjw-v2c2
rule: version <= "2026.5.10-beta.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f397-5vjw-v2c2
