info:
  name: OpenClaw
  cve: GHSA-fh32-73r9-rgh5
  summary: OpenClaw Trailing-dot localhost CDP hosts could bypass remote loopback protections
  details: >-
    Summary


    Before OpenClaw 2026.4.2, remote CDP discovery could return a trailing-dot localhost host such as localhost. and bypass
    OpenClaw's loopback-host normalization. That let a non-loopback remote CDP profile pivot the follow-up connection back
    onto localhost.


    Impact


    A hostile discovery response could retarget authenticated browser control toward a localhost-resolving endpoint on the
    OpenClaw host. This weakened the existing remote-CDP loopback protection and could expose localhost-backed browser state.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.1

    - Patched versions: >= 2026.4.2

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.4.2 or later. Commit(s) - 9c22d636697336a6b22b0ae24798d8b8325d7828 — normalize
    localhost absolute-form CDP hosts before loopback checks
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fh32-73r9-rgh5
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fh32-73r9-rgh5
