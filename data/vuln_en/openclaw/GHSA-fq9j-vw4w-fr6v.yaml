info:
  name: OpenClaw
  cve: GHSA-fq9j-vw4w-fr6v
  summary: >-
    OpenClaw Workspace .env CLOUDSDK_PYTHON could influence Gmail setup gcloud execution
  details: >-
    Summary


    Workspace .env CLOUDSDK_PYTHON could influence Gmail setup gcloud execution. In affected versions, a workspace .env in
    a repository opened by a trusted operator could influence which Python runtime gcloud used through CLOUDSDK_PYTHON.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run setup through an unintended local Python path. Practical
    impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.2.


    Mitigations


    run Gmail setup from trusted workspaces and clear workspace env overrides until patched. As general hardening, keep channel
    and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature
    when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.2 or later. run Gmail setup from trusted workspaces and clear workspace env overrides until
    patched. As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted
    users, and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fq9j-vw4w-fr6v
rule: version < "2026.5.2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fq9j-vw4w-fr6v
