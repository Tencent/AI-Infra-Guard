info:
  name: OpenClaw
  cve: GHSA-fqw4-mph7-2vr8
  summary: >-
    OpenClaw Gateway local shared-auth reconnect silently widens paired device scope from operator.read to operator.admin
    and reach node RCE
  details: >-
    Summary


    Gateway local shared-auth reconnect silently widens paired device scope from operator.read to operator.admin and reach
    node RCE


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Silent local shared-auth reconnects could previously auto-approve scope-upgrade requests and widen a paired device from
    operator.read to operator.admin. Commit 81ebc7e0344fd19c85778e883bad45e2da972229 blocks silent reconnect scope upgrades
    so widened scopes require an explicit pairing approval instead of an implicit local reconnect path.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit 81ebc7e0344fd19c85778e883bad45e2da972229.
  cvss: ''
  severity: CRITICAL
  security_advise: >-
    Upgrade openclaw to 2026.3.25 or later. Commit(s) - 81ebc7e0344fd19c85778e883bad45e2da972229
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fqw4-mph7-2vr8
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fqw4-mph7-2vr8
