info:
  name: OpenClaw
  cve: GHSA-fv94-qvg8-xqpw
  summary: OpenClaw SSH sandbox tar upload follows symlinks, enabling arbitrary file write on remote host
  details: >-
    Summary

    SSH sandbox tar upload follows symlinks, enabling arbitrary file write on remote host


    Current Maintainer Triage

    - Status: open

    - Normalized severity: high

    - Assessment: Real in shipped v2026.3.28: SSH sandbox tar upload lacked pre-upload symlink escape rejection until 3d5af14984
    on 2026-03-31; maintainers already accepted it and the fix is unreleased.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
