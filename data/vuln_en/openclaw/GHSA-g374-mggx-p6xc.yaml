info:
  name: OpenClaw
  cve: GHSA-g374-mggx-p6xc
  summary: OpenClaw Incomplete scope-clearing fix allows operator.admin escalation via trusted-proxy auth mode
  details: >-
    Summary

    Incomplete scope-clearing fix allows operator.admin escalation via trusted-proxy auth mode


    Current Maintainer Triage

    - Status: open

    - Normalized severity: high

    - Assessment: v2026.3.28 still misses trusted-proxy scope clearing for non-Control-UI clients, so self-declared operator
    scopes can survive on a real identity-bearing auth path; the complete fix is unreleased.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: HIGH
