info:
  name: OpenClaw
  cve: GHSA-g86v-f9qv-rh6m
  summary: OpenClaw OpenClaw SSRF guard misses four IPv6 special-use ranges
  details: >-
    Summary


    The SSRF/IP classifier treated several IPv6 special-use ranges as public and allowed fetches to proceed.


    Impact


    An attacker who controlled a fetched URL could target internal or non-routable IPv6 addresses that should have been blocked
    by the SSRF guard.


    Affected Component


    src/shared/net/ip.ts, src/infra/net/ssrf.*


    Fixed Versions


    - Affected: <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit d61f8e5672 (Net: block missing IPv6 special-use ranges).
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:L/I:N/A:N
  severity: LOW
  security_advise: 'Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit d61f8e5672 (Net: block missing IPv6 special-use
    ranges).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g86v-f9qv-rh6m
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g86v-f9qv-rh6m
