info:
  name: OpenClaw
  cve: GHSA-g8xp-qx39-9jq9
  summary: OpenClaw Incomplete `host-env-security-policy.json` allows untrusted model to substitute compiler binaries (`CC`,
    `CXX`, `CARGO_BUILD_RUSTC`, `CMAKE_C_COMPILER`) via env overrides on approved host exec requests
  details: >-
    Summary

    Incomplete host-env-security-policy.json allows untrusted model to substitute compiler binaries (CC, CXX, CARGO_BUILD_RUSTC,
    CMAKE_C_COMPILER) via env overrides on approved host exec requests


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: medium

    - Assessment: Shipped v2026.3.28 host-env policy missed compiler override vars, but exploitation still requires an approved
    host-exec request inside the existing exec trust domain, so medium not high.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - e277a37f896b5011a1df06e6490c6630074d0afa — 2026-03-30T20:06:32+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g8xp-qx39-9jq9
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g8xp-qx39-9jq9
