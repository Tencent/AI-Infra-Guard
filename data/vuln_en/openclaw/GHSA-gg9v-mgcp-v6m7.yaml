info:
  name: OpenClaw
  cve: GHSA-gg9v-mgcp-v6m7
  summary: OpenClaw Bootstrap setup codes were not bound to the intended device role and scopes, allowing first-use privilege
    escalation during pairing.
  details: >-
    Summary

    Bootstrap setup codes were not bound to the intended device role and scopes, allowing first-use privilege escalation during
    pairing.


    Current Maintainer Triage

    - Status: open

    - Normalized severity: high

    - Assessment: Real first-use bootstrap privilege-escalation bug fixed and shipped in v2026.3.22+, so keep open for publication
    with current severity.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.13-1

    - Patched versions: >= 2026.3.22

    - First stable tag containing the fix: v2026.3.22
  cvss: ''
  severity: HIGH
