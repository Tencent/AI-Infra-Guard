info:
  name: OpenClaw
  cve: GHSA-h43v-27wg-5mf9
  summary: >-
    OpenClaw Forged Nostr DMs could create pairing state before signature verification
  details: >-
    Summary


    Before OpenClaw 2026.3.31, the Nostr DM ingress path could issue pairing challenges before validating the event signature.
    A forged DM could create a pending pairing entry and trigger a pairing-reply attempt before signature rejection.


    Impact


    An unauthenticated remote sender could consume shared pairing capacity and trigger bounded relay/logging work on the Nostr
    channel. This issue did not grant message decryption, pairing approval, or broader authorization bypass.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: >= 2026.3.22, < 2026.3.31

    - Patched versions: >= 2026.3.31

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - 4ee742174f36b5445703e3b1ef2fbd6ae6700fa4 — verify inbound DM signatures
    before pairing replies
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-h43v-27wg-5mf9
rule: version >= "2026.3.22" && version < "2026.3.31"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-h43v-27wg-5mf9
