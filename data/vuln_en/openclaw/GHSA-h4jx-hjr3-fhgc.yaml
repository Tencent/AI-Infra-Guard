info:
  name: OpenClaw
  cve: GHSA-h4jx-hjr3-fhgc
  summary: OpenClaw Gateway Plugin Subagent Fallback `deleteSession` Uses Synthetic `operator.admin`
  details: >-
    Summary


    Gateway Plugin Subagent Fallback deleteSession Uses Synthetic operator.admin


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Gateway plugin subagent fallback deleteSession previously dispatched sessions.delete with a synthetic operator.admin runtime
    scope when no request-scoped client existed. Commit b5d785f1a59a56c3471f2cef328f7c9a6c15f3e7 binds deletion to the caller
    scope instead of minting admin scope.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit b5d785f1a59a56c3471f2cef328f7c9a6c15f3e7.
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to 2026.3.25 or later. Commit(s) - b5d785f1a59a56c3471f2cef328f7c9a6c15f3e7
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-h4jx-hjr3-fhgc
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-h4jx-hjr3-fhgc
