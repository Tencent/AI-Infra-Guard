  summary: OpenClaw OpenClaw Gateway Control Interface Information Disclosure Vulnerability
  details: >-
    Summary

    OpenClaw Gateway Control Interface Information Disclosure Vulnerability


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: low

    - Assessment: Released Control UI bootstrap JSON did expose version and assistant agent id, but that is low-severity fingerprinting
    or info disclosure only; unreleased c5c10adc trims the payload.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: LOW
