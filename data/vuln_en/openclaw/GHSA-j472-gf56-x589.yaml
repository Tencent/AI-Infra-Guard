info:
  name: OpenClaw
  cve: GHSA-j472-gf56-x589
  summary: OpenClaw PowerShell encoded-command aliases could miss exec allowlist checks
  details: >-
    Summary


    PowerShell encoded-command aliases could miss exec allowlist checks. In affected versions, a command request using abbreviated
    encoded-command flags could use an alias form not recognized by the allowlist parser.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run encoded PowerShell content without the intended allowlist
    decision. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.12.


    Mitigations


    avoid allowlisting PowerShell wrapper forms and require approval for encoded commands until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.12 or later. avoid allowlisting PowerShell wrapper forms and require approval for encoded commands
    until patched. As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually
    untrusted users, and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-j472-gf56-x589
rule: version <= "2026.5.7"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-j472-gf56-x589
