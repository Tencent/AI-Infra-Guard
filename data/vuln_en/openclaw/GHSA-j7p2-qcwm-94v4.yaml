info:
  name: OpenClaw
  cve: GHSA-j7p2-qcwm-94v4
  summary: OpenClaw Incomplete host env sanitization blocklist allows supply-chain redirection via package-manager env overrides
  details: >-
    Summary


    Host exec env override sanitization did not fail closed for several package-manager and related redirect variables that
    can steer dependency fetches or startup behavior.


    Impact


    An approved exec request could silently redirect package resolution or runtime bootstrap to attacker-controlled infrastructure
    and execute trojanized content.


    Affected Component


    src/infra/host-env-security-policy.json, src/infra/host-env-security.ts


    Fixed Versions


    - Affected: < 2026.3.22

    - Patched: >= 2026.3.22

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit 7abfff756d (Exec: harden host env override handling across gateway and node).
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
  severity: CRITICAL
  security_advise: 'Upgrade openclaw to >= 2026.3.22 or later. Fixed by commit 7abfff756d (Exec: harden host env override
    handling across gateway and node).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-j7p2-qcwm-94v4
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-j7p2-qcwm-94v4
