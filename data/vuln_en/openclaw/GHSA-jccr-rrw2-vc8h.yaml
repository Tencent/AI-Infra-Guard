info:
  name: OpenClaw
  cve: GHSA-jccr-rrw2-vc8h
  summary: OpenClaw OpenClaw safeBins jq `$ENV` filter bypass allows environment variable disclosure
  details: >-
    Summary


    The jq safe-bin policy blocked explicit env usage but still allowed jq programs that accessed environment data through
    $ENV.


    Impact


    An operator-approved safe-bin jq command could disclose environment variables that the safe-bin policy was supposed to
    keep out of scope.


    Affected Component


    src/infra/exec-safe-bin-semantics.ts


    Fixed Versions


    - Affected: <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit 78e2f3d66d (Exec: tighten jq safe-bin env checks).
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit 78e2f3d66d (Exec: tighten jq safe-bin env checks).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jccr-rrw2-vc8h
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jccr-rrw2-vc8h
