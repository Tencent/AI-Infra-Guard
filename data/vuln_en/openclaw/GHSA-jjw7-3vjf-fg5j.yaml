info:
  name: OpenClaw
  cve: GHSA-jjw7-3vjf-fg5j
  summary: OpenClaw OpenClaw Nostr privateKey config redaction bypass leaks plaintext signing key via config.get
  details: >-
    Summary

    OpenClaw Nostr privateKey config redaction bypass leaks plaintext signing key via config.get


    Current Maintainer Triage

    - Status: open

    - Normalized severity: medium

    - Assessment: v2026.3.28 still models Nostr privateKey as plain string so config views can expose it, and the secret-schema
    fix is unreleased.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - 57700d716f660591fb6e09727f3ca8041fa48b9d — 2026-03-31T19:55:03+09:00
  references:
