info:
  name: OpenClaw
  cve: GHSA-m6fx-m8hc-572m
  summary: >-
    OpenClaw Telegram audio preflight transcription enables resource consumption by unauthorized senders
  details: >-
    Summary

    Telegram audio preflight transcription enables resource consumption by unauthorized senders


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: medium

    - Assessment: v2026.3.28 still lets unauthorized Telegram group senders trigger audio preflight before allowlist enforcement,
    but the real impact is resource or billing burn rather than direct data exposure or host compromise.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - c4fa8635d03943ffe9e294d501089521dca635c5 — 2026-03-30T12:19:31+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-m6fx-m8hc-572m
rule: version <= "2026.3.28"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-m6fx-m8hc-572m
