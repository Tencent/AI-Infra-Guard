info:
  name: OpenClaw
  cve: GHSA-m866-6qv5-p2fg
  summary: OpenClaw OpenClaw host-env blocklist missing `GIT_TEMPLATE_DIR` and `AWS_CONFIG_FILE` allows code execution via
    env override
  details: >-
    Summary


    Host execution env sanitization did not block GIT_TEMPLATE_DIR or AWS_CONFIG_FILE, even though both can redirect trusted
    tooling to attacker-controlled content.


    Impact


    An approved exec request could redirect git or AWS CLI behavior through attacker-controlled configuration and execute
    untrusted code or load attacker-selected credentials.


    Affected Component


    src/infra/host-env-security-policy.json, src/infra/host-env-security.ts


    Fixed Versions


    - Affected: <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit 6eb82fba3c (Infra: block additional host exec env keys).
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:C/C:L/I:L/A:N
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit 6eb82fba3c (Infra: block additional host exec
    env keys).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-m866-6qv5-p2fg
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-m866-6qv5-p2fg
