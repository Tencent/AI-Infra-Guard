info:
  name: OpenClaw
  cve: GHSA-mpc8-jxjh-qpgh
  summary: OpenClaw Focus command could miss controlScope enforcement
  details: >-
    Summary


    Focus command could miss controlScope enforcement. In affected versions, a caller able to trigger the focus command could
    run the command without enforcing the expected control scope.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could change focus state outside the intended caller authority.
    Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.4.25.


    Mitigations


    restrict focus command access to trusted operators until patched. As general hardening, keep channel and tool allowlists
    narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.25 or later. restrict focus command access to trusted operators until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mpc8-jxjh-qpgh
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mpc8-jxjh-qpgh
