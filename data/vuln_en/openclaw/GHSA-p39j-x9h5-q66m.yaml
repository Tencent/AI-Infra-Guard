info:
  name: OpenClaw
  cve: GHSA-p39j-x9h5-q66m
  summary: OpenClaw Embedded runner policy could be confused by provider aliases
  details: >-
    Summary


    Embedded runner policy could be confused by provider aliases. In affected versions, a request using provider aliases could
    compare policy against an alias instead of the canonical provider identity.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could select bundled tool access outside the intended provider
    policy. Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.4.25.


    Mitigations


    avoid provider alias routing for embedded runner tool policy until patched. As general hardening, keep channel and tool
    allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it
    is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.25 or later. avoid provider alias routing for embedded runner tool policy until patched. As
    general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-p39j-x9h5-q66m
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-p39j-x9h5-q66m
