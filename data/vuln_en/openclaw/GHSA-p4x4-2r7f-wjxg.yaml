info:
  name: OpenClaw
  cve: GHSA-p4x4-2r7f-wjxg
  summary: OpenClaw Gateway exec allow-always over-trusts positional carrier executables
  details: >-
    Summary


    Allow-always persistence could trust wrapper carrier executables instead of the actual invoked target when commands were
    routed through dispatch wrappers.


    Impact


    A one-time approval could persist a broader future allowlist entry than the operator intended, weakening execution approval
    boundaries.


    Affected Component


    src/infra/exec-approvals-allowlist.ts


    Fixed Versions


    - Affected: <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit 9ec44fad39 (Exec approvals: reject wrapper carrier allow-always targets).
  cvss: CVSS:3.1/AV:L/AC:L/PR:L/UI:R/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit 9ec44fad39 (Exec approvals: reject wrapper
    carrier allow-always targets).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-p4x4-2r7f-wjxg
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-p4x4-2r7f-wjxg
