info:
  name: OpenClaw
  cve: GHSA-qcc3-jqwp-5vh2
  summary: OpenClaw LINE webhook handler lacks shared pre-auth concurrency budget before signature verification
  details: >-
    Summary

    LINE webhook handler lacks shared pre-auth concurrency budget before signature verification


    Current Maintainer Triage

    - Status: open

    - Normalized severity: low

    - Assessment: Shipped v2026.3.28 lacks a shared pre-auth concurrency budget on the public LINE webhook path, but the effect
    is bounded transient availability loss only, so low fits.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
