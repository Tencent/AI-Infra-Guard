info:
  name: OpenClaw
  cve: GHSA-qf48-qfv4-jjm9
  summary: OpenClaw Feishu extension resolveUploadInput bypasses file-system sandbox and allows arbitrary file reads via upload_image
  details: >-
    Summary


    Feishu upload path resolution could read files outside the configured localRoots sandbox before handing them to the upload
    path.


    Impact


    A tool caller constrained to workspace or localRoots paths could exfiltrate arbitrary host files through Feishu upload
    actions.


    Affected Component


    extensions/feishu/src/docx.ts


    Fixed Versions


    - Affected: >= 2026.2.6, <= 2026.3.24

    - Patched: >= 2026.3.28

    - Latest stable 2026.3.28 contains the fix.


    Fix


    Fixed by commit 764394c78b (fix: enforce localRoots sandbox on Feishu docx upload file reads).
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:N/A:N
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.3.28 or later. Fixed by commit 764394c78b (fix: enforce localRoots sandbox
    on Feishu docx upload file reads).'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qf48-qfv4-jjm9
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qf48-qfv4-jjm9
