info:
  name: OpenClaw
  cve: GHSA-qm2m-28pf-hgjw
  summary: 'OpenClaw Gateway Plugin HTTP auth: "gateway" Mints operator.admin Runtime Scope'
  details: >-
    Summary


    Gateway Plugin HTTP auth: "gateway" Mints operator.admin Runtime Scope


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Gateway-authenticated plugin HTTP routes previously created a runtime scope set that included operator.admin regardless
    of caller-granted scopes. Commit ec2dbcff9afd8a52e00de054b506c91726d9fbbe keeps plugin HTTP runtime scopes least-privileged
    and preserves caller scope boundaries.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit ec2dbcff9afd8a52e00de054b506c91726d9fbbe.
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to 2026.3.25 or later. Commit(s) - ec2dbcff9afd8a52e00de054b506c91726d9fbbe
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qm2m-28pf-hgjw
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qm2m-28pf-hgjw
