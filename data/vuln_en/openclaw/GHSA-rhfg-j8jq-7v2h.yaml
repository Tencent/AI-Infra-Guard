info:
  name: OpenClaw
  cve: GHSA-rhfg-j8jq-7v2h
  summary: >-
    OpenClaw SSRF via Unguarded Configured Base URLs in Multiple Channel Extensions (Incomplete Fix for CVE-2026-28476)
  details: >-
    Summary


    SSRF via Unguarded Configured Base URLs in Multiple Channel Extensions (Incomplete Fix for CVE-2026-28476)


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Several channel extensions still used raw fetch() against configured base URLs without the SSRF guard that was added for
    CVE-2026-28476. Commit f92c92515bd439a71bd03eb1bc969c1964f17acf routes those outbound requests through fetchWithSsrFGuard
    so configured endpoints cannot be rebound to blocked internal destinations.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit f92c92515bd439a71bd03eb1bc969c1964f17acf.
  cvss: ''
  severity: HIGH
  security_advise: >-
    Upgrade openclaw to 2026.3.25 or later. Commit(s) - f92c92515bd439a71bd03eb1bc969c1964f17acf
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rhfg-j8jq-7v2h
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rhfg-j8jq-7v2h
