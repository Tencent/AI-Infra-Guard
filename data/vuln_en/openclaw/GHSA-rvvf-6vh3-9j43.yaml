info:
  name: OpenClaw
  cve: GHSA-rvvf-6vh3-9j43
  summary: OpenClaw Discord Slash Commands Bypass Group DM Channel Allowlist
  details: >-
    Summary

    Discord Slash Commands Bypass Group DM Channel Allowlist


    Current Maintainer Triage

    - Status: narrow

    - Normalized severity: low

    - Assessment: v2026.3.28 native Discord slash and autocomplete paths still skip the group-DM allowlist, but impact is
    limited to already-authorized Discord users bypassing a channel restriction rather than crossing a stronger trust boundary.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: LOW
