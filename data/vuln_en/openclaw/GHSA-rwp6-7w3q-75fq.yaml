info:
  name: OpenClaw
  cve: GHSA-rwp6-7w3q-75fq
  summary: OpenClaw Config recovery could restore openclaw.json with broad file permissions
  details: >-
    Summary


    Config recovery could restore openclaw.json with broad file permissions. In affected versions, a local recovery path after
    configuration repair could leave the restored config file more readable than intended.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could expose local configuration to other same-host users where
    OS permissions allow it. Practical impact depends on the operator's configuration and whether lower-trust input can reach
    that path.


    Patched Versions


    The first stable patched version is 2026.4.24.


    Mitigations


    check openclaw.json permissions after recovery on shared hosts until patched. As general hardening, keep channel and tool
    allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it
    is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.24 or later. check openclaw.json permissions after recovery on shared hosts until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rwp6-7w3q-75fq
rule: version == "2026.4.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rwp6-7w3q-75fq
