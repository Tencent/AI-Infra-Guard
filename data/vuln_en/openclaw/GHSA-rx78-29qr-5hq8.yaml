info:
  name: OpenClaw
  cve: GHSA-rx78-29qr-5hq8
  summary: OpenClaw Workspace-derived service PATH could influence trash command selection
  details: >-
    Summary


    Workspace-derived service PATH could influence trash command selection. In affected versions, a workspace-derived environment
    path could select an unintended trash executable during maintenance.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could run a local executable from a path the operator did not
    intend for maintenance tasks. Practical impact depends on the operator's configuration and whether lower-trust input can
    reach that path.


    Patched Versions


    The first stable patched version is 2026.5.2.


    Mitigations


    keep maintenance flows on trusted workspaces and fixed service paths until patched. As general hardening, keep channel
    and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature
    when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.2 or later. keep maintenance flows on trusted workspaces and fixed service paths until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rx78-29qr-5hq8
rule: version < "2026.5.2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rx78-29qr-5hq8
