info:
  name: OpenClaw
  cve: GHSA-v6r2-jh58-xx6w
  summary: >-
    OpenClaw Marketplace runtime extension metadata could point at unscanned payloads
  details: >-
    Summary


    Marketplace runtime extension metadata could point at unscanned payloads. In affected versions, a package selected for
    installation by a trusted operator could redirect runtime loading toward hidden package content that was not scanned as
    expected.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could load plugin code outside the reviewed package entry points.
    Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.5.18.


    Mitigations


    install only trusted plugins and keep plugin allowlists explicit until patched. As general hardening, keep channel and
    tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when
    it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.5.18 or later. install only trusted plugins and keep plugin allowlists explicit until patched.
    As general hardening, keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users,
    and disable the affected feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v6r2-jh58-xx6w
rule: version < "2026.5.18"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v6r2-jh58-xx6w
