info:
  name: OpenClaw
  cve: GHSA-v8cx-933x-r976
  summary: OpenClaw Fake package roots could influence memory-core artifact loading
  details: >-
    Summary


    Fake package roots could influence memory-core artifact loading. In affected versions, a local package root resolution
    path influenced by workspace state could select a package root that was not the intended bundled artifact root.


    This advisory is scoped to the named feature and configuration. It does not change OpenClaw's trusted-operator model:
    authenticated Gateway operators, installed plugins, and intentional local execution surfaces remain trusted unless a separate
    policy, approval, allowlist, sandbox, or auth boundary is crossed.


    Impact


    When the affected feature is enabled and reachable, this could load memory-core artifacts from an unintended local location.
    Practical impact depends on the operator's configuration and whether lower-trust input can reach that path.


    Patched Versions


    The first stable patched version is 2026.4.25.


    Mitigations


    run memory-core flows from trusted workspaces until patched. As general hardening, keep channel and tool allowlists narrow,
    avoid sharing one Gateway between mutually untrusted users, and disable the affected feature when it is not needed.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.25 or later. run memory-core flows from trusted workspaces until patched. As general hardening,
    keep channel and tool allowlists narrow, avoid sharing one Gateway between mutually untrusted users, and disable the affected
    feature when it is not needed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cx-933x-r976
rule: version <= "2026.4.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cx-933x-r976
