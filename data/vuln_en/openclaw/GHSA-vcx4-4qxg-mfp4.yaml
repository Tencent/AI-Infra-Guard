info:
  name: OpenClaw
  cve: GHSA-vcx4-4qxg-mfp4
  summary: >-
    OpenClaw Telegram Webhook Missing Guess Rate Limiting Enables Brute-Force Guessing of Weak Webhook Secret
  details: >-
    Summary


    Telegram Webhook Missing Guess Rate Limiting Enables Brute-Force Guessing of Weak Webhook Secret


    Affected Packages / Versions


    - Package: openclaw

    - Affected versions: <= 2026.3.24

    - First patched version: 2026.3.25

    - Latest published npm version at verification time: 2026.3.24


    Details


    Telegram webhook auth previously rejected bad secrets but did not throttle repeated guesses, allowing brute-force attempts
    against weak webhook secrets. Commit c2c136ae9517ddd0789d742a0fdf4c10e8c729a7 adds repeated-guess throttling before auth
    failure responses.


    Verified vulnerable on tag v2026.3.24 and fixed on main by commit c2c136ae9517ddd0789d742a0fdf4c10e8c729a7.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.3.25 or later. Commit(s) - c2c136ae9517ddd0789d742a0fdf4c10e8c729a7
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vcx4-4qxg-mfp4
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vcx4-4qxg-mfp4
