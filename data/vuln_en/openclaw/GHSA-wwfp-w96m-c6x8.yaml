info:
  name: OpenClaw
  cve: GHSA-wwfp-w96m-c6x8
  summary: OpenClaw Pairing pending-request caps were enforced per channel instead of per account
  details: >-
    Summary


    Before OpenClaw 2026.3.31, pending pairing-request caps were enforced per channel file instead of per account. On multi-account
    channel setups, requests from other accounts could fill the shared pending window and block new pairing challenges on
    an unaffected account.


    Impact


    This issue could deny new pairing or onboarding on another account until an existing request was approved or expired.
    It was an availability-only bug; it did not allow cross-account approval, data access, or authorization bypass.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: >= 2026.2.26, < 2026.3.31

    - Patched versions: >= 2026.3.31

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - 9bc1f896c8cd325dd4761681e9bdb8c425f69785 — scope
    pending request caps per account
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-wwfp-w96m-c6x8
rule: version < "2026.3.31"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-wwfp-w96m-c6x8
